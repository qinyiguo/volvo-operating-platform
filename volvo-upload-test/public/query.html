<!DOCTYPE html>
<html lang="zh-TW">
<head>
<link rel="stylesheet" href="/theme.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volvo 資料查詢</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
 body { font-family: -apple-system, 'Microsoft JhengHei', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  /* ── Nav ── */
  .sticky-header { position: sticky; top: 0; z-index: 200; background: #0f172a; box-shadow: 0 2px 20px rgba(0,0,0,.6); }
  .nav { background: #1e293b; border-bottom: 1px solid #2d3f56; padding: 0 24px; display: flex; align-items: center; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nav-brand { font-size: 15px; font-weight: 700; color: #fff; padding: 16px 0; margin-right: 24px; white-space: nowrap; flex-shrink: 0; }
  .nav-link { padding: 16px 14px; color: #64748b; font-size: 13px; font-weight: 600; text-decoration: none; border-bottom: 2px solid transparent; white-space: nowrap; flex-shrink: 0; }
  .nav-link:hover { color: #e2e8f0; }
  .nav-link.active { color: #3b82f6; border-bottom-color: #3b82f6; }

  /* ── Header / Filter ── */
  .header-inner { padding: 10px 24px; border-bottom: 1px solid #2d3f56; }

  /* Desktop filter: single row */
  .filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .filter-bar label { font-size: 12px; color: #64748b; font-weight: 600; white-space: nowrap; }
  .filter-bar select,
  .filter-bar input { background: #1e293b; border: 1px solid #2d3f56; color: #e2e8f0; padding: 7px 10px; border-radius: 6px; font-size: 13px; outline: none; transition: border-color .15s; }
  .filter-bar select:focus,
  .filter-bar input:focus { border-color: #3b82f6; }

  /* Mobile filter: stacked rows */
  .filter-row-1,
  .filter-row-2 { display: none; }

  /* ── Container ── */
  .container { padding: 20px 24px 48px; max-width: 1600px; margin: 0 auto; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { background: #253347; color: #cbd5e1; border: 1px solid #2d3f56; }
  .btn-secondary:hover { background: #2d3f56; }
  .btn-green { background: rgba(16,185,129,.15); color: #10b981; border: 1px solid rgba(16,185,129,.3); }
  .btn-green:hover { background: rgba(16,185,129,.25); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Card ── */
  .card { background: #1a2332; border: 1px solid #2d3f56; border-radius: 12px; overflow: hidden; }
  .card-head { padding: 14px 20px; border-bottom: 1px solid #2d3f56; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .card-head-title { font-size: 14px; font-weight: 700; }

  /* ── Badges ── */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: 600; }
  .badge-blue   { background: rgba(59,130,246,.15); color: #3b82f6; }
  .badge-green  { background: rgba(16,185,129,.15); color: #10b981; }
  .badge-yellow { background: rgba(245,158,11,.15); color: #f59e0b; }
  .badge-purple { background: rgba(139,92,246,.15); color: #8b5cf6; }
  .badge-gray   { background: rgba(100,116,139,.15); color: #94a3b8; }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { background: #0f172a; color: #64748b; font-size: 11px; font-weight: 700; text-align: left; padding: 9px 10px; border-bottom: 1px solid #2d3f56; white-space: nowrap; position: sticky; top: 0; z-index: 2; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: #e2e8f0; }
  th .sort-icon { font-size: 10px; margin-left: 3px; color: #475569; }
  th.sort-asc .sort-icon::after { content: '▲'; color: #3b82f6; }
  th.sort-desc .sort-icon::after { content: '▼'; color: #3b82f6; }
  th:not(.sort-asc):not(.sort-desc) .sort-icon::after { content: '⇅'; }
  td { padding: 8px 10px; border-bottom: 1px solid rgba(45,63,86,.4); vertical-align: middle; white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
  td.wrap { white-space: normal; max-width: 220px; word-break: break-all; }
  tr:hover td { background: rgba(37,51,71,.5); }
  .num { text-align: right; font-variant-numeric: tabular-nums; }

  /* ── States ── */
  .loading { text-align: center; padding: 48px; color: #64748b; font-size: 14px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #2d3f56; border-top-color: #3b82f6; border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 48px; color: #64748b; }
  .search-highlight { background: rgba(251,191,36,.25); color: #fbbf24; border-radius: 2px; }

  /* ── Pagination ── */
  .pagination { display: flex; align-items: center; gap: 6px; padding: 12px 16px; border-top: 1px solid #2d3f56; flex-wrap: wrap; }
  .page-btn { width: 32px; height: 32px; border: 1px solid #2d3f56; border-radius: 6px; background: #0f172a; color: #64748b; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .page-btn:hover { border-color: #3b82f6; color: #3b82f6; }
  .page-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
  .page-btn:disabled { opacity: .4; cursor: not-allowed; }
  .page-info { font-size: 12px; color: #64748b; margin-left: 4px; }
  .row-count { font-size: 12px; color: #475569; background: #0f172a; padding: 4px 10px; border-radius: 5px; border: 1px solid #2d3f56; }

  /* ── Period selector ── */
  .period-selector { position: relative; }
  .period-btn { display: flex; align-items: center; gap: 6px; background: #1e293b; border: 1px solid #2d3f56; color: #e2e8f0; padding: 7px 10px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; user-select: none; min-width: 120px; justify-content: space-between; outline: none; transition: border-color .15s; }
  .period-btn:hover, .period-btn.open { border-color: #3b82f6; }
  .period-btn .pb-arrow { font-size: 9px; color: #475569; transition: transform .2s; }
  .period-btn.open .pb-arrow { transform: rotate(180deg); color: #3b82f6; }
  .period-dropdown { position: absolute; top: calc(100% + 4px); left: 0; background: #1a2740; border: 1px solid #334155; border-radius: 10px; box-shadow: 0 12px 40px rgba(0,0,0,.8); z-index: 9999; width: 240px; display: none; flex-direction: column; overflow: hidden; }
  .period-dropdown.open { display: flex; }
  .period-dd-list { overflow-y: auto; max-height: 300px; padding: 4px 0; }
  .period-dd-year { font-size: 11px; font-weight: 700; color: #374151; padding: 8px 12px 3px; display: flex; align-items: center; gap: 6px; }
  .period-dd-year::after { content: ''; flex: 1; height: 1px; background: #1e3050; }
  .period-dd-months { display: grid; grid-template-columns: repeat(4,1fr); gap: 3px; padding: 0 8px 6px; }
  .period-dd-mo { padding: 6px 4px; border-radius: 6px; cursor: pointer; text-align: center; font-size: 12px; font-weight: 700; color: #64748b; border: 1px solid transparent; transition: all .1s; }
  .period-dd-mo:hover { background: rgba(59,130,246,.1); border-color: rgba(59,130,246,.3); color: #93c5fd; }
  .period-dd-mo.selected { background: rgba(59,130,246,.18); border-color: #3b82f6; color: #3b82f6; }
  .period-dd-mo.has-data { color: #94a3b8; }
  .period-dd-mo.has-data:not(.selected) { color: #94a3b8; }

  /* ── Column toggle ── */
  .col-toggle-wrap { position: relative; }
  .col-toggle-dropdown { position: absolute; top: calc(100% + 4px); right: 0; background: #1a2740; border: 1px solid #334155; border-radius: 10px; box-shadow: 0 12px 40px rgba(0,0,0,.8); z-index: 999; width: 200px; padding: 10px 0; display: none; max-height: 60vh; overflow-y: auto; }
  .col-toggle-dropdown.open { display: block; }
  .col-toggle-item { display: flex; align-items: center; gap: 8px; padding: 8px 14px; cursor: pointer; font-size: 13px; color: #94a3b8; transition: background .1s; }
  .col-toggle-item:hover { background: rgba(59,130,246,.08); color: #e2e8f0; }
  .col-toggle-item input[type=checkbox] { accent-color: #3b82f6; width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }

  /* ── Multi-keyword hint badge ── */
  .kw-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(59,130,246,.12); border: 1px solid rgba(59,130,246,.3); color: #60a5fa; padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 700; }

  /* ════════════════════════════
     MOBILE RESPONSIVE
  ════════════════════════════ */
  @media (max-width: 768px) {
    /* Nav */
    .nav { padding: 0 16px; }
    .nav-brand { font-size: 13px; padding: 12px 0; margin-right: 16px; }
    .nav-link { padding: 12px 10px; font-size: 12px; }

    /* Header */
    .header-inner { padding: 8px 12px; }

    /* Hide desktop filter bar */
    .filter-bar { display: none; }

    /* Show mobile filter rows */
    .filter-row-1,
    .filter-row-2 { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
    .filter-row-2 { margin-bottom: 0; }

    .filter-label { font-size: 11px; color: #64748b; font-weight: 600; white-space: nowrap; }
    .filter-select { background: #1e293b; border: 1px solid #2d3f56; color: #e2e8f0; padding: 7px 8px; border-radius: 6px; font-size: 12px; outline: none; flex: 1; min-width: 0; }
    .filter-select:focus { border-color: #3b82f6; }
    .filter-input { background: #1e293b; border: 1px solid #2d3f56; color: #e2e8f0; padding: 7px 10px; border-radius: 6px; font-size: 12px; outline: none; flex: 1; min-width: 0; }
    .filter-input:focus { border-color: #3b82f6; }

    /* Container */
    .container { padding: 10px 12px 32px; }

    /* Card head */
    .card-head { padding: 10px 14px; gap: 8px; }
    .card-head-title { font-size: 13px; }
    .row-count { font-size: 11px; padding: 3px 8px; }

    /* Page size selector in card head */
    #selPageSize { font-size: 11px; padding: 3px 6px; }

    /* Summary bar */
    #summaryBar > div { gap: 8px !important; }
    #summaryBar > div > div { min-width: 120px; padding: 12px 14px !important; }
    #summaryBar > div > div > div:first-child { font-size: 10px !important; }
    #summaryBar > div > div > div:nth-child(2) { font-size: 18px !important; }

    /* Table container */
    .table-wrap { max-height: calc(100vh - 280px); overflow-y: auto; }
    table { font-size: 11px; }
    th { padding: 7px 8px; font-size: 10px; }
    td { padding: 7px 8px; }

    /* Pagination */
    .pagination { padding: 10px 12px; gap: 4px; }
    .page-btn { width: 28px; height: 28px; font-size: 12px; }
    .page-info { font-size: 11px; margin-left: 2px; flex-basis: 100%; }

    /* Period dropdown on mobile — full width-ish */
    .period-dropdown { width: calc(100vw - 32px); max-width: 300px; }

    /* Col toggle dropdown */
    .col-toggle-dropdown { right: -4px; width: 180px; }
  }

  @media (max-width: 480px) {
    .nav-brand { font-size: 12px; }
    .nav-link { font-size: 11px; padding: 12px 8px; }
    .container { padding: 8px 10px 24px; }
    .card-head { padding: 9px 12px; }
    .btn { padding: 6px 10px; font-size: 11px; }
    .page-btn { width: 26px; height: 26px; font-size: 11px; }
  }

</style>
</head>
<body>

<div class="sticky-header">
  <nav class="nav">
    <span class="nav-brand">🚗 Volvo DMS</span>
    <a href="/performance.html" class="nav-link">🎯 業績指標</a>
    <a href="/stats.html" class="nav-link">📊 各廠明細</a>
    <a href="/query.html" class="nav-link active">🔍 資料查詢</a>
    <a href="/monthly_report.html" class="nav-link">📋 月報</a>
    <a href="/bonus.html" class="nav-link">💰 獎金表</a>
    <a href="/settings.html" class="nav-link">⚙️ 設定</a>
   <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()" title="切換主題">☀️</button>
  </nav>
  <div class="header-inner">

    <!-- ── Desktop filter (single row) ── -->
    <div class="filter-bar">
      <label>資料表</label>
      <select id="selTable" onchange="onTableChange()">
        <option value="repair_income">🔧 維修收入分類明細</option>
        <option value="tech_performance">👨‍🔧 技師績效工資明細</option>
        <option value="parts_sales">🔩 零件銷售明細</option>
        <option value="business_query">🚗 業務查詢（進廠紀錄）</option>
      </select>
      <label>期間</label>
      <div class="period-selector" id="periodSelectorWrap"></div>
      <label>據點</label>
      <select id="selBranch">
        <option value="">全部</option>
        <option value="AMA">AMA</option>
        <option value="AMC">AMC</option>
        <option value="AMD">AMD</option>
      </select>
      <label>關鍵字</label>
      <input type="text" id="txtSearch" placeholder="關鍵字1 關鍵字2…（空格或逗號＝AND）" style="min-width:220px" onkeydown="if(event.key==='Enter')doQuery()">
      <span id="kwHintBadge" class="kw-badge" style="display:none">🔗 AND × <span id="kwCount">0</span></span>
      <button class="btn btn-primary" onclick="doQuery()">🔍 查詢</button>
      <button class="btn btn-secondary" onclick="resetFilters()">重置</button>
      <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
        <div class="col-toggle-wrap">
          <button class="btn btn-secondary" onclick="toggleColMenu()">⚙️ 欄位</button>
          <div class="col-toggle-dropdown" id="colToggleDropdown"></div>
        </div>
        <button class="btn btn-green" onclick="doExport()">⬇️ 匯出 CSV</button>
      </div>
    </div>

    <!-- ── Mobile filter row 1: 資料表 + 期間 + 據點 ── -->
    <div class="filter-row-1">
      <select class="filter-select" id="selTableMobile" onchange="onTableChangeMobile()" style="flex:2;min-width:0">
        <option value="repair_income">🔧 維修收入</option>
        <option value="tech_performance">👨‍🔧 技師工資</option>
        <option value="parts_sales">🔩 零件銷售</option>
        <option value="business_query">🚗 業務查詢</option>
      </select>
      <div class="period-selector" id="periodSelectorWrapMobile"></div>
      <select class="filter-select" id="selBranchMobile" style="flex:0 0 auto;width:70px">
        <option value="">全部</option>
        <option value="AMA">AMA</option>
        <option value="AMC">AMC</option>
        <option value="AMD">AMD</option>
      </select>
    </div>

    <!-- ── Mobile filter row 2: 搜尋 + 動作按鈕 ── -->
    <div class="filter-row-2">
      <input type="text" class="filter-input" id="txtSearchMobile" placeholder="關鍵字1 關鍵字2…（空格＝AND）" onkeydown="if(event.key==='Enter')doQueryMobile()">
      <button class="btn btn-primary" onclick="doQueryMobile()">🔍</button>
      <button class="btn btn-secondary" onclick="resetFiltersMobile()">重置</button>
      <div style="margin-left:auto;display:flex;gap:5px">
        <div class="col-toggle-wrap">
          <button class="btn btn-secondary" onclick="toggleColMenu()" style="padding:7px 10px">⚙️</button>
          <div class="col-toggle-dropdown" id="colToggleDropdownMobile"></div>
        </div>
        <button class="btn btn-green" onclick="doExport()" style="padding:7px 10px">⬇️</button>
      </div>
    </div>

  </div>
</div>

<div class="container">
  <div id="summaryBar" style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap"></div>
  <div class="card">
    <div class="card-head">
      <div class="card-head-title" id="tableTitle">🔧 維修收入分類明細</div>
      <span id="rowCountBadge" class="row-count">0 筆</span>
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
        <label style="font-size:12px;color:#64748b">每頁</label>
        <select id="selPageSize" style="background:#0f172a;border:1px solid #2d3f56;color:#e2e8f0;padding:4px 6px;border-radius:5px;font-size:12px" onchange="goPage(1)">
          <option value="50">50</option>
          <option value="100" selected>100</option>
          <option value="200">200</option>
          <option value="500">500</option>
        </select>
      </div>
    </div>
    <div class="table-wrap" id="tableWrap" style="max-height:calc(100vh - 300px);overflow-y:auto">
      <div class="empty">請選擇條件後按「查詢」</div>
    </div>
    <div class="pagination" id="paginationWrap" style="display:none"></div>
  </div>
</div>

<script>
// ═══ State ═══
let _allPeriods = [];
let _currentPeriod = '';
let _allRows = [];
let _filteredRows = [];
let _currentPage = 1;
let _sortCol = '';
let _sortDir = 'asc';
let _hiddenCols = new Set();
const _isMobile = () => window.innerWidth <= 768;

// ═══ Sync desktop <-> mobile selectors ═══
function _getTable()  { return _isMobile() ? document.getElementById('selTableMobile').value  : document.getElementById('selTable').value; }
function _getBranch() { return _isMobile() ? document.getElementById('selBranchMobile').value : document.getElementById('selBranch').value; }
function _getSearch() { return _isMobile() ? document.getElementById('txtSearchMobile').value  : document.getElementById('txtSearch').value; }

// Keep both selectors in sync
function _syncSelectors(){
  const tbl    = document.getElementById('selTable').value;
  const branch = document.getElementById('selBranch').value;
  const search = document.getElementById('txtSearch').value;
  document.getElementById('selTableMobile').value  = tbl;
  document.getElementById('selBranchMobile').value = branch;
  document.getElementById('txtSearchMobile').value  = search;
  // sync title
  document.getElementById('tableTitle').textContent = TABLE_DEFS[tbl].title;
  // sync col toggle menus
  buildColMenu();
}

// ═══ Table definitions ═══
const TABLE_DEFS = {
  repair_income: {
    title: '🔧 維修收入分類明細',
    apiBase: '/api/query/repair_income',
    cols: [
      { key:'branch', label:'據點', badge:true },
      { key:'period', label:'期間' },
      { key:'work_order', label:'工作單號' },
      { key:'settle_date', label:'結算日期' },
      { key:'customer', label:'客戶', wrap:true },
      { key:'plate_no', label:'車牌' },
      { key:'account_type_code', label:'帳類代碼' },
      { key:'account_type', label:'帳類' },
      { key:'parts_income', label:'零件收入', num:true, fmt:'K' },
      { key:'accessories_income', label:'配件收入', num:true, fmt:'K' },
      { key:'boutique_income', label:'精品收入', num:true, fmt:'K' },
      { key:'engine_wage', label:'引擎工資', num:true, fmt:'K' },
      { key:'bodywork_income', label:'鈑金收入', num:true, fmt:'K' },
      { key:'paint_income', label:'烤漆收入', num:true, fmt:'K' },
      { key:'carwash_income', label:'洗車美容', num:true, fmt:'K' },
      { key:'outsource_income', label:'外包收入', num:true, fmt:'K' },
      { key:'addon_income', label:'附加服務', num:true, fmt:'K' },
      { key:'total_untaxed', label:'合計(未稅)', num:true, fmt:'K', highlight:true },
      { key:'parts_cost', label:'零件成本(未稅)', num:true, fmt:'K' },
      { key:'service_advisor', label:'服務顧問' },
    ],
    searchKeys: ['work_order','plate_no','customer','service_advisor','account_type'],
    defaultHidden: new Set(['accessories_income','boutique_income','bodywork_income','paint_income','carwash_income','outsource_income','addon_income','parts_cost']),
  },
  tech_performance: {
    title: '👨‍🔧 技師績效工資明細',
    apiBase: '/api/query/tech_performance',
    cols: [
      { key:'branch', label:'據點', badge:true },
      { key:'period', label:'期間' },
      { key:'tech_name_clean', label:'技師姓名' },
      { key:'dispatch_date', label:'出廠日期' },
      { key:'work_order', label:'工作單號' },
      { key:'work_code', label:'工資代碼' },
      { key:'task_content', label:'作業內容', wrap:true },
      { key:'account_type', label:'帳類' },
      { key:'standard_hours', label:'標準工時', num:true },
      { key:'wage', label:'工資', num:true, fmt:'K', highlight:true },
      { key:'discount', label:'折扣' },
      { key:'wage_category', label:'工資類別' },
      { key:'service_advisor', label:'服務顧問' },
    ],
    searchKeys: ['work_order','tech_name_clean','work_code','task_content','account_type','wage_category','service_advisor'],
    defaultHidden: new Set(['discount']),
  },
  parts_sales: {
    title: '🔩 零件銷售明細',
    apiBase: '/api/query/parts_sales',
    cols: [
      { key:'branch', label:'據點', badge:true },
      { key:'period', label:'期間' },
      { key:'category', label:'類別' },
      { key:'order_no', label:'結帳單號' },

// ═══ Period selector (shared logic, renders into a container) ═══
function _buildPeriodSelector(containerId, onSelect) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;
  const now = new Date();
  const thisMonth = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}`;
  const groups = {};
  _allPeriods.forEach(p => { const yr=p.slice(0,4); if(!groups[yr]) groups[yr]=[]; groups[yr].push(p); });
  const label = _currentPeriod
    ? `${_currentPeriod.slice(0,4)}年 ${parseInt(_currentPeriod.slice(4))}月`
    : '全部期間';
  let listHtml = '';
  Object.keys(groups).sort((a,b)=>b-a).forEach(yr => {
    listHtml += `<div class="period-dd-year">${yr}</div><div class="period-dd-months">`;
    for(let mo=12;mo>=1;mo--){
      const p=yr+String(mo).padStart(2,'0');
      const exists=groups[yr].includes(p);
      const isSel=p===_currentPeriod;
      listHtml+=`<div class="period-dd-mo ${isSel?'selected':''} ${exists?'has-data':''}" onclick="${onSelect}('${p}')">${mo}月</div>`;
    }
    listHtml+='</div>';
  });
  const ddId  = containerId + '_dd';
  const btnId = containerId + '_btn';
  wrap.innerHTML=`<div class="period-selector">
    <button class="period-btn" id="${btnId}" type="button" onclick="_tPDC('${btnId}','${ddId}',event)">
      <span>${label}</span><span class="pb-arrow">▼</span>
    </button>
    <div class="period-dropdown" id="${ddId}">
      <div class="period-dd-list">${listHtml}</div>
    </div>
  </div>`;
}

window._tPDC = function(btnId, ddId, e) {
  e.stopPropagation();
  const btn=document.getElementById(btnId), dd=document.getElementById(ddId);
  if(!dd)return;
  const open=dd.classList.contains('open');
  _closeAllPD();
  if(!open){ btn.classList.add('open'); dd.classList.add('open'); }
};
window._closeAllPD = function() {
  document.querySelectorAll('.period-btn.open').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.period-dropdown.open').forEach(d=>d.classList.remove('open'));
};
document.addEventListener('click', _closeAllPD);

function _selectPeriodDesktop(p)  { _currentPeriod=p; _closeAllPD(); _rebuildPeriodSelectors(); }
function _selectPeriodMobile(p)   { _currentPeriod=p; _closeAllPD(); _rebuildPeriodSelectors(); }

function _rebuildPeriodSelectors() {
  _buildPeriodSelector('periodSelectorWrap',       '_selectPeriodDesktop');
  _buildPeriodSelector('periodSelectorWrapMobile', '_selectPeriodMobile');
}

async function loadPeriods(){
  try{
    const periods = await (await fetch('/api/periods')).json();
    _allPeriods = periods;
    const now = new Date();
    const cur = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}`;
    _currentPeriod = periods.includes(cur) ? cur : (periods[0]||'');
    _rebuildPeriodSelectors();
  }catch(e){}
}

function buildColMenu(){
  const tbl = _getTable();
  const def = TABLE_DEFS[tbl];
  // Build both desktop and mobile dropdowns
  const html = def.cols.map(c=>`
    <label class="col-toggle-item">
      <input type="checkbox" ${_hiddenCols.has(c.key)?'':'checked'} onchange="toggleCol('${c.key}',this.checked)">
      ${c.label}
    </label>`).join('');
  document.getElementById('colToggleDropdown').innerHTML = html;

  if (mob) mob.innerHTML = html;
}

function toggleCol(key, visible){
  if(visible) _hiddenCols.delete(key);
  else _hiddenCols.add(key);
  // Sync checkboxes
  document.querySelectorAll(`.col-toggle-item input[onchange*="'${key}'"]`).forEach(cb=>cb.checked=visible);
  renderTable();
}

function toggleColMenu(){
  const isMob = _isMobile();
  const ddId = isMob ? 'colToggleDropdownMobile' : 'colToggleDropdown';
  const dd = document.getElementById(ddId);
  dd.classList.toggle('open');
  if(dd.classList.contains('open')) buildColMenu();

async function _executeQuery(tbl, branch, period){
  const wrap = document.getElementById('tableWrap');
  wrap.innerHTML = '<div class="loading"><span class="spinner"></span>查詢中...</div>';
  document.getElementById('paginationWrap').style.display = 'none';
  document.getElementById('summaryBar').innerHTML = '';

  if(period) params.set('period', period);
  if(branch) params.set('branch', branch);
  try{
    const data = await (await fetch(`/api/query/${tbl}?${params}`)).json();
    if(data.error) throw new Error(data.error);
    _allRows = data.rows || [];
    _sortCol = ''; _sortDir = 'asc';
    _currentPage = 1;
    applySearch();
    renderSummary(tbl, _allRows);
  }catch(e){
    wrap.innerHTML = `<div class="empty" style="color:#ef4444">❌ ${e.message}</div>`;
  }
}

// ═══ Multi-keyword hint ═══
function _updateKwHint(raw) {
  const keywords = raw.trim().split(/[\s,，]+/).filter(Boolean);
  const badge = document.getElementById('kwHintBadge');
  const cnt   = document.getElementById('kwCount');
  if (badge) {
    if (keywords.length >= 2) {
      badge.style.display = 'inline-flex';
      if (cnt) cnt.textContent = keywords.length;
    } else {
      badge.style.display = 'none';
    }
  }
}

// ═══ Search with multi-keyword AND logic ═══
function applySearch(){
  const tbl = _getTable();
  const def = TABLE_DEFS[tbl];
  const raw = _getSearch().trim().toLowerCase();
  // 多關鍵字：空格或逗號分隔，AND 邏輯（每個關鍵字都要符合至少一個欄位）
  const keywords = raw.split(/[\s,，]+/).filter(Boolean);
  if(!keywords.length){
    _filteredRows = [..._allRows];
  } else if(keywords.length === 1){
    _filteredRows = _allRows.filter(row =>
      def.searchKeys.some(k => String(row[k]||'').toLowerCase().includes(keywords[0]))
    );
  } else {
    _filteredRows = _allRows.filter(row =>
      keywords.every(kw =>
        def.searchKeys.some(k => String(row[k]||'').toLowerCase().includes(kw))
      )
    );
  }
  _currentPage = 1;
  if(_sortCol) sortRows();
  _updateKwHint(raw);
  renderTable();
}

function sortRows(){
  const dir = _sortDir === 'asc' ? 1 : -1;
  _filteredRows.sort((a,b)=>{
    const av = a[_sortCol], bv = b[_sortCol];
    if(av===null||av===undefined) return dir;
    if(bv===null||bv===undefined) return -dir;
    if(typeof av==='number'&&typeof bv==='number') return (av-bv)*dir;
    return String(av).localeCompare(String(bv),'zh-TW')*dir;
  });
}

function doSort(col){
  if(_sortCol===col) _sortDir = _sortDir==='asc'?'desc':'asc';
  else { _sortCol=col; _sortDir='asc'; }
  sortRows();
  renderTable();
}

// ═══ Render table ═══
function renderTable(){
  const tbl = _getTable();
  const def = TABLE_DEFS[tbl];
  const visibleCols = def.cols.filter(c => !_hiddenCols.has(c.key));
  const _rawQ = _getSearch().trim().toLowerCase();
  const _kws = _rawQ.split(/[\s,，]+/).filter(Boolean);
  const pageSize = parseInt(document.getElementById('selPageSize').value)||100;
  const totalRows = _filteredRows.length;
  const totalPages = Math.max(1, Math.ceil(totalRows/pageSize));
  if(_currentPage > totalPages) _currentPage = totalPages;
  const start = (_currentPage-1)*pageSize;
  const pageRows = _filteredRows.slice(start, start+pageSize);
  document.getElementById('rowCountBadge').textContent = `${totalRows.toLocaleString()} 筆`;

  const branchColor = {AMA:'#3b82f6', AMC:'#10b981', AMD:'#f59e0b'};
  const fmtNum = (v, fmt) => {
    const n = parseFloat(v||0);
    if(isNaN(n)) return '—';
    if(fmt==='K') return n===0?'—':Math.round(n).toLocaleString();
    return n===0?'—':n.toLocaleString(undefined,{maximumFractionDigits:2});
  };
  // 多關鍵字 highlight：對每個關鍵字依序嘗試，標記第一個找到的
  const highlight = (str, kws) => {
    if(!kws || !kws.length || !str) return str||'';
    const s = String(str);
    const lower = s.toLowerCase();
    for (const q of kws) {
      if (!q) continue;
      const idx = lower.indexOf(q);
      if(idx >= 0) return s.slice(0,idx)+`<mark class="search-highlight">${s.slice(idx,idx+q.length)}</mark>`+s.slice(idx+q.length);
    }
    return s;
  };

  let thead = '<thead><tr>';
  thead += `<th style="width:36px;color:#475569">#</th>`;
  visibleCols.forEach(c=>{
    const sortClass = _sortCol===c.key?`sort-${_sortDir}`:'';
    thead += `<th class="sortable ${sortClass}" onclick="doSort('${c.key}')">${c.label}<span class="sort-icon"></span></th>`;
  });
  thead += '</tr></thead>';

  let tbody = '<tbody>';
  if(!pageRows.length){
    tbody += `<tr><td colspan="${visibleCols.length+1}" class="empty">無符合資料</td></tr>`;
  } else {
    pageRows.forEach((row, ri)=>{
      tbody += '<tr>';
      tbody += `<td style="color:#475569;font-size:11px">${start+ri+1}</td>`;
      visibleCols.forEach(c=>{
        const raw = row[c.key];
        let cellContent;
        if(c.badge && raw){
          const col=branchColor[raw]||'#94a3b8';
          cellContent=`<span style="display:inline-block;padding:1px 6px;border-radius:5px;font-size:10px;font-weight:700;background:${col}22;color:${col}">${raw}</span>`;
        } else if(c.num){
          cellContent = fmtNum(raw, c.fmt);
        } else {
          const str = raw===null||raw===undefined?'':String(raw);
          cellContent = _kws.length ? highlight(str,_kws) : str;
        }
        const numClass = c.num?'num':'';
        const wrapClass = c.wrap?'wrap':'';
        const highlightStyle = c.highlight&&parseFloat(raw||0)>0?'color:#10b981;font-weight:700':'';
        tbody += `<td class="${numClass} ${wrapClass}" style="${highlightStyle}" title="${raw||''}">${cellContent}</td>`;
      });
      tbody += '</tr>';
    });
  }
  tbody += '</tbody>';

  const wrap = document.getElementById('tableWrap');
  wrap.innerHTML = `<table>${thead}${tbody}</table>`;
  renderPagination(totalPages, pageSize, totalRows);
}

function renderPagination(totalPages, pageSize, totalRows){
  const pgWrap = document.getElementById('paginationWrap');
  if(totalRows===0){ pgWrap.style.display='none'; return; }
  pgWrap.style.display='flex';
  const start = (_currentPage-1)*pageSize+1;
  const end = Math.min(_currentPage*pageSize, totalRows);
  let btns = '';
  const addBtn = (label, page, active=false, disabled=false) => {
    btns+=`<button class="page-btn ${active?'active':''}" ${disabled?'disabled':''} onclick="goPage(${page})">${label}</button>`;
  };
  addBtn('«', 1, false, _currentPage===1);
  addBtn('‹', _currentPage-1, false, _currentPage===1);
  const range = _isMobile() ? 1 : 2;
  for(let p=Math.max(1,_currentPage-range);p<=Math.min(totalPages,_currentPage+range);p++){
    addBtn(p, p, p===_currentPage);
  }
  addBtn('›', _currentPage+1, false, _currentPage===totalPages);
  addBtn('»', totalPages, false, _currentPage===totalPages);
  pgWrap.innerHTML = btns + `<span class="page-info">第 ${_currentPage}/${totalPages} 頁 · ${start.toLocaleString()}–${end.toLocaleString()} / 共 ${totalRows.toLocaleString()} 筆</span>`;
}

function goPage(p){
  const pageSize = parseInt(document.getElementById('selPageSize').value)||100;
  const totalPages = Math.ceil(_filteredRows.length/pageSize)||1;
  _currentPage = Math.max(1,Math.min(p,totalPages));
  renderTable();
  document.getElementById('tableWrap').scrollTop = 0;
}

// ═══ Summary KPIs ═══
function renderSummary(tbl, rows){
  const bar = document.getElementById('summaryBar');
  if(!rows.length){ bar.innerHTML=''; return; }
  const n=v=>parseFloat(v||0);
  const fmtK=v=>Math.round(v/1000).toLocaleString()+'K';
  const branchColors={AMA:'#3b82f6',AMC:'#10b981',AMD:'#f59e0b'};
  const kpiCard=(label,value,sub='',color='#e2e8f0')=>`
    <div style="background:#1e293b;border:1px solid #2d3f56;border-radius:10px;padding:14px 18px;min-width:120px">
      <div style="font-size:11px;color:#64748b;margin-bottom:4px">${label}</div>
      <div style="font-size:20px;font-weight:800;color:${color}">${value}</div>
      ${sub?`<div style="font-size:11px;color:#64748b;margin-top:3px">${sub}</div>`:''}
    </div>`;
  let html='';
  if(tbl==='repair_income'){
    const total=rows.reduce((s,r)=>s+n(r.total_untaxed),0);
    const engine=rows.reduce((s,r)=>s+n(r.engine_wage),0);
    const parts=rows.reduce((s,r)=>s+n(r.parts_income),0);
    const count=new Set(rows.map(r=>r.work_order)).size;
    html+=kpiCard('工單數',count.toLocaleString(),'張','#3b82f6');
    html+=kpiCard('總營收(未稅)',fmtK(total),'元','#10b981');
    html+=kpiCard('引擎工資',fmtK(engine),'元');
    html+=kpiCard('零件收入',fmtK(parts),'元');
    const branches=[...new Set(rows.map(r=>r.branch))].sort();
    branches.forEach(br=>{
      const brTotal=rows.filter(r=>r.branch===br).reduce((s,r)=>s+n(r.total_untaxed),0);
      const brCnt=new Set(rows.filter(r=>r.branch===br).map(r=>r.work_order)).size;
      html+=kpiCard(`${br} 營收`,fmtK(brTotal),`${brCnt} 張`,branchColors[br]||'#94a3b8');
    });
  } else if(tbl==='tech_performance'){
    const totalWage=rows.reduce((s,r)=>s+n(r.wage),0);
    const totalHours=rows.reduce((s,r)=>s+n(r.standard_hours),0);
    const techs=new Set(rows.map(r=>r.tech_name_clean)).size;
    html+=kpiCard('技師人數',techs.toLocaleString(),'人','#3b82f6');
    html+=kpiCard('工資總額',fmtK(totalWage),'元','#10b981');
    html+=kpiCard('標準工時',totalHours.toFixed(1),'小時');
    html+=kpiCard('資料筆數',rows.length.toLocaleString(),'筆');
  } else if(tbl==='parts_sales'){
    const totalSales=rows.reduce((s,r)=>s+n(r.sale_price_untaxed),0);
    const totalCost=rows.reduce((s,r)=>s+n(r.cost_untaxed),0);
    const totalQty=rows.reduce((s,r)=>s+n(r.sale_qty),0);
    html+=kpiCard('資料筆數',rows.length.toLocaleString(),'筆');
    html+=kpiCard('銷售額(未稅)',fmtK(totalSales),'元','#10b981');
    html+=kpiCard('成本(未稅)',fmtK(totalCost),'元','#f59e0b');
    html+=kpiCard('毛利',fmtK(totalSales-totalCost),'元','#3b82f6');
    html+=kpiCard('數量',totalQty.toLocaleString(),'件');
  } else if(tbl==='business_query'){
    const count=rows.length;
    const branches=[...new Set(rows.map(r=>r.branch))].sort();
    html+=kpiCard('工單數',count.toLocaleString(),'張','#3b82f6');
    branches.forEach(br=>{
      const brCnt=rows.filter(r=>r.branch===br).length;
      html+=kpiCard(`${br} 工單`,brCnt.toLocaleString(),'張',branchColors[br]||'#94a3b8');
    });
  }
  bar.innerHTML=`<div style="display:flex;gap:8px;flex-wrap:wrap">${html}</div>`;
}

// ═══ Export CSV ═══
function doExport(){
  const tbl = _getTable();
  const def = TABLE_DEFS[tbl];
  const visibleCols = def.cols.filter(c => !_hiddenCols.has(c.key));
  if(!_filteredRows.length){ alert('無資料可匯出'); return; }
  const header = visibleCols.map(c=>c.label).join(',');
  const rows = _filteredRows.map(row =>
    visibleCols.map(c=>{
      const v = row[c.key];
      const s = v===null||v===undefined?'':String(v);
      return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s;
    }).join(',')
  );
  const csv = '\uFEFF' + [header, ...rows].join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const period = _currentPeriod||'全部';
  const branch = _getBranch()||'全部';
  a.download = `${tbl}_${period}_${branch}_${Date.now()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
