<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>月報分析 — 營收趨勢 & WIP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Microsoft JhengHei',sans-serif;background:#0f172a;color:#e2e8f0;}
.root{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:#1e293b;border-bottom:1px solid #2d3f56;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0;position:sticky;top:0;z-index:50;}
.ttl{font-size:13px;font-weight:800;color:#fff;white-space:nowrap;}
.brGroup{display:flex;gap:3px;background:#0f172a;border:1px solid #2d3f56;border-radius:7px;padding:3px;}
.brBtn{padding:4px 12px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:transparent;color:#64748b;transition:all .12s;}
/* period picker */
.pd-wrap{position:relative;}
.pd-btn{display:flex;align-items:center;gap:6px;background:#0f172a;border:1px solid #2d3f56;color:#e2e8f0;padding:5px 10px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;user-select:none;min-width:110px;justify-content:space-between;outline:none;transition:border-color .15s;}
.pd-btn:hover,.pd-btn.open{border-color:#3b82f6;}
.pd-yr{font-size:10px;color:#64748b;margin-right:2px;}
.pd-mo{font-size:15px;font-weight:800;}
.pd-arr{font-size:9px;color:#475569;transition:transform .2s;}
.pd-btn.open .pd-arr{transform:rotate(180deg);color:#3b82f6;}
.pd-dd{position:absolute;top:calc(100% + 6px);left:0;background:#1a2740;border:1px solid #334155;border-radius:10px;box-shadow:0 16px 48px rgba(0,0,0,.8);z-index:999;width:220px;display:none;flex-direction:column;overflow:hidden;}
.pd-dd.open{display:flex;}
.pd-list{overflow-y:auto;max-height:320px;padding:6px 0;}
.pd-list::-webkit-scrollbar{width:4px;}
.pd-list::-webkit-scrollbar-thumb{background:#334155;border-radius:2px;}
.pd-yr-lbl{font-size:10px;font-weight:700;color:#374151;letter-spacing:.06em;padding:8px 14px 4px;display:flex;align-items:center;gap:6px;}
.pd-yr-lbl::after{content:'';flex:1;height:1px;background:#1e3050;}
.pd-months{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:0 8px 8px;}
.pd-mo-item{display:flex;flex-direction:column;align-items:center;padding:7px 4px;border-radius:7px;cursor:pointer;transition:all .12s;border:1px solid transparent;}
.pd-mo-item:hover{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);}
.pd-mo-item.sel{background:rgba(59,130,246,.18);border-color:#3b82f6;}
.pd-mo-item.no-data{opacity:.4;}
.pd-mo-item .mn{font-size:14px;font-weight:800;color:#94a3b8;line-height:1;}
.pd-mo-item.sel .mn{color:#3b82f6;}
.pd-mo-item .ml{font-size:9px;color:#475569;margin-top:2px;}
.pd-mo-item .md{width:4px;height:4px;border-radius:50%;background:transparent;margin-top:3px;}
.pd-mo-item.has-data .md{background:#10b981;}
.pd-mo-item.sel .md{background:#3b82f6;}
.scroll{flex:1;overflow-y:auto;padding:12px 14px 80px;}
.scroll::-webkit-scrollbar{width:4px;}
.scroll::-webkit-scrollbar-thumb{background:#2d3f56;border-radius:2px;}
.secDiv{display:flex;align-items:center;gap:10px;margin:18px 0 14px;font-size:13px;font-weight:800;color:#fff;}
.secDiv::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#2d3f56,transparent);}
.secHd{font-size:12px;font-weight:700;color:#fff;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid #2d3f56;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.card{background:#1a2332;border:1px solid #2d3f56;border-radius:9px;padding:12px 14px;position:relative;}
.kpiRow{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:9px;}
.kpiRow2{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:7px;}
.kc{background:#0c1524;border:1px solid #2d3f56;border-radius:7px;padding:9px 11px;}
.kl{font-size:9px;color:#64748b;font-weight:700;margin-bottom:3px;}
.kv{font-size:16px;font-weight:900;line-height:1.1;}
.ks{font-size:9px;margin-top:2px;color:#475569;}
.g2{display:grid;grid-template-columns:minmax(0,1.8fr) minmax(0,1fr);gap:10px;margin-bottom:10px;}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:10px;}
.leg{display:flex;gap:10px;flex-wrap:wrap;font-size:10px;color:#64748b;margin-bottom:8px;}
.li{display:flex;align-items:center;gap:4px;}
.ld{width:18px;height:3px;border-radius:1px;display:inline-block;}
.ld-d{width:18px;height:0;display:inline-block;border-top:2.5px dashed;}
.noteDot{width:5px;height:5px;border-radius:50%;background:#3b82f6;flex-shrink:0;}
.noteLabel{font-size:10px;font-weight:700;color:#64748b;margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.noteBox{width:100%;background:#0c1524;border:1px solid #2d3f56;color:#e2e8f0;border-radius:6px;padding:8px 10px;font-size:11px;line-height:1.7;resize:vertical;min-height:96px;outline:none;transition:border-color .15s;font-family:inherit;}
.noteBox:focus{border-color:#3b82f6;}
.noteBox::placeholder{color:#243656;}
.bar-bg{background:#0c1524;border-radius:3px;height:5px;}
.dlBtn{position:absolute;top:8px;right:8px;background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.25);border-radius:5px;padding:3px 8px;font-size:10px;font-weight:700;cursor:pointer;z-index:2;}
.dlBtn:hover{background:rgba(59,130,246,.28);}
.savebar{background:#1e293b;border-top:1px solid #2d3f56;padding:8px 14px;display:flex;align-items:center;gap:8px;position:fixed;bottom:0;left:0;right:0;z-index:50;}
.saveBtn{padding:5px 16px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;background:#3b82f6;color:#fff;border:none;}
.saveBtn:disabled{opacity:.5;cursor:default;}
.saveOk{font-size:11px;color:#10b981;opacity:0;transition:opacity .3s;}
.nSt{font-size:10px;color:#64748b;}
.ovl{position:fixed;inset:0;background:rgba(15,23,42,.8);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px);}
.ovlBox{background:#1a2332;border:1px solid #2d3f56;border-radius:10px;padding:20px 28px;text-align:center;}
.sp{display:inline-block;width:22px;height:22px;border:2.5px solid #2d3f56;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px;}
.sSp{display:inline-block;width:10px;height:10px;border:1.5px solid #2d3f56;border-top-color:#3b82f6;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:800px){.g2{grid-template-columns:1fr;}.g3{grid-template-columns:1fr;}.kpiRow{grid-template-columns:repeat(2,1fr);}.kpiRow2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="root">

<div class="topbar">
  <div class="ttl">📊 月報分析</div>
  <div class="pd-wrap" id="pdWrap">
    <button class="pd-btn" id="pdBtn" onclick="togglePD(event)">
      <span><span class="pd-yr" id="pdYr">--</span><span class="pd-mo" id="pdMo">月</span></span>
      <span class="pd-arr">▼</span>
    </button>
    <div class="pd-dd" id="pdDd"><div class="pd-list" id="pdList"></div></div>
  </div>
  <div class="brGroup">
    <button class="brBtn" id="bt-ALL" onclick="setBr('ALL')">集團</button>
    <button class="brBtn" id="bt-AMA" onclick="setBr('AMA')">AMA</button>
    <button class="brBtn" id="bt-AMC" onclick="setBr('AMC')">AMC</button>
    <button class="brBtn" id="bt-AMD" onclick="setBr('AMD')">AMD</button>
  </div>
  <div id="topBadge" style="font-size:10px;color:#64748b"></div>
  <div id="topStatus" style="margin-left:auto;font-size:10px;color:#475569"></div>
</div>

<div class="scroll">
<div class="secDiv">🔶 營收趨勢分析</div>

<!-- 有費 -->
<div style="margin-bottom:18px">
  <div class="kpiRow" id="kpi_paid"></div>
  <div class="g2">
    <div class="card">
      <button class="dlBtn" onclick="dlChart('c_paid','有費營收')">⬇ 下載</button>
      <div class="leg">
        <span class="li"><span class="ld" style="background:#f97316"></span>今年實際</span>
        <span class="li"><span class="ld-d" style="border-top-color:#94a3b8"></span>去年同期</span>
        <span class="li"><span class="ld-d" style="border-top-color:#fbbf24"></span>預算目標</span>
      </div>
      <div style="position:relative;height:185px"><canvas id="c_paid"></canvas></div>
    </div>
    <div class="card" style="display:flex;flex-direction:column">
      <div class="noteLabel"><span class="noteDot"></span>有費說明</div>
      <textarea class="noteBox" style="flex:1" id="n_paid" placeholder="有費說明…&#10;・達成率 / YoY&#10;・影響因素&#10;・下月方向"></textarea>
    </div>
  </div>
</div>

<!-- 一般/鈑烤/延保 -->
<div class="g3" style="margin-bottom:18px">
  <div>
    <div class="secHd">💙 一般（P3）<span style="font-size:9px;color:#64748b">千元</span></div>
    <div class="kpiRow2" id="kpi_gen"></div>
    <div class="card" style="margin-bottom:7px">
      <button class="dlBtn" onclick="dlChart('c_gen','一般營收')">⬇</button>
      <div class="leg"><span class="li"><span class="ld" style="background:#3b82f6"></span>今年</span><span class="li"><span class="ld-d" style="border-top-color:#7dd3fc"></span>去年</span><span class="li"><span class="ld-d" style="border-top-color:#93c5fd"></span>目標</span></div>
      <div style="position:relative;height:145px"><canvas id="c_gen"></canvas></div>
    </div>
    <div class="card"><div class="noteLabel"><span class="noteDot"></span>一般說明</div>
      <textarea class="noteBox" id="n_gen" style="min-height:70px" placeholder="一般說明…"></textarea></div>
  </div>
  <div>
    <div class="secHd">🔨 鈑烤（PC8+PC3）<span style="font-size:9px;color:#64748b">千元</span></div>
    <div class="kpiRow2" id="kpi_bw"></div>
    <div class="card" style="margin-bottom:7px">
      <button class="dlBtn" onclick="dlChart('c_bw','鈑烤營收')">⬇</button>
      <div class="leg"><span class="li"><span class="ld" style="background:#8b5cf6"></span>今年</span><span class="li"><span class="ld-d" style="border-top-color:#c4b5fd"></span>去年</span><span class="li"><span class="ld-d" style="border-top-color:#ddd6fe"></span>目標</span></div>
      <div style="position:relative;height:145px"><canvas id="c_bw"></canvas></div>
    </div>
    <div class="card"><div class="noteLabel"><span class="noteDot"></span>鈑烤說明</div>
      <textarea class="noteBox" id="n_bw" style="min-height:70px" placeholder="鈑烤說明…"></textarea></div>
  </div>
  <div>
    <div class="secHd">🛡️ 延保（P9）<span style="font-size:9px;color:#64748b">千元</span></div>
    <div class="kpiRow2" id="kpi_ext"></div>
    <div class="card" style="margin-bottom:7px">
      <button class="dlBtn" onclick="dlChart('c_ext','延保營收')">⬇</button>
      <div class="leg"><span class="li"><span class="ld" style="background:#10b981"></span>今年</span><span class="li"><span class="ld-d" style="border-top-color:#6ee7b7"></span>去年</span><span class="li"><span class="ld-d" style="border-top-color:#a7f3d0"></span>目標</span></div>
      <div style="position:relative;height:145px"><canvas id="c_ext"></canvas></div>
    </div>
    <div class="card"><div class="noteLabel"><span class="noteDot"></span>延保說明</div>
      <textarea class="noteBox" id="n_ext" style="min-height:70px" placeholder="延保說明…"></textarea></div>
  </div>
</div>

<!-- 進廠 + 單車 -->
<div style="margin-bottom:10px">
  <div class="g2">
    <div>
      <div class="card" style="margin-bottom:8px">
        <button class="dlBtn" onclick="dlChart('c_cars','進廠台數')">⬇</button>
        <div style="font-size:10px;font-weight:700;color:#64748b;margin-bottom:4px">每月進廠台數</div>
        <div class="leg"><span class="li"><span class="ld" style="background:#3b82f6"></span>今年</span></div>
        <div style="position:relative;height:130px"><canvas id="c_cars"></canvas></div>
      </div>
      <div class="card">
        <button class="dlBtn" onclick="dlChart('c_rpv','單車銷售額')">⬇</button>
        <div style="font-size:10px;font-weight:700;color:#64748b;margin-bottom:4px">單車銷售額（元/台）</div>
        <div class="leg"><span class="li"><span class="ld" style="background:#10b981"></span>今年</span></div>
        <div style="position:relative;height:130px"><canvas id="c_rpv"></canvas></div>
      </div>
    </div>
    <div class="card" style="display:flex;flex-direction:column">
      <div class="noteLabel"><span class="noteDot"></span>進廠 & 單車說明</div>
      <textarea class="noteBox" style="flex:1" id="n_cars" placeholder="進廠 & 單車說明…&#10;・本月實際 vs 目標&#10;・YoY 增減&#10;・單車銷售額變化"></textarea>
    </div>
  </div>
</div>

<!-- WIP -->
<div class="secDiv">🔧 WIP 未結工單 — 天數分層</div>
<div class="kpiRow" id="kpiWip" style="margin-bottom:10px"></div>
<div class="g2" style="margin-bottom:10px">
  <div class="card">
    <button class="dlBtn" onclick="dlChart('cWipBar','WIP分層')">⬇ 下載</button>
    <div class="leg">
      <span class="li"><span class="ld" style="background:#10b981"></span>&lt;30天</span>
      <span class="li"><span class="ld" style="background:#f59e0b"></span>30~90天</span>
      <span class="li"><span class="ld" style="background:#ef4444"></span>&gt;90天</span>
    </div>
    <div style="position:relative;height:185px"><canvas id="cWipBar"></canvas></div>
  </div>
  <div class="card" style="display:flex;flex-direction:column">
    <div class="noteLabel"><span class="noteDot"></span>WIP 總覽說明</div>
    <textarea class="noteBox" style="flex:1" id="n_wip_overview" placeholder="WIP 說明…&#10;・本月總金額 vs 上月增減&#10;・積壓原因&#10;・行動計畫"></textarea>
  </div>
</div>

<div class="secHd" style="margin-bottom:8px">各據點分層<span style="font-size:9px;color:#64748b;font-weight:400;margin-left:6px">金額(K) & 件數</span></div>
<div class="g3" id="wipCards" style="margin-bottom:10px"></div>

<div class="g2">
  <div>
    <div class="card" style="margin-bottom:8px">
      <button class="dlBtn" onclick="dlChart('cWipPie','WIP佔比')">⬇</button>
      <div style="font-size:10px;font-weight:700;color:#64748b;margin-bottom:4px">各層佔比（本月）</div>
      <div style="position:relative;height:155px"><canvas id="cWipPie"></canvas></div>
    </div>
    <div class="card">
      <button class="dlBtn" onclick="dlChart('cWipPct','逾30天佔比')">⬇</button>
      <div style="font-size:10px;font-weight:700;color:#64748b;margin-bottom:4px">逾30天 / 逾90天 佔比（%）</div>
      <div style="position:relative;height:120px"><canvas id="cWipPct"></canvas></div>
    </div>
  </div>
  <div>
    <div class="card" style="margin-bottom:8px">
      <div class="noteLabel"><span class="noteDot"></span>30天以上說明</div>
      <textarea class="noteBox" id="n_wip_30" placeholder="30天以上說明…&#10;・滯留原因&#10;・等零件案件&#10;・核賠中&#10;・預計結清時間"></textarea>
    </div>
    <div class="card">
      <div class="noteLabel"><span class="noteDot"></span>90天以上說明</div>
      <textarea class="noteBox" id="n_wip_90" placeholder="90天以上說明…&#10;・各工單詳細原因&#10;・責任歸屬&#10;・跟催進度&#10;・預計結清日"></textarea>
    </div>
  </div>
</div>
</div>

<div class="savebar">
  <button class="saveBtn" id="saveBtn" onclick="saveAll()">💾 儲存說明</button>
  <span id="saveOk" class="saveOk">✅ 已儲存</span>
  <span id="nSt" class="nSt"></span>
  <div style="margin-left:auto;font-size:10px;color:#475569">說明儲存至伺服器資料庫</div>
</div>

<div class="ovl" id="ovl" style="display:none">
  <div class="ovlBox">
    <div class="sp"></div>
    <div style="font-size:12px;color:#64748b;margin-top:4px" id="ovlMsg">讀取中…</div>
  </div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ══ 常數 ══
const BRCOLS={AMA:'#3b82f6',AMC:'#10b981',AMD:'#f59e0b'};
const BRS_ALL=['AMA','AMC','AMD'];
const NOTE_IDS=['n_paid','n_gen','n_bw','n_ext','n_cars','n_wip_overview','n_wip_30','n_wip_90'];
const MODULE='monthly';

let curBr='ALL', curPeriod='', periods=[], tData={}, wipRows=[], wipPrev=[], charts={};

// ══ Fetch helper ══
async function sf(url){try{const r=await fetch(url);if(!r.ok)return null;return await r.json();}catch(e){return null;}}

// ══ 期間 ══
function prevMonths(base,n){
  let[y,m]=[parseInt(base.slice(0,4)),parseInt(base.slice(4))];
  const out=[];
  for(let i=n-1;i>=0;i--){let pm=m-i,py=y;while(pm<=0){pm+=12;py--;}out.push(`${py}${String(pm).padStart(2,'0')}`);}
  return out;
}
function prevP(p){let y=parseInt(p.slice(0,4)),m=parseInt(p.slice(4));return m===1?`${y-1}12`:`${y}${String(m-1).padStart(2,'0')}`;}
function fmtP(p){return p?`${p.slice(0,4)}/${p.slice(4)}`:'—';}

// ══ API 資料提取（對應 routes/stats.js + routes/revenue.js 實際格式）══

// /api/stats/income-breakdown → { branches:{ AMA:{general_total,bodywork_total,paid_total,extended,...} } }
function exBD(res,br){
  if(!res?.branches)return{paid:0,gen:0,bw:0,ext:0};
  const brs=br==='ALL'?BRS_ALL:[br];
  let paid=0,gen=0,bw=0,ext=0;
  brs.forEach(b=>{const d=res.branches[b]||{};paid+=+(d.paid_total||0);gen+=+(d.general_total||0);bw+=+(d.bodywork_total||0);ext+=+(d.extended||0);});
  return{paid:paid/1000,gen:gen/1000,bw:bw/1000,ext:ext/1000};
}

// /api/revenue-targets → Array<{branch,period,paid_target,paid_last_year,general_target,general_last_year,...}>
function exTgt(res,br){
  if(!Array.isArray(res))return{paid:0,gen:0,bw:0,ext:0,paid_ly:0,gen_ly:0,bw_ly:0,ext_ly:0};
  const brs=br==='ALL'?BRS_ALL:[br];
  let paid=0,gen=0,bw=0,ext=0,pl=0,gl=0,bl=0,el=0;
  res.filter(r=>brs.includes(r.branch)).forEach(r=>{
    paid+=+(r.paid_target||0);gen+=+(r.general_target||0);bw+=+(r.bodywork_target||0);ext+=+(r.extended_target||0);
    pl+=+(r.paid_last_year||0);gl+=+(r.general_last_year||0);bl+=+(r.bodywork_last_year||0);el+=+(r.extended_last_year||0);
  });
  return{paid:paid/1000,gen:gen/1000,bw:bw/1000,ext:ext/1000,paid_ly:pl/1000,gen_ly:gl/1000,bw_ly:bl/1000,ext_ly:el/1000};
}

// /api/stats/daily → { daily:[...], summary:[{branch,total_cars,...}] }
function exCars(res,br){
  if(!res?.summary)return{act:0};
  const brs=br==='ALL'?BRS_ALL:[br];
  let act=0;
  res.summary.filter(r=>brs.includes(r.branch)).forEach(r=>{act+=+(r.total_cars||0);});
  return{act};
}

// /api/stats/wip → { rows:[{work_order,branch,sales_amt(=repair_amount),days_open,wip_status,...}] }
function bucketWip(rows,br){
  const f=br==='ALL'?rows:rows.filter(r=>r.branch===br);
  const lt30={amt:0,cnt:0},m30={amt:0,cnt:0},gt90={amt:0,cnt:0},urg={amt:0,cnt:0};
  f.forEach(r=>{
    const days=r.days_open!=null?parseFloat(r.days_open):null;
    const amt=+(r.sales_amt||0)/1000;  // sales_amt = repair_amount（業務查詢）
    if(days===null||days<30){lt30.amt+=amt;lt30.cnt++;}
    else if(days<=90){m30.amt+=amt;m30.cnt++;}
    else{gt90.amt+=amt;gt90.cnt++;}
    if(r.wip_status==='已可結帳'){urg.amt+=amt;urg.cnt++;}
  });
  return{lt30,m30,gt90,urg,total:{amt:lt30.amt+m30.amt+gt90.amt,cnt:f.length}};
}

// ══ Period picker ══
let dbPeriods=new Set(); // 有實際資料的期間

function nowYM(){
  const n=new Date(Date.now()+8*3600000);
  return`${n.getUTCFullYear()}${String(n.getUTCMonth()+1).padStart(2,'0')}`;
}
function defaultPeriod(){
  // 優先上個月；若不在清單再往前找有資料的月份
  const cur=nowYM();
  const y=parseInt(cur.slice(0,4)),m=parseInt(cur.slice(4));
  const prev=m===1?`${y-1}12`:`${y}${String(m-1).padStart(2,'0')}`;
  if(periods.includes(prev)) return prev;
  // fallback: 最近一個有 DB 資料的期間
  const withData=periods.filter(p=>dbPeriods.has(p)).sort().reverse();
  return withData[0]||periods[periods.length-1]||'';
}

function renderPD(){
  const list=document.getElementById('pdList'); if(!list)return;
  const groups={};
  // 只顯示有資料的期間（若 dbPeriods 空就顯示全部）
  const show=dbPeriods.size>0?periods.filter(p=>dbPeriods.has(p)):periods;
  show.slice().reverse().forEach(p=>{
    const yr=p.slice(0,4);
    if(!groups[yr])groups[yr]=[];
    groups[yr].push(p);
  });
  let html='';
  Object.keys(groups).sort((a,b)=>b-a).forEach(yr=>{
    html+=`<div class="pd-yr-lbl">${yr}</div><div class="pd-months">`;
    for(let mo=12;mo>=1;mo--){
      const p=`${yr}${String(mo).padStart(2,'0')}`;
      const has=dbPeriods.has(p)||dbPeriods.size===0;
      const inList=show.includes(p);
      if(!inList)continue;
      const sel=p===curPeriod;
      html+=`<div class="pd-mo-item ${sel?'sel':''} ${has?'has-data':'no-data'}" onclick="selectPD('${p}')">
        <span class="mn">${mo}</span><span class="ml">月</span><span class="md"></span>
      </div>`;
    }
    html+='</div>';
  });
  list.innerHTML=html||'<div style="padding:16px;text-align:center;color:#475569;font-size:12px">無資料</div>';
  // 更新按鈕顯示
  if(curPeriod){
    const el=document.getElementById('pdYr'); if(el)el.textContent=curPeriod.slice(0,4)+'年';
    const el2=document.getElementById('pdMo'); if(el2)el2.textContent=parseInt(curPeriod.slice(4))+'月';
  }
}
function togglePD(e){
  e.stopPropagation();
  const btn=document.getElementById('pdBtn'),dd=document.getElementById('pdDd');
  const open=dd.classList.contains('open');
  closePD();
  if(!open){btn.classList.add('open');dd.classList.add('open');}
}
function closePD(){
  document.querySelectorAll('.pd-btn.open').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.pd-dd.open').forEach(d=>d.classList.remove('open'));
}
function selectPD(p){curPeriod=p;closePD();renderPD();loadAll();}
document.addEventListener('click',closePD);

// ══ Init ══
async function init(){
  showLoad('讀取期間…');
  const raw=await sf('/api/periods');
  // /api/periods 回傳 DESC 順序，包含補全的月份
  // 先取有實際資料的（透過 income-breakdown 第一筆確認，或直接信任 periods 前段）
  periods=Array.isArray(raw)?raw.filter(Boolean).sort():[];

  // 嘗試判斷哪些期間有真實資料：取最近12個月的 income-breakdown 快速確認
  const checkPeriods=periods.slice(-12); // 最近12個
  await Promise.all(checkPeriods.map(async p=>{
    const r=await sf(`/api/stats/income-breakdown?period=${p}`);
    if(r?.branches){
      const hasData=Object.values(r.branches).some(b=>(b.paid_total||0)>0);
      if(hasData) dbPeriods.add(p);
    }
  }));

  curPeriod=defaultPeriod();
  renderPD();
  setBr('ALL');
}

// ══ Load ══
async function loadAll(){
  if(!curPeriod){hideLoad();return;}
  showLoad('讀取營收趨勢…');
  const last5=prevMonths(curPeriod,5);
  const prev=prevP(curPeriod);
  // branch param：不傳時 API 回傳全部廠別（我們再自行加總）
  const bpQ=curBr==='ALL'?'':`&branch=${curBr}`;
  const tR=await Promise.all(last5.map(async p=>{
    const[bd,tgt,daily]=await Promise.all([
      sf(`/api/stats/income-breakdown?period=${p}${bpQ}`),
      sf(`/api/revenue-targets?period=${p}${bpQ}`),
      sf(`/api/stats/daily?period=${p}${bpQ}`),
    ]);
    return{period:p,bd:exBD(bd,curBr),tgt:exTgt(tgt,curBr),cars:exCars(daily,curBr)};
  }));
  tData={};tR.forEach(r=>{tData[r.period]=r;});
  showLoad('讀取 WIP…');
  const[w1,w2]=await Promise.all([
    sf(`/api/stats/wip?period=${curPeriod}${bpQ}`),
    sf(`/api/stats/wip?period=${prev}${bpQ}`),
  ]);
  wipRows=Array.isArray(w1?.rows)?w1.rows:[];
  wipPrev=Array.isArray(w2?.rows)?w2.rows:[];
  buildAll();
  await loadNotes();
  hideLoad();
}

// ══ Chart factory ══
function mkLine(id,labels,act,ly,tgt,lc,lyc,tgtc,yFmt=null,showTgt=true){
  const tc='#64748b';
  const allV=[...act,...(ly||[]),...(showTgt&&tgt?tgt:[])].filter(v=>v>0);
  const minV=allV.length?Math.min(...allV)*0.88:0,maxV=allV.length?Math.max(...allV)*1.08:100;
  const fmt=yFmt||(v=>v>=1000?Math.round(v/1000)+'K':Math.round(v));
  const ds=[
    {label:'今年實際',data:act,borderColor:lc,backgroundColor:lc+'22',tension:.35,fill:true,pointRadius:4,borderWidth:3,
     pointBackgroundColor:act.map((v,i)=>tgt&&tgt[i]>0&&v>=tgt[i]?'#10b981':'#ef4444'),pointBorderColor:'#0f172a',pointBorderWidth:1.5},
  ];
  if(ly&&ly.some(v=>v>0)) ds.push({label:'去年同期',data:ly,borderColor:lyc,borderDash:[7,4],tension:.35,fill:false,pointRadius:2,borderWidth:2.5});
  if(showTgt&&tgt&&tgt.some(v=>v>0)) ds.push({label:'預算目標',data:tgt,borderColor:tgtc,borderDash:[4,3],tension:.35,fill:false,pointRadius:2,borderWidth:2.5});
  return new Chart(document.getElementById(id),{
    type:'line',data:{labels,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.raw)}`}}},
      scales:{x:{ticks:{font:{size:9},color:tc},grid:{color:'rgba(255,255,255,0.04)'}},
              y:{ticks:{font:{size:9},color:tc,callback:fmt},grid:{color:'rgba(255,255,255,0.04)'},min:Math.floor(minV/100)*100,max:Math.ceil(maxV/100)*100}}}
  });
}
function destCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}

// ══ KPI helpers ══
const fK=v=>(+v||0)<1?'0K':Math.round(+v).toLocaleString()+'K';
const achC=p=>p>=100?'#10b981':p>=85?'#f59e0b':'#ef4444';
const growC=(a,b)=>a>=b?'#10b981':'#ef4444';
const pct=(a,t)=>t>0?(a/t*100).toFixed(0)+'%':'0%';
const liIdx=arr=>{for(let i=arr.length-1;i>=0;i--)if(arr[i]>0)return i;return arr.length-1;};

function rKpi4(id,act,tgt,ly,col){
  const li=liIdx(act),a=act[li],t=tgt[li],l=ly[li];
  const ach=t>0?a/t*100:null,yoy=l>0?(a-l)/l*100:null;
  const ytdA=act.reduce((s,v)=>s+v,0),ytdT=tgt.reduce((s,v)=>s+v,0),ytdAch=ytdT>0?ytdA/ytdT*100:null;
  document.getElementById(id).innerHTML=`
    <div class="kc"><div class="kl">本月實際</div><div class="kv" style="color:${col}">${fK(a)}</div><div class="ks">目標 ${fK(t)}</div></div>
    <div class="kc" style="border-color:${achC(ach||0)}44"><div class="kl">達成率</div><div class="kv" style="color:${achC(ach||0)}">${ach!==null?ach.toFixed(1)+'%':'—'}</div><div class="ks">${ach>=100?'✅ 達標':ach?ach.toFixed(0)+'%':''}</div></div>
    <div class="kc" style="border-color:${yoy>=0?'#10b98133':'#ef444433'}"><div class="kl">YoY vs 去年</div><div class="kv" style="color:${yoy>=0?'#10b981':'#ef4444'}">${yoy!==null?(yoy>=0?'+':'')+yoy.toFixed(1)+'%':'—'}</div><div class="ks">去年 ${fK(l)}</div></div>
    <div class="kc"><div class="kl">YTD 達成率</div><div class="kv" style="color:${achC(ytdAch||0)}">${ytdAch!==null?ytdAch.toFixed(1)+'%':'—'}</div><div class="ks">累計 ${fK(ytdA)}</div></div>`;
}
function rKpi2(id,act,tgt,ly,col){
  const li=liIdx(act),a=act[li],t=tgt[li],l=ly[li];
  const ach=t>0?a/t*100:null,yoy=l>0?(a-l)/l*100:null;
  document.getElementById(id).innerHTML=`
    <div class="kc" style="border-color:${achC(ach||0)}44"><div class="kl">本月 / 達成率</div><div class="kv" style="color:${col};font-size:14px">${fK(a)}</div><div class="ks" style="color:${achC(ach||0)}">${ach!==null?ach.toFixed(0)+'%':'—'} | 目標 ${fK(t)}</div></div>
    <div class="kc" style="border-color:${yoy>=0?'#10b98133':'#ef444433'}"><div class="kl">YoY</div><div class="kv" style="color:${yoy>=0?'#10b981':'#ef4444'};font-size:14px">${yoy!==null?(yoy>=0?'+':'')+yoy.toFixed(1)+'%':'—'}</div><div class="ks">去年 ${fK(l)}</div></div>`;

    setTimeout(()=>{ok.style.opacity='0';},2500);
  }catch(e){st.textContent='❌ 儲存失敗';st.style.color='#ef4444';setTimeout(()=>{st.textContent='';},3000);}
  finally{btn.disabled=false;btn.textContent='💾 儲存說明';}
}

init();
</script>
