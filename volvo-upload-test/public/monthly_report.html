<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>月報分析 — 營收趨勢 & WIP</title>
<style>
/* ═══ Theme Variables ═══ */
:root{
  --bg:#0f172a; --bg2:#1a2332; --bg3:#0c1524;
  --bar:#1e293b; --bdr:#2d3f56; --bdr2:#334155;
  --txt:#e2e8f0; --txt2:#94a3b8; --txt3:#64748b;
  --accent:#3b82f6;
  --chart-grid:rgba(255,255,255,0.04);
  --chart-tick:#64748b;
  --shadow:0 16px 48px rgba(0,0,0,.8);
}
[data-theme="light"]{
  --bg:#f0f4f8; --bg2:#ffffff; --bg3:#f8fafc;
  --bar:#ffffff; --bdr:#e2e8f0; --bdr2:#cbd5e1;
  --txt:#1e293b; --txt2:#475569; --txt3:#94a3b8;
  --chart-grid:rgba(0,0,0,0.05);
  --chart-tick:#475569;
  --shadow:0 8px 32px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--txt);transition:background .25s,color .25s;font-size:14px;}
.root{display:flex;flex-direction:column;min-height:100vh;}

/* Topbar */
.topbar{background:var(--bar);border-bottom:1px solid var(--bdr);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0;position:sticky;top:0;z-index:50;}
.ttl{font-size:15px;font-weight:800;color:var(--txt);white-space:nowrap;}
.brGroup{display:flex;gap:3px;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;padding:3px;}
.brBtn{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--txt3);transition:all .12s;}
.themeBtn{padding:5px 10px;border-radius:7px;font-size:13px;cursor:pointer;border:1px solid var(--bdr);background:var(--bg3);color:var(--txt);font-weight:600;}

/* Period picker */
.pd-wrap{position:relative;}
.pd-btn{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--bdr);color:var(--txt);padding:5px 12px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;user-select:none;min-width:120px;justify-content:space-between;outline:none;}
.pd-btn:hover,.pd-btn.open{border-color:var(--accent);}
.pd-yr{font-size:11px;color:var(--txt3);margin-right:2px;}
.pd-mo{font-size:16px;font-weight:800;}
.pd-arr{font-size:10px;color:var(--txt3);transition:transform .2s;}
.pd-btn.open .pd-arr{transform:rotate(180deg);color:var(--accent);}
.pd-dd{position:absolute;top:calc(100% + 6px);left:0;background:var(--bg2);border:1px solid var(--bdr2);border-radius:10px;box-shadow:var(--shadow);z-index:999;width:220px;display:none;flex-direction:column;overflow:hidden;}
.pd-dd.open{display:flex;}
.pd-list{overflow-y:auto;max-height:320px;padding:6px 0;}
.pd-list::-webkit-scrollbar{width:4px;}
.pd-list::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}
.pd-yr-lbl{font-size:11px;font-weight:700;color:var(--txt3);letter-spacing:.06em;padding:8px 14px 4px;display:flex;align-items:center;gap:6px;}
.pd-yr-lbl::after{content:'';flex:1;height:1px;background:var(--bdr);}
.pd-months{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:0 8px 8px;}
.pd-mo-item{display:flex;flex-direction:column;align-items:center;padding:8px 4px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all .12s;}
.pd-mo-item:hover{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);}
.pd-mo-item.sel{background:rgba(59,130,246,.18);border-color:var(--accent);}
.pd-mo-item .mn{font-size:15px;font-weight:800;color:var(--txt2);}
.pd-mo-item.sel .mn{color:var(--accent);}
.pd-mo-item .ml{font-size:10px;color:var(--txt3);margin-top:2px;}
.pd-mo-item .md{width:5px;height:5px;border-radius:50%;background:#10b981;margin-top:3px;}
.pd-mo-item.sel .md{background:var(--accent);}

/* Layout */
.scroll{flex:1;overflow-y:auto;padding:12px 14px 90px;}
.scroll::-webkit-scrollbar{width:5px;}
.scroll::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px;}

/* Drag sections */
.drag-sec{border-radius:10px;transition:opacity .2s,box-shadow .2s;}
.drag-sec.dragging{opacity:.45;}
.drag-sec.drag-over{box-shadow:0 0 0 2px var(--accent),0 0 24px rgba(59,130,246,.25);}
.sec-wrap{padding-bottom:18px;}
.secDiv{display:flex;align-items:center;gap:8px;margin:14px 0 12px;font-size:14px;font-weight:800;color:var(--txt);}
.secDiv::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--bdr),transparent);}
.drag-handle{cursor:grab;color:var(--txt3);font-size:18px;padding:1px 4px;user-select:none;}
.drag-handle:hover{color:var(--accent);}
.drag-handle:active{cursor:grabbing;}

/* Cards */
.secHd{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:13px 15px;position:relative;}
.kpiRow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.kpiRow2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px;}
.kc{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:11px 13px;}
.kl{font-size:11px;color:var(--txt3);font-weight:700;margin-bottom:4px;}
.kv{font-size:20px;font-weight:900;line-height:1.1;}
.ks{font-size:11px;margin-top:3px;color:var(--txt3);}
.g2{display:grid;grid-template-columns:minmax(0,1.8fr) minmax(0,1fr);gap:10px;margin-bottom:10px;}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:10px;}
.leg{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--txt3);margin-bottom:8px;}
.li{display:flex;align-items:center;gap:4px;}
.ld{width:20px;height:3px;border-radius:1px;display:inline-block;}
.ld-d{width:20px;height:0;display:inline-block;border-top:2.5px dashed;}
.bar-bg{background:var(--bg3);border-radius:3px;height:6px;}
.dlBtnI{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.25);border-radius:5px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.dlBtnI:hover{background:rgba(59,130,246,.28);}
.dlBtn{position:absolute;top:8px;right:8px;background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.25);border-radius:5px;padding:3px 9px;font-size:11px;font-weight:700;cursor:pointer;z-index:2;}
.dlBtn:hover{background:rgba(59,130,246,.28);}
.cPBar{display:flex;gap:3px;}
.cPBtn{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--bdr);background:transparent;color:var(--txt3);transition:all .12s;}
.cPBtn:hover{border-color:var(--accent);color:var(--accent);}
.cPBtn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.avgRow{display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:11px;color:var(--txt3);}
.avgRow strong{color:var(--txt);}
.avgDash{width:18px;height:0;display:inline-block;border-top:2px dashed rgba(255,255,255,.35);}
[data-theme="light"] .avgDash{border-top-color:rgba(0,0,0,.3);}

/* ═══ Rich Editor ═══ */
.noteLabel{font-size:12px;font-weight:700;color:var(--txt3);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.noteDot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}

/* Row container */
.rrow{display:flex;align-items:stretch;margin-bottom:6px;gap:0;}
.rrow-handle{cursor:grab;color:var(--txt3);padding:0 5px;display:flex;align-items:center;font-size:16px;flex-shrink:0;user-select:none;transition:color .12s;}
.rrow-handle:hover{color:var(--accent);}
.rrow-handle:active{cursor:grabbing;}
.rrow-body{display:flex;flex:1;align-items:stretch;gap:0;border:1px solid var(--bdr);border-radius:8px;overflow:hidden;min-width:0;}
.rrow.dragging{opacity:.4;}
.rrow.drag-over .rrow-body{outline:2px solid var(--accent);outline-offset:-1px;}

/* Item */
.ritem{position:relative;display:flex;flex-direction:column;min-width:60px;border-right:1px solid var(--bdr);}
.ritem:last-of-type{border-right:none;}
.ritem-tb{display:flex;align-items:center;gap:3px;padding:3px 6px;background:var(--bg2);border-bottom:1px solid var(--bdr);flex-shrink:0;min-height:24px;}
.ritem-content{flex:1;overflow:auto;padding:6px;position:relative;background:var(--bg3);}
.ritem-content textarea{width:100%;height:100%;min-height:36px;background:transparent;border:none;color:var(--txt);resize:none;font-family:inherit;font-size:12px;line-height:1.7;outline:none;}
.ritem-content img{max-width:100%;max-height:100%;object-fit:contain;display:block;cursor:pointer;}
.ritem-vresize{height:5px;cursor:row-resize;background:var(--bdr);flex-shrink:0;transition:background .15s;}
.ritem-vresize:hover,.ritem-vresize.active{background:var(--accent);}

/* Column resizer */
.rcol-resize{width:8px;cursor:col-resize;flex-shrink:0;background:transparent;display:flex;align-items:center;justify-content:center;}
.rcol-resize::after{content:'';width:3px;height:20px;border-radius:2px;background:var(--bdr2);transition:background .15s;}
.rcol-resize:hover::after,.rcol-resize.active::after{background:var(--accent);}

/* Add item buttons (right of row) */
.radd-item-btns{display:flex;flex-direction:column;justify-content:center;padding:4px 3px;gap:2px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--bdr);}
.radd-item-btn{padding:2px 5px;font-size:11px;border:1px solid var(--bdr);border-radius:4px;background:var(--bg3);color:var(--txt3);cursor:pointer;line-height:1.4;transition:all .12s;}
.radd-item-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Row delete */
.rrow-del{padding:2px 5px;font-size:10px;border:1px solid rgba(239,68,68,.3);border-radius:4px;background:transparent;color:#ef4444;cursor:pointer;flex-shrink:0;align-self:center;margin-left:4px;transition:all .12s;white-space:nowrap;}
.rrow-del:hover{background:rgba(239,68,68,.1);}

/* Item toolbar buttons */
.ritem-del{padding:1px 5px;font-size:10px;border:1px solid rgba(239,68,68,.3);border-radius:3px;background:transparent;color:#ef4444;cursor:pointer;margin-left:auto;transition:all .12s;}
.ritem-del:hover{background:rgba(239,68,68,.1);}
.ritem-act{padding:1px 5px;font-size:10px;border:1px solid var(--bdr);border-radius:3px;background:transparent;color:var(--txt3);cursor:pointer;transition:all .12s;}
.ritem-act:hover{border-color:var(--accent);color:var(--accent);}

/* Add row bar */
.radd-row-bar{display:flex;gap:5px;padding:3px 0 2px;flex-wrap:wrap;}
.radd-row-btn{padding:3px 10px;font-size:11px;border:1px dashed var(--bdr);border-radius:5px;background:transparent;color:var(--txt3);cursor:pointer;transition:all .12s;}
.radd-row-btn:hover{border-color:var(--accent);color:var(--accent);border-style:solid;}

/* Image placeholder */
.rich-img-ph{display:flex;align-items:center;justify-content:center;height:100%;color:var(--txt3);font-size:12px;flex-direction:column;gap:8px;cursor:pointer;min-height:80px;}
.rich-img-ph:hover{color:var(--accent);}

/* Table inside rich item */
.rtbl-wrap{overflow:auto;height:100%;min-height:36px;}
.rtbl-wrap table{border-collapse:collapse;font-size:11px;min-width:100%;}
.rtbl-wrap th,.rtbl-wrap td{border:1px solid var(--bdr);padding:3px 6px;}
.rtbl-wrap th{background:var(--bg2);font-size:10px;}
.rtbl-wrap td{background:var(--bg3);}
.rtbl-wrap [contenteditable]{outline:none;display:block;min-width:28px;}
.rtbl-wrap [contenteditable]:focus{background:rgba(59,130,246,.08);}

/* Extra notes */
.extraNote{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;position:relative;margin-top:8px;}
.extraNoteTitle{font-size:12px;font-weight:800;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.extraNoteTitle input{background:transparent;border:none;border-bottom:1px solid var(--bdr);color:var(--accent);font-size:13px;font-weight:800;outline:none;width:100%;padding:0 0 2px;}
.extraNoteDel{position:absolute;top:10px;right:10px;background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.25);border-radius:5px;padding:2px 8px;font-size:11px;cursor:pointer;}

/* Savebar */
.savebar{background:var(--bar);border-top:1px solid var(--bdr);padding:9px 14px;display:flex;align-items:center;gap:8px;position:fixed;bottom:0;left:0;right:0;z-index:50;}
.saveBtn{padding:6px 16px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff;border:none;}
.saveBtn:disabled{opacity:.5;cursor:default;}
.addNoteBtn{padding:6px 14px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.3);}
.saveOk{font-size:12px;color:#10b981;opacity:0;transition:opacity .3s;}
.nSt{font-size:11px;color:var(--txt3);}

/* Loading */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px);}
.ovlBox{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:22px 28px;text-align:center;}
.sp{display:inline-block;width:24px;height:24px;border:2.5px solid var(--bdr);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px;}
.sSp{display:inline-block;width:11px;height:11px;border:1.5px solid var(--bdr);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;}

/* Modals */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px);}
.modalBox{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:24px;min-width:300px;max-width:480px;width:90%;}
.modalTitle{font-size:15px;font-weight:800;color:var(--txt);margin-bottom:16px;}
.mRow{margin-bottom:14px;}
.mLbl{font-size:12px;font-weight:600;color:var(--txt3);margin-bottom:5px;}
.mInput{width:100%;background:var(--bg3);border:1px solid var(--bdr);color:var(--txt);border-radius:7px;padding:8px 10px;font-size:13px;outline:none;font-family:inherit;}
.mInput:focus{border-color:var(--accent);}
.mBtns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.mBtn{padding:7px 18px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;border:none;}
.mBtnPrimary{background:var(--accent);color:#fff;}
.mBtnCancel{background:var(--bg3);border:1px solid var(--bdr);color:var(--txt2);}

@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:900px){.g2{grid-template-columns:1fr;}.g3{grid-template-columns:1fr;}.kpiRow{grid-template-columns:repeat(2,1fr);}.kpiRow2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="root">

<div class="topbar">
  <div class="ttl">📊 月報分析</div>
  <div class="pd-wrap" id="pdWrap">
    <button class="pd-btn" id="pdBtn" onclick="togglePD(event)">
      <span><span class="pd-yr" id="pdYr">--</span><span class="pd-mo" id="pdMo">月</span></span>
      <span class="pd-arr">▼</span>
    </button>
    <div class="pd-dd" id="pdDd"><div class="pd-list" id="pdList"></div></div>
  </div>
  <div class="brGroup">
    <button class="brBtn" id="bt-ALL" onclick="setBr('ALL')">集團</button>
    <button class="brBtn" id="bt-AMA" onclick="setBr('AMA')">AMA</button>
    <button class="brBtn" id="bt-AMC" onclick="setBr('AMC')">AMC</button>
    <button class="brBtn" id="bt-AMD" onclick="setBr('AMD')">AMD</button>
  </div>
  <div id="topBadge" style="font-size:12px;color:var(--txt3)"></div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <div id="topStatus" style="font-size:11px;color:var(--txt3)"></div>
    <div id="autoSaveHint" style="font-size:10px;color:#10b981;opacity:0;transition:opacity .4s">✓ 已自動儲存</div>
    <button class="themeBtn" id="themeBtn" onclick="toggleTheme()">☀️ 亮版</button>
  </div>
</div>

<div class="scroll">
<div id="sectionsRoot">

  <!-- 有費 section -->
  <div class="drag-sec" id="sec-revenue" draggable="true">
  <div class="sec-wrap">
    <div class="secDiv"><span class="drag-handle" title="拖曳排序">⠿</span>🔶 營收趨勢分析</div>
    <div class="kpiRow" id="kpi_paid"></div>
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;margin-bottom:5px">
        <div class="leg">
          <span class="li"><span class="ld" style="background:#f97316"></span>今年實際</span>
          <span class="li"><span class="ld-d" style="border-top-color:#94a3b8"></span>去年同期</span>
          <span class="li"><span class="ld-d" style="border-top-color:#ef4444"></span>預算目標</span>
          <span class="li"><span class="ld-d" style="border-top-color:rgba(255,255,255,.35)"></span>期間平均</span>
        </div>
        <div style="display:flex;align-items:center;gap:5px">
          <div class="cPBar">
            <button class="cPBtn" data-chart="paid" data-n="1"  onclick="setPeriod('paid',1)">1M</button>
            <button class="cPBtn" data-chart="paid" data-n="3"  onclick="setPeriod('paid',3)">3M</button>
            <button class="cPBtn" data-chart="paid" data-n="6"  onclick="setPeriod('paid',6)">6M</button>
            <button class="cPBtn active" data-chart="paid" data-n="12" onclick="setPeriod('paid',12)">12M</button>
          </div>
          <button class="dlBtnI" onclick="dlChart('c_paid','有費營收')">⬇ 下載</button>
        </div>
      </div>
      <div class="avgRow" id="avg-paid"></div>
      <div style="position:relative;height:220px"><canvas id="c_paid"></canvas></div>
    </div>
    <div class="card" style="margin-bottom:4px">
      <div id="note-area-n_paid"></div>
    </div>
    <div id="extra-notes-sec-revenue"></div>
  </div>
  </div>

  <!-- 一般/鈑烤/延保 section -->
  <div class="drag-sec" id="sec-detail" draggable="true">
  <div class="sec-wrap">
    <div class="secDiv"><span class="drag-handle" title="拖曳排序">⠿</span>📋 一般 / 鈑烤 / 延保</div>
    <div class="g3">
      <div>
        <div class="secHd">💙 一般（P3）<span style="font-size:10px;color:var(--txt3)">千元</span></div>
        <div class="kpiRow2" id="kpi_gen"></div>
        <div class="card" style="margin-bottom:8px">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:3px;margin-bottom:4px">
            <div class="leg"><span class="li"><span class="ld" style="background:#3b82f6"></span>今年</span><span class="li"><span class="ld-d" style="border-top-color:#7dd3fc"></span>去年</span><span class="li"><span class="ld-d" style="border-top-color:#ef4444"></span>目標</span></div>
            <div style="display:flex;align-items:center;gap:5px">
              <div class="cPBar">
                <button class="cPBtn" data-chart="gen" data-n="1"  onclick="setPeriod('gen',1)">1M</button>
                <button class="cPBtn" data-chart="gen" data-n="3"  onclick="setPeriod('gen',3)">3M</button>
                <button class="cPBtn" data-chart="gen" data-n="6"  onclick="setPeriod('gen',6)">6M</button>
                <button class="cPBtn active" data-chart="gen" data-n="12" onclick="setPeriod('gen',12)">12M</button>
              </div>
              <button class="dlBtnI" onclick="dlChart('c_gen','一般營收')">⬇</button>
            </div>
          </div>
          <div class="avgRow" id="avg-gen"></div>
          <div style="position:relative;height:155px"><canvas id="c_gen"></canvas></div>
        </div>
        <div class="card"><div id="note-area-n_gen"></div></div>
      </div>
      <div>
        <div class="secHd">🔨 鈑烤（PC8+PC3）<span style="font-size:10px;color:var(--txt3)">千元</span></div>
        <div class="kpiRow2" id="kpi_bw"></div>

<script>
// ── Constants ──
const BRCOLS={AMA:'#3b82f6',AMC:'#10b981',AMD:'#f59e0b'};
const BRS_ALL=['AMA','AMC','AMD'];
const MODULE='monthly';
const SECS=['sec-revenue','sec-detail','sec-cars','sec-wip'];
const NOTE_CFG={
  n_paid:        {label:'有費說明',        ph:'・達成率 / YoY\n・影響因素\n・下月方向',            flex:true,  defH:110},
  n_gen:         {label:'一般說明',        ph:'・本月重點\n・達成分析',                              flex:false, defH:80},
  n_bw:          {label:'鈑烤說明',        ph:'・本月重點\n・達成分析',                              flex:false, defH:80},
  n_ext:         {label:'延保說明',        ph:'・本月重點\n・達成分析',                              flex:false, defH:80},
  n_cars:        {label:'進廠 & 單車說明', ph:'・本月實際 vs 目標\n・YoY 增減\n・單車銷售額變化',  flex:true,  defH:100},
  n_wip_overview:{label:'WIP 總覽說明',   ph:'・本月總金額 vs 上月增減\n・積壓原因\n・行動計畫',  flex:true,  defH:110},
  n_wip_30:      {label:'30天以上說明',    ph:'・滯留原因\n・等零件案件\n・核賠中\n・預計結清時間', flex:false, defH:85},
  n_wip_90:      {label:'90天以上說明',    ph:'・各工單詳細原因\n・責任歸屬\n・跟催進度\n・預計結清日', flex:false, defH:85},
};
const NOTE_IDS=Object.keys(NOTE_CFG);

let curBr='ALL',curPeriod='',periods=[],tData={},wipRows=[],wipPrev=[],charts={};
let dbPeriods=new Set();
const richData={};    // noteId → {rows:[{id,items:[{id,type,flex,height,data}]}]}
const extraNotes={};  // secId → [{id,title,rows:[...]}]
let dragSrcId=null;

// ── Shared image input ──
const _imgInput=document.createElement('input');
_imgInput.type='file';_imgInput.accept='image/*';_imgInput.style.display='none';
document.body.appendChild(_imgInput);
let _imgTarget=null; // {nid, rowId, itemId, isExtra}
_imgInput.addEventListener('change',async()=>{
  if(!_imgTarget||!_imgInput.files[0])return;
  const{nid,rowId,itemId,isExtra}=_imgTarget;
  const file=_imgInput.files[0];
  const rd=new FileReader();
  rd.onload=async e=>{
    const comp=await compressImage(e.target.result);
    const d=isExtra?getExtraRD(nid):getRD(nid);
    (d.rows||[]).forEach(row=>{
      if(row.id===rowId)row.items.forEach(item=>{
        if(item.id===itemId){item.data.src=comp;item.data.name=file.name;}
      });
    });
    reRich(nid,isExtra);
  };
  rd.readAsDataURL(file);
  _imgInput.value='';_imgTarget=null;
});

// ── Utilities ──
function uid(){return'x'+Math.random().toString(36).slice(2,9);}
function sf(url,opt){return fetch(url,opt||{}).then(r=>r.ok?r.json():null).catch(()=>null);}
function compressImage(dataUrl,maxW=1200,quality=0.75){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const ratio=Math.min(1,maxW/img.width);
      const w=Math.round(img.width*ratio),h=Math.round(img.height*ratio);
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      res(cv.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>res(dataUrl);
    img.src=dataUrl;
  });
}

// ── Theme ──
function toggleTheme(){
  const html=document.documentElement;
  const dark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('themeBtn').textContent=dark?'🌙 暗版':'☀️ 亮版';
  destCharts();buildAll();
}
function isDark(){return document.documentElement.getAttribute('data-theme')!=='light';}
function chartColors(){
  return isDark()?{tc:'#64748b',gc:'rgba(255,255,255,0.04)',ptBorder:'#0f172a'}
                 :{tc:'#475569',gc:'rgba(0,0,0,0.05)',      ptBorder:'#ffffff'};
}

// ── Period utils ──
function prevMonths(base,n){
  let[y,m]=[parseInt(base.slice(0,4)),parseInt(base.slice(4))];
  const out=[];
  for(let i=n-1;i>=0;i--){let pm=m-i,py=y;while(pm<=0){pm+=12;py--;}out.push(`${py}${String(pm).padStart(2,'0')}`);}
  return out;
}
function prevP(p){let y=parseInt(p.slice(0,4)),m=parseInt(p.slice(4));return m===1?`${y-1}12`:`${y}${String(m-1).padStart(2,'0')}`;}
function fmtP(p){return p?`${p.slice(0,4)}/${p.slice(4)}`:'—';}
function nowYM(){const n=new Date(Date.now()+8*3600000);return`${n.getUTCFullYear()}${String(n.getUTCMonth()+1).padStart(2,'0')}`;}
function defaultPeriod(){
  const cur=nowYM(),y=+cur.slice(0,4),m=+cur.slice(4);
  const prev=m===1?`${y-1}12`:`${y}${String(m-1).padStart(2,'0')}`;
  if(periods.includes(prev))return prev;
  const wd=periods.filter(p=>dbPeriods.has(p)).sort().reverse();
  return wd[0]||periods[periods.length-1]||'';
}

// ── Period picker ──
function renderPD(){
  const list=document.getElementById('pdList');if(!list)return;
  const show=dbPeriods.size>0?periods.filter(p=>dbPeriods.has(p)):periods;
  const groups={};
  show.slice().reverse().forEach(p=>{const yr=p.slice(0,4);if(!groups[yr])groups[yr]=[];groups[yr].push(p);});
  let html='';
  Object.keys(groups).sort((a,b)=>b-a).forEach(yr=>{
    html+=`<div class="pd-yr-lbl">${yr}</div><div class="pd-months">`;
    for(let mo=12;mo>=1;mo--){
      const p=`${yr}${String(mo).padStart(2,'0')}`;
      if(!show.includes(p))continue;
      html+=`<div class="pd-mo-item ${p===curPeriod?'sel':''}" onclick="selectPD('${p}')">
        <span class="mn">${mo}</span><span class="ml">月</span><span class="md"></span></div>`;
    }
    html+='</div>';
  });
  list.innerHTML=html||'<div style="padding:16px;text-align:center;color:var(--txt3)">無資料</div>';
  if(curPeriod){
    document.getElementById('pdYr').textContent=curPeriod.slice(0,4)+'年';
    document.getElementById('pdMo').textContent=+curPeriod.slice(4)+'月';
  }
}
function togglePD(e){
  e.stopPropagation();
  const btn=document.getElementById('pdBtn'),dd=document.getElementById('pdDd');
  const open=dd.classList.contains('open');closePD();
  if(!open){btn.classList.add('open');dd.classList.add('open');}
}
function closePD(){
  document.querySelectorAll('.pd-btn.open').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.pd-dd.open').forEach(d=>d.classList.remove('open'));
}
async function selectPD(p){
  if(p===curPeriod){closePD();return;}
  await autoSave();
  curPeriod=p;closePD();renderPD();loadAll();
}
document.addEventListener('click',closePD);

// ── API helpers ──
function exBD(res,br){
  if(!res?.branches)return{paid:0,gen:0,bw:0,ext:0};
  const brs=br==='ALL'?BRS_ALL:[br];let paid=0,gen=0,bw=0,ext=0;
  brs.forEach(b=>{const d=res.branches[b]||{};paid+=+(d.paid_total||0);gen+=+(d.general_total||0);bw+=+(d.bodywork_total||0);ext+=+(d.extended||0);});
  return{paid:paid/1000,gen:gen/1000,bw:bw/1000,ext:ext/1000};
}
function exTgt(res,br){
  if(!Array.isArray(res))return{paid:0,gen:0,bw:0,ext:0,paid_ly:0,gen_ly:0,bw_ly:0,ext_ly:0};
  const brs=br==='ALL'?BRS_ALL:[br];let paid=0,gen=0,bw=0,ext=0,pl=0,gl=0,bl=0,el=0;
  res.filter(r=>brs.includes(r.branch)).forEach(r=>{
    paid+=+(r.paid_target||0);gen+=+(r.general_target||0);bw+=+(r.bodywork_target||0);ext+=+(r.extended_target||0);
    pl+=+(r.paid_last_year||0);gl+=+(r.general_last_year||0);bl+=+(r.bodywork_last_year||0);el+=+(r.extended_last_year||0);
  });
  return{paid:paid/1000,gen:gen/1000,bw:bw/1000,ext:ext/1000,paid_ly:pl/1000,gen_ly:gl/1000,bw_ly:bl/1000,ext_ly:el/1000};
}
function exCars(res,br){
  if(!res?.summary)return{act:0};
  let act=0;const brs=br==='ALL'?BRS_ALL:[br];
  res.summary.filter(r=>brs.includes(r.branch)).forEach(r=>{act+=+(r.total_cars||0);});
  return{act};
}
function bucketWip(rows,br){
  const f=br==='ALL'?rows:rows.filter(r=>r.branch===br);
  const lt30={amt:0,cnt:0},m30={amt:0,cnt:0},gt90={amt:0,cnt:0},urg={amt:0,cnt:0};
  f.forEach(r=>{
    const days=r.days_open!=null?parseFloat(r.days_open):null;
    const amt=+(r.sales_amt||0)/1000;
    if(days===null||days<30){lt30.amt+=amt;lt30.cnt++;}
    else if(days<=90){m30.amt+=amt;m30.cnt++;}
    else{gt90.amt+=amt;gt90.cnt++;}
    if(r.wip_status==='已可結帳'){urg.amt+=amt;urg.cnt++;}
  });
  return{lt30,m30,gt90,urg,total:{amt:lt30.amt+m30.amt+gt90.amt,cnt:f.length}};
}

// ── Init ──
async function init(){
  showLoad('讀取期間…');
  const raw=await sf('/api/periods');
  periods=Array.isArray(raw)?raw.filter(Boolean).sort():[];
  const checkP=periods.slice(-12);
  await Promise.all(checkP.map(async p=>{
    const r=await sf(`/api/stats/income-breakdown?period=${p}`);
    if(r?.branches&&Object.values(r.branches).some(b=>(b.paid_total||0)>0))dbPeriods.add(p);
  }));
  curPeriod=defaultPeriod();
  renderPD();
  await loadLayout();
  renderAllNoteAreas();
  setBr('ALL');
}

// ── Load ──
let _loadSeq=0;
async function loadAll(){
  if(!curPeriod){hideLoad();return;}
  const seq=++_loadSeq;
  showLoad('讀取營收趨勢…');
  const last5=prevMonths(curPeriod,12),prev=prevP(curPeriod);
  const bpQ=curBr==='ALL'?'':`&branch=${curBr}`;
  const tR=await Promise.all(last5.map(async p=>{
    const[bd,tgt,daily]=await Promise.all([
      sf(`/api/stats/income-breakdown?period=${p}${bpQ}`),
      sf(`/api/revenue-targets?period=${p}${bpQ}`),
      sf(`/api/stats/daily?period=${p}${bpQ}`),
    ]);
    return{period:p,bd:exBD(bd,curBr),tgt:exTgt(tgt,curBr),cars:exCars(daily,curBr)};
  }));
  if(seq!==_loadSeq)return;
  tData={};tR.forEach(r=>{tData[r.period]=r;});
  showLoad('讀取 WIP…');
  const[w1,w2]=await Promise.all([
    sf(`/api/stats/wip?period=${curPeriod}${bpQ}`),
    sf(`/api/stats/wip?period=${prev}${bpQ}`),
  ]);
  if(seq!==_loadSeq)return;
  wipRows=Array.isArray(w1?.rows)?w1.rows:[];
  wipPrev=Array.isArray(w2?.rows)?w2.rows:[];
  buildAll();
  await loadNotes(seq);
  if(seq===_loadSeq)hideLoad();
}

// ── Per-chart period ──
const chartPeriods={paid:12,gen:12,bw:12,ext:12,cars:12,rpv:12};
let last12Months=[];

// ── Build charts ──
function buildAll(){
  destCharts();
  last12Months=prevMonths(curPeriod,12);
  const{tc,gc,ptBorder}=chartColors();

function mkLine(id,labels,act,ly,tgt,lc,lyc,tgtc,yFmt,showTgt,tc,gc,ptBorder,tipFmtFn){
  const allV=[...act,...(ly||[]),...(showTgt&&tgt?tgt:[])].filter(v=>v>0);
  const minV=allV.length?Math.min(...allV):0,maxV=allV.length?Math.max(...allV):100;
  const spread=(maxV-minV)||maxV*.1||5;
  const lo=Math.max(0,minV-spread*.12),hi=maxV+spread*.08;
  const range=hi-lo||1;const rawStep=range/5;
  const mag=Math.pow(10,Math.floor(Math.log10(rawStep)));
  const step=Math.ceil(rawStep/mag)*mag||1;
  const niceMin=Math.floor(lo/step)*step,niceMax=Math.ceil(hi/step)*step;
  const fmt=yFmt||(v=>Math.round(v).toLocaleString());
  const tipFmt=tipFmtFn||fK;
  const actV=act.filter(v=>v>0);
  const avg=actV.length>1?actV.reduce((a,b)=>a+b,0)/actV.length:null;
  const avgColor=isDark()?'rgba(255,255,255,0.38)':'rgba(0,0,0,0.30)';
  const ds=[{
    label:'今年實際',data:act,borderColor:lc,backgroundColor:lc+'22',tension:.35,fill:true,
    pointRadius:5,borderWidth:3,
    pointBackgroundColor:act.map((v,i)=>tgt&&tgt[i]>0&&v>=tgt[i]?'#10b981':'#ef4444'),
    pointBorderColor:ptBorder||'#0f172a',pointBorderWidth:1.5
  }];
  if(ly&&ly.some(v=>v>0))ds.push({label:'去年同期',data:ly,borderColor:lyc,borderDash:[7,4],tension:.35,fill:false,pointRadius:3,borderWidth:2.5,pointBackgroundColor:lyc,pointBorderColor:ptBorder,pointBorderWidth:1});
  if(showTgt&&tgt&&tgt.some(v=>v>0))ds.push({label:'預算目標',data:tgt,borderColor:'#ef4444',borderDash:[4,3],tension:.35,fill:false,pointRadius:3,borderWidth:2.5,pointBackgroundColor:'#ef4444',pointBorderColor:ptBorder,pointBorderWidth:1});
  if(avg!==null)ds.push({label:'期間平均',data:Array(act.length).fill(avg),borderColor:avgColor,borderDash:[3,3],borderWidth:1.8,pointRadius:0,fill:false,tension:0});
  return new Chart(document.getElementById(id),{
    type:'line',data:{labels,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{
        if(ctx.dataset.label==='期間平均')return`期間平均: ${tipFmt(ctx.raw)}`;
        return`${ctx.dataset.label}: ${tipFmt(ctx.raw)}`;
      }}}},
      scales:{x:{ticks:{font:{size:10},color:tc},grid:{color:gc}},
              y:{ticks:{font:{size:11},color:tc,callback:fmt},grid:{color:gc},min:niceMin,max:niceMax}}}
  });
}

// ── KPI ──
const fK=v=>(+v||0)<1?'0K':Math.round(+v).toLocaleString()+'K';
const achC=p=>p>=100?'#10b981':p>=85?'#f59e0b':'#ef4444';
const growC=(a,b)=>a>=b?'#10b981':'#ef4444';
const pct=(a,t)=>t>0?(a/t*100).toFixed(0)+'%':'0%';
const liIdx=arr=>{for(let i=arr.length-1;i>=0;i--)if(arr[i]>0)return i;return arr.length-1;};
function rKpi4(id,act,tgt,ly,col,ytdActArr,ytdTgtArr,yr){
  const li=liIdx(act),a=act[li],t=tgt[li],l=ly[li];
  const ach=t>0?a/t*100:null,yoy=l>0?(a-l)/l*100:null;
  const ytdA=(ytdActArr||act).reduce((s,v)=>s+v,0);
  const ytdT=(ytdTgtArr||tgt).reduce((s,v)=>s+v,0);
  const ytdAch=ytdT>0?ytdA/ytdT*100:null;
  const yrLabel=yr?`（${yr}年）`:'';
  document.getElementById(id).innerHTML=`
    <div class="kc"><div class="kl">本月實際</div><div class="kv" style="color:${col}">${fK(a)}</div><div class="ks">目標 ${fK(t)}</div></div>
    <div class="kc" style="border-color:${achC(ach||0)}44"><div class="kl">達成率</div><div class="kv" style="color:${achC(ach||0)}">${ach!==null?ach.toFixed(1)+'%':'—'}</div><div class="ks">${ach>=100?'✅ 達標':ach?ach.toFixed(0)+'%':''}</div></div>
    <div class="kc" style="border-color:${yoy>=0?'#10b98133':'#ef444433'}"><div class="kl">YoY vs 去年</div><div class="kv" style="color:${yoy>=0?'#10b981':'#ef4444'}">${yoy!==null?(yoy>=0?'+':'')+yoy.toFixed(1)+'%':'—'}</div><div class="ks">去年 ${fK(l)}</div></div>
    <div class="kc"><div class="kl">YTD 達成率${yrLabel}</div><div class="kv" style="color:${achC(ytdAch||0)}">${ytdAch!==null?ytdAch.toFixed(1)+'%':'—'}</div><div class="ks">累計 ${fK(ytdA)} ／ 目標 ${fK(ytdT)}</div></div>`;
}
function rKpi2(id,act,tgt,ly,col){
  const li=liIdx(act),a=act[li],t=tgt[li],l=ly[li];
  const ach=t>0?a/t*100:null,yoy=l>0?(a-l)/l*100:null;
  document.getElementById(id).innerHTML=`
    <div class="kc" style="border-color:${achC(ach||0)}44"><div class="kl">本月 / 達成率</div><div class="kv" style="color:${col};font-size:18px">${fK(a)}</div><div class="ks" style="color:${achC(ach||0)}">${ach!==null?ach.toFixed(0)+'%':'—'} | 目標 ${fK(t)}</div></div>
    <div class="kc" style="border-color:${yoy>=0?'#10b98133':'#ef444433'}"><div class="kl">YoY</div><div class="kv" style="color:${yoy>=0?'#10b981':'#ef4444'};font-size:18px">${yoy!==null?(yoy>=0?'+':'')+yoy.toFixed(1)+'%':'—'}</div><div class="ks">去年 ${fK(l)}</div></div>`;

function dlChart(id,name){
  const c=document.getElementById(id);if(!c)return;
  const o=document.createElement('canvas');o.width=c.width;o.height=c.height;
  const ctx=o.getContext('2d');
  ctx.fillStyle=isDark()?'#1a2332':'#ffffff';ctx.fillRect(0,0,o.width,o.height);ctx.drawImage(c,0,0);
  const a=document.createElement('a');a.href=o.toDataURL('image/png');
  a.download=`${name}_${curBr}_${curPeriod}_${new Date().toISOString().slice(0,10)}.png`;a.click();

let _autoSaving=false;
async function autoSave(){
  if(_autoSaving)return;_autoSaving=true;
  try{
    collectAllTexts();
    const entries=[
      ...NOTE_IDS.map(id=>({key:nKey('rich_'+id),value:JSON.stringify(getRD(id))})),
      ...SECS.map(sec=>({key:nKey('extra_'+sec),value:JSON.stringify(extraNotes[sec]||[])})),
    ];
    if(!entries.some(e=>e.value&&e.value!=='{"rows":[]}'&&e.value!=='[]')){_autoSaving=false;return;}
    const res=await fetch('/api/notes/batch',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({entries})});
    if(res.ok){const h=document.getElementById('autoSaveHint');if(h){h.style.opacity='1';setTimeout(()=>{h.style.opacity='0';},2000);}}
  }catch{}
  _autoSaving=false;
}

// ── Drag sections ──
const SEC_ORDER_KEY='monthly_layout_order';
function initDrag(){
  document.querySelectorAll('.drag-sec').forEach(el=>{
    el.addEventListener('dragstart',e=>{
      if(e.target.closest('.rrow'))return;
      dragSrcId=el.id;el.classList.add('dragging');e.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');document.querySelectorAll('.drag-sec').forEach(s=>s.classList.remove('drag-over'));});
    el.addEventListener('dragover',e=>{e.preventDefault();document.querySelectorAll('.drag-sec').forEach(s=>s.classList.remove('drag-over'));if(el.id!==dragSrcId)el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{
      e.preventDefault();el.classList.remove('drag-over');
      if(dragSrcId&&dragSrcId!==el.id){
        const root=document.getElementById('sectionsRoot'),src=document.getElementById(dragSrcId);
        const all=[...root.children],si=all.indexOf(src),di=all.indexOf(el);
        if(si<di)root.insertBefore(src,el.nextSibling);else root.insertBefore(src,el);
        saveLayout();
      }
    });
  });
}
async function saveLayout(){
  const order=[...document.getElementById('sectionsRoot').children].map(el=>el.id);
  await fetch('/api/notes/'+SEC_ORDER_KEY,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:JSON.stringify(order)})});
}
async function loadLayout(){
  try{
    const r=await sf('/api/notes/'+SEC_ORDER_KEY);
    if(r?.value){
      const order=JSON.parse(r.value);
      const root=document.getElementById('sectionsRoot');
      order.forEach(id=>{const el=document.getElementById(id);if(el)root.appendChild(el);});
    }
  }catch{}
  initDrag();
}

// ── Data management ──
function getRD(nid){
  if(!richData[nid])richData[nid]=mkDefRD(NOTE_CFG[nid]?.defH||90);
  else if(!richData[nid].rows)richData[nid]=migrateRD(richData[nid],NOTE_CFG[nid]?.defH||90);
  return richData[nid];
}
function getExtraRD(nid){
  const[sec,id]=nid.split('|||');
  const n=(extraNotes[sec]||[]).find(x=>x.id===id);
  if(!n)return{rows:[]};
  if(!n.rows){
    n.rows=migrateRD({images:n.images||[],tables:n.tables||[],colAligns:n.colAligns||[],_textVal:n.content||''}).rows;
  }
  return n;
}
function mkDefRD(h){
  return{rows:[{id:uid(),items:[{id:uid(),type:'text',flex:1,height:h||90,data:{content:''}}]}]};
}
function mkDefItem(type,h){
  const height=h||(type==='image'?180:type==='table'?150:90);
  const data=type==='text'?{content:''}:type==='image'?{src:'',name:''}:{headers:['欄1','欄2','欄3'],rows:[['','','']],colAligns:[]};
  return{id:uid(),type,flex:1,height,data};
}
function migrateRD(old,defH){
  if(old&&old.rows)return old;
  const imgs=old?.images||[],tbls=old?.tables||[],cas=old?.colAligns||[];
  const textPos=old?.textPos||0;
  const items=[];
  imgs.forEach(img=>{
    const src=typeof img==='string'?img:(img.data||'');
    items.push({id:uid(),type:'image',flex:1,height:180,data:{src,name:img.name||''}});
  });
  tbls.forEach((tbl,i)=>{
    items.push({id:uid(),type:'table',flex:1,height:150,data:{headers:tbl[0]||[],rows:tbl.slice(1)||[],colAligns:cas[i]||[]}});
  });
  const ti={id:uid(),type:'text',flex:1,height:defH||90,data:{content:old?._textVal||''}};
  items.splice(textPos,0,ti);
  return{rows:items.map(item=>({id:uid(),items:[item]}))};
}

// ── Collect textarea values into data ──
function collectTexts(nid,isExtra){
  const elId=isExtra?'erich-'+nid.split('|||')[1]:'rich-'+nid;
  const el=document.getElementById(elId);if(!el)return;
  el.querySelectorAll('textarea[data-ritemid]').forEach(ta=>{
    const d=isExtra?getExtraRD(nid):getRD(nid);
    (d.rows||[]).forEach(row=>row.items.forEach(item=>{
      if(item.id===ta.dataset.ritemid)item.data.content=ta.value;
    }));
  });
}
function collectAllTexts(){
  NOTE_IDS.forEach(id=>collectTexts(id,false));
  SECS.forEach(sec=>(extraNotes[sec]||[]).forEach(n=>collectTexts(sec+'|||'+n.id,true)));
}

// ── Render ──
function renderAllNoteAreas(){
  NOTE_IDS.forEach(id=>{
    const cfg=NOTE_CFG[id];
    const el=document.getElementById('note-area-'+id);if(!el)return;
    el.innerHTML=`<div class="noteLabel"><span class="noteDot"></span>${cfg.label}</div><div id="rich-${id}"></div>`;
    if(!richData[id])richData[id]=mkDefRD(cfg.defH);
    else if(!richData[id].rows)richData[id]=migrateRD(richData[id],cfg.defH);
    reRich(id,false);
  });
}

function reRich(nid,isExtra){
  collectTexts(nid,isExtra);
  const elId=isExtra?'erich-'+nid.split('|||')[1]:'rich-'+nid;
  const el=document.getElementById(elId);if(!el)return;
  const d=isExtra?getExtraRD(nid):getRD(nid);
  el.innerHTML=buildRichHTML(nid,d,isExtra);
  attachResizers(el,nid,d,isExtra);
  attachRowDrag(el,nid,d,isExtra);
}

// Aliases to keep backward compat
function renderRich(nid){reRich(nid,false);}
function renderExtraRich(sec,noteId){reRich(sec+'|||'+noteId,true);}

function buildRichHTML(nid,d,isExtra){
  const rows=d.rows||[];
  const ie=isExtra;
  const ies=isExtra?'true':'false';
  const enc=s=>String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  let h='';
  rows.forEach(row=>{
    h+=`<div class="rrow" data-rowid="${row.id}">
      <div class="rrow-handle" title="拖曳排序列">⠿</div>
      <div class="rrow-body" data-rowid="${row.id}">`;
    row.items.forEach((item,ii)=>{
      h+=`<div class="ritem" data-itemid="${item.id}" style="flex:${item.flex||1}">
        <div class="ritem-tb">
          <span style="font-size:11px">${{text:'📝',image:'🖼️',table:'📊'}[item.type]||'📝'}</span>
          ${item.type==='image'?`<button class="ritem-act" onclick="_imgTarget={nid:'${enc(nid)}',rowId:'${row.id}',itemId:'${item.id}',isExtra:${ies}};_imgInput.click()">換圖</button>`:''}
          <button class="ritem-del" onclick="rDelItem('${enc(nid)}','${row.id}','${item.id}',${ies})">✕</button>
        </div>
        <div class="ritem-content" style="height:${item.height||90}px">
          ${renderItemHTML(nid,row.id,item,ie,enc)}
        </div>
        <div class="ritem-vresize" title="↕ 拖曳調整高度"></div>
      </div>`;
      if(ii<row.items.length-1)h+=`<div class="rcol-resize" title="↔ 拖曳調整寬度"></div>`;
    });
    h+=`<div class="radd-item-btns" title="在此列加欄">
        <button class="radd-item-btn" title="加文字欄" onclick="rAddItem('${enc(nid)}','${row.id}','text',${ies})">📝</button>
        <button class="radd-item-btn" title="加圖片欄" onclick="rAddItem('${enc(nid)}','${row.id}','image',${ies})">🖼️</button>
        <button class="radd-item-btn" title="加表格欄" onclick="rAddItem('${enc(nid)}','${row.id}','table',${ies})">📊</button>
      </div>
      </div>
      <button class="rrow-del" onclick="rDelRow('${enc(nid)}','${row.id}',${ies})">✕列</button>
    </div>`;
  });
  h+=`<div class="radd-row-bar">
    <button class="radd-row-btn" onclick="rAddRow('${enc(nid)}','text',${ies})">＋ 文字列</button>
    <button class="radd-row-btn" onclick="rAddRow('${enc(nid)}','image',${ies})">＋ 圖片列</button>
    <button class="radd-row-btn" onclick="rAddRow('${enc(nid)}','table',${ies})">＋ 表格列</button>
  </div>`;
  return h;
}

function renderItemHTML(nid,rowId,item,isExtra,enc){
  const ies=isExtra?'true':'false';
  const args=`'${enc(nid)}','${rowId}','${item.id}'`;
  if(item.type==='text'){
    const ph=(NOTE_CFG[nid]?.ph||'輸入說明').replace(/\n/g,'&#10;');
    return`<textarea data-ritemid="${item.id}"
      style="width:100%;height:100%;min-height:36px;background:transparent;border:none;color:var(--txt);resize:none;font-family:inherit;font-size:12px;line-height:1.7;outline:none;padding:2px;"
      placeholder="${ph}…">${(item.data?.content||'').replace(/</g,'&lt;')}</textarea>`;
  }
  if(item.type==='image'){
    if(item.data?.src)
      return`<img src="${item.data.src}" style="max-width:100%;max-height:100%;object-fit:contain;display:block;cursor:pointer" onclick="_imgTarget={nid:'${enc(nid)}',rowId:'${rowId}',itemId:'${item.id}',isExtra:${ies}};_imgInput.click()" title="點擊換圖">`;
    return`<div class="rich-img-ph" onclick="_imgTarget={nid:'${enc(nid)}',rowId:'${rowId}',itemId:'${item.id}',isExtra:${ies}};_imgInput.click()"><span style="font-size:28px">📷</span><span>點擊上傳圖片</span></div>`;
  }
  if(item.type==='table')return renderTableHTML(nid,rowId,item,isExtra,enc);
  return'';
}

function renderTableHTML(nid,rowId,item,isExtra,enc){
  const ies=isExtra?'true':'false';
  const args=`'${enc(nid)}','${rowId}','${item.id}'`;
  const{headers=[],rows=[],colAligns=[]}=item.data||{};
  return`<div class="rtbl-wrap">
  <table>
    <thead><tr>
      ${headers.map((hh,ci)=>{
        const al=colAligns[ci]||'left';
        return`<th style="min-width:55px">
          <div style="display:flex;gap:1px;margin-bottom:2px">
            ${['left','center','right'].map(a=>`<button onclick="rTCA(${args},${ci},'${a}',${ies})" style="padding:0 3px;font-size:9px;border:1px solid var(--bdr);border-radius:2px;background:${al===a?'var(--accent)':'transparent'};color:${al===a?'#fff':'var(--txt3)'};cursor:pointer">${{left:'L',center:'C',right:'R'}[a]}</button>`).join('')}
            <button onclick="rTDC(${args},${ci},${ies})" style="padding:0 3px;font-size:9px;border:1px solid rgba(239,68,68,.3);border-radius:2px;background:transparent;color:#ef4444;cursor:pointer">✕</button>
          </div>
          <span contenteditable onblur="rTUC(${args},0,${ci},this,${ies})" style="display:block;outline:none;text-align:${al}">${hh}</span>
        </th>`;
      }).join('')}
      <th style="width:20px;text-align:center;vertical-align:bottom;padding-bottom:2px">
        <button onclick="rTAC(${args},${ies})" style="border:none;background:transparent;cursor:pointer;color:var(--txt3);font-size:14px;line-height:1">＋</button>
      </th>
    </tr></thead>
    <tbody>
      ${rows.map((row,ri)=>`<tr>
        ${row.map((cell,ci)=>`<td style="text-align:${colAligns[ci]||'left'}">
          <span contenteditable onblur="rTUC(${args},${ri+1},${ci},this,${ies})" style="outline:none;display:block;min-width:28px">${cell}</span>
        </td>`).join('')}
        <td style="text-align:center;width:20px">
          <button onclick="rTDR(${args},${ri+1},${ies})" style="border:none;background:transparent;cursor:pointer;color:#ef4444;font-size:12px;padding:0">✕</button>
        </td>
      </tr>`).join('')}
    </tbody>
  </table>
  <button onclick="rTAR(${args},${ies})" style="margin-top:3px;padding:1px 7px;font-size:10px;border:1px solid var(--bdr);border-radius:3px;background:var(--bg2);cursor:pointer;color:var(--txt3)">＋ 加行</button>
  </div>`;
}

// ── Attach resizers ──
function attachResizers(containerEl,nid,d,isExtra){
  // Vertical resize (item height)
  containerEl.querySelectorAll('.ritem-vresize').forEach(resizer=>{
    const ritemEl=resizer.closest('.ritem');
    const contentEl=ritemEl?.querySelector('.ritem-content');
    if(!contentEl)return;
    resizer.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();
      const startY=e.clientY,startH=contentEl.getBoundingClientRect().height;
      const itemId=ritemEl.dataset.itemid;
      resizer.classList.add('active');
      document.body.style.cursor='row-resize';
      document.body.style.userSelect='none';
      const onMove=e=>{
        const newH=Math.max(40,startH+(e.clientY-startY));
        contentEl.style.height=newH+'px';
      };
      const onUp=()=>{
        document.removeEventListener('mousemove',onMove);
        resizer.classList.remove('active');
        document.body.style.cursor='';document.body.style.userSelect='';
        const finalH=Math.round(contentEl.getBoundingClientRect().height);
        const dObj=isExtra?getExtraRD(nid):getRD(nid);
        (dObj.rows||[]).forEach(row=>row.items.forEach(item=>{if(item.id===itemId)item.height=finalH;}));
      };
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp,{once:true});
    });
  });
  // Horizontal resize (column width via flex)
  containerEl.querySelectorAll('.rcol-resize').forEach(resizer=>{
    resizer.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();
      const rowBody=resizer.closest('.rrow-body');if(!rowBody)return;
      const leftEl=resizer.previousElementSibling;
      const rightEl=resizer.nextElementSibling;
      if(!leftEl||!rightEl||!leftEl.dataset.itemid||!rightEl.dataset.itemid)return;
      const leftId=leftEl.dataset.itemid,rightId=rightEl.dataset.itemid;
      const rowId=rowBody.dataset.rowid;
      const startX=e.clientX;
      const startLeftW=leftEl.getBoundingClientRect().width;
      const startRightW=rightEl.getBoundingClientRect().width;
      resizer.classList.add('active');
      document.body.style.cursor='col-resize';document.body.style.userSelect='none';
      const onMove=e=>{
        const dx=e.clientX-startX;
        const newLW=Math.max(50,startLeftW+dx);
        const newRW=Math.max(50,startRightW-dx);
        leftEl.style.flex=`0 0 ${newLW}px`;
        rightEl.style.flex=`0 0 ${newRW}px`;
      };
      const onUp=()=>{
        document.removeEventListener('mousemove',onMove);
        resizer.classList.remove('active');
        document.body.style.cursor='';document.body.style.userSelect='';
        // Convert px → flex ratio
        const finalLW=leftEl.getBoundingClientRect().width;
        const finalRW=rightEl.getBoundingClientRect().width;
        const total=finalLW+finalRW;
        const dObj=isExtra?getExtraRD(nid):getRD(nid);
        const row=(dObj.rows||[]).find(r=>r.id===rowId);
        if(row){
          const lItem=row.items.find(i=>i.id===leftId);
          const rItem=row.items.find(i=>i.id===rightId);
          if(lItem&&rItem){
            const combined=(lItem.flex||1)+(rItem.flex||1);
            lItem.flex=Math.max(0.1,Math.round(finalLW/total*combined*100)/100);
            rItem.flex=Math.max(0.1,Math.round(finalRW/total*combined*100)/100);
          }
        }
        // Re-render to reset to flex-based widths
        reRich(nid,isExtra);
      };
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp,{once:true});
    });
  });
}

// ── Row drag ──
function attachRowDrag(containerEl,nid,d,isExtra){
  containerEl.querySelectorAll('.rrow').forEach(rowEl=>{
    const handle=rowEl.querySelector('.rrow-handle');if(!handle)return;
    let dragSrcRow=null;
    handle.addEventListener('mousedown',()=>{rowEl.draggable=true;});
    handle.addEventListener('mouseup',()=>{rowEl.draggable=false;});
    rowEl.addEventListener('dragstart',e=>{
      dragSrcRow=rowEl;
      setTimeout(()=>rowEl.classList.add('dragging'),0);
      e.stopPropagation();
    });
    rowEl.addEventListener('dragend',()=>{
      rowEl.draggable=false;rowEl.classList.remove('dragging');
      containerEl.querySelectorAll('.rrow').forEach(r=>r.classList.remove('drag-over'));
    });
    rowEl.addEventListener('dragover',e=>{
      if(!dragSrcRow||dragSrcRow===rowEl)return;
      e.preventDefault();e.stopPropagation();
      containerEl.querySelectorAll('.rrow').forEach(r=>r.classList.remove('drag-over'));
      rowEl.classList.add('drag-over');
    });
    rowEl.addEventListener('dragleave',()=>rowEl.classList.remove('drag-over'));
    rowEl.addEventListener('drop',e=>{
      e.preventDefault();e.stopPropagation();rowEl.classList.remove('drag-over');
      if(!dragSrcRow||dragSrcRow===rowEl)return;
      const dObj=isExtra?getExtraRD(nid):getRD(nid);
      const rows=dObj.rows;
      const si=rows.findIndex(r=>r.id===dragSrcRow.dataset.rowid);
      const di=rows.findIndex(r=>r.id===rowEl.dataset.rowid);
      if(si<0||di<0)return;
      const[moved]=rows.splice(si,1);rows.splice(di,0,moved);
      reRich(nid,isExtra);
    });
  });
}

// ── Row/Item CRUD ──
function rAddRow(nid,type,isExtra){
  const ie=isExtra===true||isExtra==='true';
  const dObj=ie?getExtraRD(nid):getRD(nid);
  dObj.rows.push({id:uid(),items:[mkDefItem(type)]});
  reRich(nid,ie);
}
function rAddItem(nid,rowId,type,isExtra){
  const ie=isExtra===true||isExtra==='true';
  const dObj=ie?getExtraRD(nid):getRD(nid);
  const row=(dObj.rows||[]).find(r=>r.id===rowId);if(!row)return;
  row.items.push(mkDefItem(type));
  reRich(nid,ie);
}
function rDelItem(nid,rowId,itemId,isExtra){
  const ie=isExtra===true||isExtra==='true';
  const dObj=ie?getExtraRD(nid):getRD(nid);
  const row=(dObj.rows||[]).find(r=>r.id===rowId);if(!row)return;
  row.items=row.items.filter(i=>i.id!==itemId);
  if(row.items.length===0)dObj.rows=dObj.rows.filter(r=>r.id!==rowId);
  reRich(nid,ie);
}
function rDelRow(nid,rowId,isExtra){
  const ie=isExtra===true||isExtra==='true';
  const dObj=ie?getExtraRD(nid):getRD(nid);
  dObj.rows=(dObj.rows||[]).filter(r=>r.id!==rowId);
  reRich(nid,ie);
}

// ── Table operations ──
function rTFind(nid,rowId,itemId,isExtra){
  const ie=isExtra===true||isExtra==='true';
  const dObj=ie?getExtraRD(nid):getRD(nid);
  let found=null;
  (dObj.rows||[]).forEach(row=>{if(row.id===rowId)row.items.forEach(item=>{if(item.id===itemId)found=item;});});
  return found;
}
function rTUC(nid,rowId,itemId,ri,ci,el,isExtra){
  const item=rTFind(nid,rowId,itemId,isExtra);if(!item?.data)return;
  if(ri===0)item.data.headers[ci]=el.textContent;
  else{if(!item.data.rows[ri-1])return;item.data.rows[ri-1][ci]=el.textContent;}
}
function rTCA(nid,rowId,itemId,ci,al,isExtra){
  const ie=isExtra===true||isExtra==='true';
  const item=rTFind(nid,rowId,itemId,isExtra);if(!item?.data)return;
  if(!item.data.colAligns)item.data.colAligns=[];item.data.colAligns[ci]=al;
  reRich(nid,ie);
}
function rTDC(nid,rowId,itemId,ci,isExtra){
  const ie=isExtra===true||isExtra==='true';
  const item=rTFind(nid,rowId,itemId,isExtra);if(!item?.data)return;
  item.data.headers.splice(ci,1);item.data.rows.forEach(r=>r.splice(ci,1));
  if(item.data.colAligns)item.data.colAligns.splice(ci,1);
  reRich(nid,ie);
}
function rTAC(nid,rowId,itemId,isExtra){
  const ie=isExtra===true||isExtra==='true';
  const item=rTFind(nid,rowId,itemId,isExtra);if(!item?.data)return;
  item.data.headers.push('欄'+(item.data.headers.length+1));item.data.rows.forEach(r=>r.push(''));
  reRich(nid,ie);
}
function rTAR(nid,rowId,itemId,isExtra){
  const ie=isExtra===true||isExtra==='true';
  const item=rTFind(nid,rowId,itemId,isExtra);if(!item?.data)return;
  item.data.rows.push(Array(item.data.headers.length).fill(''));
  reRich(nid,ie);
}
function rTDR(nid,rowId,itemId,ri,isExtra){
  const ie=isExtra===true||isExtra==='true';
  const item=rTFind(nid,rowId,itemId,isExtra);if(!item?.data)return;
  item.data.rows.splice(ri-1,1);
  reRich(nid,ie);
}

// ── Extra notes ──
function openAddNote(){document.getElementById('newNoteTitle').value='';document.getElementById('addNoteModal').style.display='flex';}
function confirmAddNote(){
  const title=document.getElementById('newNoteTitle').value.trim()||'補充說明';
  const sec=document.getElementById('newNoteSection').value;
  if(!extraNotes[sec])extraNotes[sec]=[];
  extraNotes[sec].push({id:'en_'+Date.now(),title,rows:[{id:uid(),items:[{id:uid(),type:'text',flex:1,height:90,data:{content:''}}]}]});
  renderExtraNotes(sec);closeModal('addNoteModal');
}
function renderExtraNotes(sec){
  const el=document.getElementById('extra-notes-'+sec);if(!el)return;
  const list=extraNotes[sec]||[];
  el.innerHTML=list.map(n=>`
    <div class="extraNote">
      <button class="extraNoteDel" onclick="delExtraNote('${sec}','${n.id}')">✕</button>
      <div class="extraNoteTitle"><span class="noteDot"></span><input value="${(n.title||'').replace(/"/g,'&quot;')}" placeholder="說明標題…" onchange="updateExtraTitle('${sec}','${n.id}',this.value)"></div>
      <div id="erich-${n.id}"></div>
    </div>`).join('');
  list.forEach(n=>renderExtraRich(sec,n.id));
}
function updateExtraTitle(sec,nid,val){const n=(extraNotes[sec]||[]).find(x=>x.id===nid);if(n)n.title=val;}
function delExtraNote(sec,nid){
  if(!extraNotes[sec])return;
  extraNotes[sec]=extraNotes[sec].filter(n=>n.id!==nid);
  renderExtraNotes(sec);
}

// ── Notes DB ──
function nKey(id){return`${MODULE}_${curBr}_${curPeriod}_${id}`;}

async function loadNotes(seq){
  NOTE_IDS.forEach(id=>{richData[id]=null;});
  SECS.forEach(sec=>{extraNotes[sec]=[];const el=document.getElementById('extra-notes-'+sec);if(el)el.innerHTML='';});
  try{
    const prefix=`${MODULE}_${curBr}_${curPeriod}_`;
    const data=await sf(`/api/notes?prefix=${encodeURIComponent(prefix)}`);
    if(seq!==undefined&&seq!==_loadSeq)return;
    if(data){
      NOTE_IDS.forEach(id=>{
        const rk=nKey('rich_'+id);
        if(data[rk]){
          try{
            const parsed=JSON.parse(data[rk]);
            richData[id]=parsed.rows?parsed:migrateRD(parsed,NOTE_CFG[id]?.defH);
          }catch{}
        }else{
          // Fall back to old plain text key
          const textVal=data[nKey(id)]||'';
          richData[id]={rows:[{id:uid(),items:[{id:uid(),type:'text',flex:1,height:NOTE_CFG[id]?.defH||90,data:{content:textVal}}]}]};
        }
      });
      SECS.forEach(sec=>{
        const k=nKey('extra_'+sec);
        if(data[k]){try{extraNotes[sec]=JSON.parse(data[k]);}catch{}}
      });
    }
  }catch{}
  renderAllNoteAreas();
  SECS.forEach(sec=>{if(extraNotes[sec]?.length)renderExtraNotes(sec);});
}

async function saveAll(){
  const btn=document.getElementById('saveBtn'),ok=document.getElementById('saveOk'),st=document.getElementById('nSt');
  btn.disabled=true;btn.textContent='儲存中…';st.innerHTML='<span class="sSp"></span>';
  collectAllTexts();
  const entries=[
    ...NOTE_IDS.map(id=>({key:nKey('rich_'+id),value:JSON.stringify(getRD(id))})),
    ...SECS.map(sec=>({key:nKey('extra_'+sec),value:JSON.stringify(extraNotes[sec]||[])})),
    // Backward compat: plain text
    ...NOTE_IDS.map(id=>{
      const d=getRD(id);
      const first=d.rows?.flatMap(r=>r.items).find(i=>i.type==='text');
      return{key:nKey(id),value:first?.data?.content||''};
    }),
  ];
  try{
    const r=await fetch('/api/notes/batch',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({entries})});
    btn.disabled=false;btn.textContent='💾 儲存說明';
    if(r.ok){ok.style.opacity='1';st.innerHTML='';setTimeout(()=>{ok.style.opacity='0';},2500);}
    else{st.textContent='❌ 儲存失敗，請確認網路';st.style.color='#ef4444';setTimeout(()=>{st.textContent='';st.style.color='';},4000);}
  }catch{
    btn.disabled=false;btn.textContent='💾 儲存說明';
    st.textContent='❌ 儲存失敗';st.style.color='#ef4444';
  }
}

// ── Modal helpers ──
function closeModal(id){document.getElementById(id).style.display='none';}
document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.style.display='none';}));

init();
</script>
