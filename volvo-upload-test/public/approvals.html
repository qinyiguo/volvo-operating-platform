<!DOCTYPE html>
<!--
  public/approvals.html — 上傳簽核
  -------------------------------------------------------------
  路徑:  /approvals.html
  權限:  登入即可（列表 API 會依角色自動過濾）
  功能:  檢視 / 一階核可 / 二階核可 / 退件 / 撤回 上傳簽核申請。
         由 auth.js 在 nav 上注入「📬 簽核」入口連到這裡。
  相依 API: /api/upload-requests/*
-->
<html lang="zh-TW">
<head>
<link rel="stylesheet" href="/theme.css">
<script src="/auth.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volvo DMS — 上傳簽核</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Microsoft JhengHei', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  .sticky-header { position: sticky; top: 0; z-index: 200; background: #0f172a; box-shadow: 0 2px 20px rgba(0,0,0,.6); }
  .nav { background: #1e293b; border-bottom: 1px solid #2d3f56; padding: 0 24px; display: flex; align-items: center; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nav-brand { font-size: 15px; font-weight: 700; color: #fff; padding: 16px 0; margin-right: 24px; white-space: nowrap; flex-shrink: 0; }
  .nav-link { padding: 16px 14px; color: var(--text-dim); font-size: 13px; font-weight: 600; text-decoration: none; border-bottom: 2px solid transparent; white-space: nowrap; flex-shrink: 0; }
  .nav-link:hover { color: #e2e8f0; }
  .nav-link.active { color: #3b82f6; border-bottom-color: #3b82f6; }
  .theme-toggle-btn { margin-left: auto; background: transparent; border: 1px solid #2d3f56; color: var(--text-dim); border-radius: 6px; padding: 5px 9px; font-size: 15px; cursor: pointer; line-height: 1; flex-shrink: 0; }

  .container { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .page-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .page-sub   { font-size: 13px; color: var(--text-dim); margin-bottom: 18px; }

  .tab-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; border: none; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: all .15s; }
  .btn-primary   { background: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { background: #253347; color: #cbd5e1; border: 1px solid #2d3f56; }
  .btn-secondary:hover { background: #2d3f56; }
  .btn-green     { background: rgba(16,185,129,.15); color: #10b981; border: 1px solid rgba(16,185,129,.3); }
  .btn-green:hover { background: rgba(16,185,129,.25); }
  .btn-danger    { background: rgba(239,68,68,.1); color: #ef4444; border: 1px solid rgba(239,68,68,.3); }
  .btn-danger:hover { background: rgba(239,68,68,.18); }

  .card { background: #1a2332; border: 1px solid #2d3f56; border-radius: 10px; padding: 14px 18px; margin-bottom: 10px; }

  .empty   { padding: 60px 16px; text-align: center; color: var(--text-dim); font-size: 14px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #2d3f56; border-top-color: #3b82f6; border-radius: 50%; animation: spin .7s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .nav { padding: 0 16px; }
    .nav-brand { font-size: 13px; padding: 12px 0; margin-right: 16px; }
    .nav-link { padding: 12px 10px; font-size: 12px; }
    .container { padding: 14px 12px 28px; }
    .page-title { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="sticky-header">
  <nav class="nav">
    <span class="nav-brand">🚗 Volvo DMS</span>
    <a href="/performance.html"    class="nav-link">🎯 業績指標</a>
    <a href="/stats.html"          class="nav-link">📊 各廠明細</a>
    <a href="/query.html"          class="nav-link">🔍 資料查詢</a>
    <a href="/monthly_report.html" class="nav-link">📋 月報</a>
    <a href="/bonus.html"          class="nav-link">💰 獎金表</a>
    <a href="/settings.html"       class="nav-link">⚙️ 設定</a>
    <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()" title="切換主題">☀️</button>
  </nav>
</div>

<div class="container">
  <div class="page-title">📬 上傳簽核</div>
  <div class="page-sub">已鎖定期間的上傳申請雙階段審核（據點主管 → 系統管理員）</div>

  <div class="tab-row">
    <button class="btn btn-primary"   id="aprTabTodo" onclick="aprSwitchTab('todo')">🔔 我待簽核 <span id="aprTodoCount" style="background:rgba(255,255,255,.2);padding:1px 7px;border-radius:9px;font-size:11px;margin-left:4px">0</span></button>
    <button class="btn btn-secondary" id="aprTabMine" onclick="aprSwitchTab('mine')">📝 我的申請</button>
    <button class="btn btn-secondary" id="aprTabAll"  onclick="aprSwitchTab('all')">📚 全部</button>
    <button class="btn btn-secondary" onclick="loadApprovals()" style="margin-left:auto">🔄 重新整理</button>
  </div>

  <div id="aprList">
    <div class="empty"><span class="spinner"></span>載入中...</div>
  </div>
</div>

<script>
let _aprScope = 'todo';
const APR_UPLOAD_TYPE_LABEL = {
  dms: 'DMS 四大檔', roster: '人員名冊',
  perf_targets: '業績目標', revenue_targets: '營收目標',
  revenue_targets_native: '營收目標（原生）', bodyshop: '業務鈑烤申請',
};
const APR_STATUS_LABEL = {
  pending:         { txt: '等待據點主管', color: '#f59e0b' },
  branch_approved: { txt: '等待系統管理員', color: '#3b82f6' },
  super_approved:  { txt: '執行中', color: '#3b82f6' },
  executed:        { txt: '已執行', color: '#10b981' },
  rejected:        { txt: '已退件', color: '#ef4444' },
  withdrawn:       { txt: '已撤回', color: 'var(--text-dim)' },
  expired:         { txt: '已過期', color: 'var(--text-dim)' },
};
const escHtml = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function aprSwitchTab(scope) {
  _aprScope = scope;
  ['todo','mine','all'].forEach(s => {
    const btn = document.getElementById('aprTab' + s.charAt(0).toUpperCase() + s.slice(1));
    if (!btn) return;
    btn.classList.toggle('btn-primary',  s === scope);
    btn.classList.toggle('btn-secondary', s !== scope);
  });
  loadApprovals();
}

async function loadApprovals() {
  const host = document.getElementById('aprList');
  host.innerHTML = '<div class="empty"><span class="spinner"></span>載入中...</div>';
  try {
    const rows = await DmsAuth.fetchWithAuth('/api/upload-requests?scope=' + encodeURIComponent(_aprScope)).then(r => r.json());
    if (rows.error) throw new Error(rows.error);
    if (!rows.length) {
      host.innerHTML = '<div class="empty">目前沒有資料</div>';
      return;
    }
    host.innerHTML = rows.map(renderApprovalRow).join('');
  } catch(e) {
    host.innerHTML = '<div class="empty" style="color:#ef4444">載入失敗：' + escHtml(e.message) + '</div>';
  }
  refreshApprovalCount();
}

function renderApprovalRow(r) {
  const st       = APR_STATUS_LABEL[r.status] || { txt: r.status, color: 'var(--text-dim)' };
  const typeLbl  = APR_UPLOAD_TYPE_LABEL[r.upload_type] || r.upload_type;
  const created  = new Date(r.created_at).toLocaleString('zh-TW');
  const expires  = new Date(r.expires_at).toLocaleString('zh-TW');
  const me       = (window._currentUser || {});
  const isSuper  = me.role === 'super_admin';
  const canBranch = isSuper || ((me.permissions||[]).includes('feature:approve_upload_branch'));
  const isMine   = r.requester_id === me.user_id || r.requester_username === me.username;
  const showBranchApprove = r.status === 'pending' && canBranch;
  const showSuperApprove  = r.status === 'branch_approved' && isSuper;
  const showReject        = (r.status === 'pending' || r.status === 'branch_approved') && (canBranch || isSuper);
  const showWithdraw      = r.status === 'pending' && isMine;

  const branchInfo = r.branch_approved_at
    ? '<span style="color:#10b981">✅ ' + escHtml(r.branch_approver_name||'') + ' ' + new Date(r.branch_approved_at).toLocaleString('zh-TW') + '</span>'
    : '<span style="color:var(--text-dim)">尚未核可</span>';
  const superInfo  = r.super_approved_at
    ? '<span style="color:#10b981">✅ ' + escHtml(r.super_approver_name||'') + ' ' + new Date(r.super_approved_at).toLocaleString('zh-TW') + '</span>'
    : '<span style="color:var(--text-dim)">尚未核可</span>';
  const rejectBlock = r.rejected_at
    ? '<div style="color:#ef4444;font-size:12px;margin-top:6px">❌ ' + escHtml(r.rejector_name||'') + ' ' + new Date(r.rejected_at).toLocaleString('zh-TW') + '：' + escHtml(r.reject_note||'') + '</div>'
    : '';
  const errorBlock = r.execute_error
    ? '<div style="color:#ef4444;font-size:12px;margin-top:6px">⚠️ 執行失敗：' + escHtml(r.execute_error) + '</div>'
    : '';

  const downloadLink = (r.status === 'pending' || r.status === 'branch_approved')
    ? '<a href="/api/upload-requests/' + r.id + '/file" style="color:#3b82f6;text-decoration:none;margin-left:8px">⬇️ 下載原檔</a>'
    : '';

  return `
  <div class="card">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px">
      <span style="background:${st.color}22;color:${st.color};font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px">${st.txt}</span>
      <span style="font-size:14px;font-weight:700">${typeLbl}</span>
      <span style="font-size:12px;color:var(--text-dim)">期間 <b>${r.period.slice(0,4)}/${r.period.slice(4)}</b>${r.branch?(' · 廠別 '+r.branch):''}</span>
      <span style="margin-left:auto;font-size:11px;color:var(--text-dimmer)">#${r.id} · 由 ${escHtml(r.requester_name||r.requester_username||'')} 於 ${created}</span>
    </div>
    <div style="font-size:13px;color:var(--text-dim);margin-bottom:4px">
      📎 ${escHtml(r.file_name||'')} <span style="color:var(--text-dimmer)">(${((r.file_size||0)/1024).toFixed(1)} KB)</span>${downloadLink}
    </div>
    <div style="font-size:13px;margin-bottom:6px">📝 <span style="color:var(--text-dim)">理由：</span>${escHtml(r.reason||'')}</div>
    <div style="font-size:12px;color:var(--text-dim);margin-bottom:2px">一階（據點主管）：${branchInfo}</div>
    <div style="font-size:12px;color:var(--text-dim)">二階（系統管理員）：${superInfo}</div>
    ${rejectBlock}${errorBlock}
    <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
      ${showBranchApprove ? '<button class="btn btn-green" onclick="aprApprove('+r.id+',\'branch\')">✅ 一階核可</button>' : ''}
      ${showSuperApprove  ? '<button class="btn btn-primary" onclick="aprApprove('+r.id+',\'super\')">👑 二階核可並執行</button>' : ''}
      ${showReject        ? '<button class="btn btn-danger" onclick="aprReject('+r.id+')">❌ 退件</button>' : ''}
      ${showWithdraw      ? '<button class="btn btn-secondary" onclick="aprWithdraw('+r.id+')">↩️ 撤回</button>' : ''}
      <span style="margin-left:auto;font-size:11px;color:var(--text-dimmer)">過期時間 ${expires}</span>
    </div>
  </div>`;
}

async function aprApprove(id, stage) {
  const note = prompt(stage === 'branch'
    ? '核可備註（可留空）：'
    : '系統管理員核可後將立即執行上傳。備註（可留空）：');
  if (note === null) return;
  const url = stage === 'branch'
    ? '/api/upload-requests/' + id + '/branch-approve'
    : '/api/upload-requests/' + id + '/super-approve';
  try {
    const r = await DmsAuth.fetchWithAuth(url, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ note }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || '核可失敗');
    if (stage === 'super') {
      alert(data.executed ? '✅ 已核可並成功執行上傳' : ('⚠️ 已核可但執行失敗：' + (data.error || '')));
    } else {
      alert('✅ 已核可');
    }
    loadApprovals();
  } catch(e) { alert('失敗：' + e.message); }
}

async function aprReject(id) {
  const note = prompt('退件原因：');
  if (!note) return;
  try {
    const r = await DmsAuth.fetchWithAuth('/api/upload-requests/' + id + '/reject', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ note }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || '退件失敗');
    loadApprovals();
  } catch(e) { alert('失敗：' + e.message); }
}

async function aprWithdraw(id) {
  if (!confirm('確定要撤回這筆申請嗎？')) return;
  try {
    const r = await DmsAuth.fetchWithAuth('/api/upload-requests/' + id, { method: 'DELETE' });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || '撤回失敗');
    loadApprovals();
  } catch(e) { alert('失敗：' + e.message); }
}

async function refreshApprovalCount() {
  try {
    const r = await DmsAuth.fetchWithAuth('/api/upload-requests/counts').then(r => r.json());
    const todoCount = document.getElementById('aprTodoCount');
    if (todoCount) todoCount.textContent = r.todo || 0;
  } catch(e) {}
}

(async () => {
  await DmsAuth.init();   // 登入即可，列表 API 依角色自動過濾
  loadApprovals();
})();
</script>
</body>
</html>
