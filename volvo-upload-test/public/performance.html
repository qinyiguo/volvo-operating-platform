<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volvo 業績指標與預估</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Microsoft JhengHei', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .sticky-header { position: sticky; top: 0; z-index: 200; background: #0f172a; box-shadow: 0 4px 24px rgba(0,0,0,.6); }
  .nav { background: #1e293b; border-bottom: 1px solid #2d3f56; padding: 0 24px; display: flex; align-items: center; }
  .nav-brand { font-size: 15px; font-weight: 700; color: #fff; padding: 16px 0; margin-right: 24px; }
  .nav-link { padding: 16px 16px; color: #64748b; font-size: 13px; font-weight: 600; text-decoration: none; border-bottom: 2px solid transparent; }
  .nav-link:hover { color: #e2e8f0; }
  .nav-link.active { color: #3b82f6; border-bottom-color: #3b82f6; }
  .header-body { padding: 10px 24px 8px; }
  .filter-bar { display: flex; gap: 10px; align-items: center; background: #1e293b; border: 1px solid #2d3f56; border-radius: 10px; padding: 10px 16px; margin-bottom: 10px; flex-wrap: wrap; }
  .filter-bar label { font-size: 12px; color: #64748b; font-weight: 600; }
  .branch-select { background: #0f172a; border: 1px solid #2d3f56; color: #e2e8f0; padding: 7px 10px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; outline: none; transition: border-color .15s; }
  .branch-select:hover, .branch-select:focus { border-color: #3b82f6; }
  .tab-bar-wrap { display: flex; gap: 0; background: #0f172a; border: 1px solid #2d3f56; border-radius: 10px; padding: 4px; width: fit-content; }
  .tab-btn { padding: 8px 20px; border: none; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; background: transparent; color: #64748b; transition: all .15s; }
  .tab-btn.active { background: #3b82f6; color: #fff; }
  .tab-btn:hover:not(.active) { color: #e2e8f0; }
  .container { padding: 16px 24px 24px; max-width: 1400px; margin: 0 auto; }
  .btn { padding: 7px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .card { background: #1a2332; border: 1px solid #2d3f56; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card-title-note { font-size: 11px; font-weight: 400; color: #64748b; margin-left: auto; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-blue { background: rgba(59,130,246,.15); color: #3b82f6; }
  .loading { text-align: center; padding: 48px; color: #64748b; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #2d3f56; border-top-color: #3b82f6; border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .perf-block { border: 1px solid #2d3f56; border-radius: 10px; margin-bottom: 14px; overflow: hidden; }
  .perf-block-header { background: #0f172a; padding: 12px 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .perf-block-body { display: grid; }
  .perf-cell { padding: 16px 20px; }
  .achieve-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: rgba(15,23,42,.9); border: 1px solid #2d3f56; border-radius: 10px; padding: 12px 16px; margin-bottom: 14px; }
  .achieve-bar-label { font-size: 11px; color: #475569; font-weight: 700; letter-spacing: .05em; white-space: nowrap; }
  .achieve-chip { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,.03); border: 1px solid #2d3f56; border-radius: 8px; padding: 8px 14px; }
  .full-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: rgba(16,185,129,.15); color: #10b981; white-space: nowrap; }
  /* Period selector */
  .period-selector { position: relative; }
  .period-btn { display: flex; align-items: center; gap: 8px; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 7px 12px 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; user-select: none; min-width: 148px; justify-content: space-between; outline: none; }
  .period-btn:hover { border-color: #3b82f6; background: #141f33; }
  .period-btn.open { border-color: #3b82f6; background: #141f33; }
  .period-btn .pb-year { font-size: 11px; font-weight: 600; color: #64748b; margin-right: 2px; }
  .period-btn .pb-month { font-size: 15px; font-weight: 800; color: #e2e8f0; }
  .period-btn .pb-arrow { font-size: 9px; color: #475569; transition: transform .2s; line-height: 1; margin-left: 4px; }
  .period-btn.open .pb-arrow { transform: rotate(180deg); color: #3b82f6; }
  .period-dropdown { position: absolute; top: calc(100% + 6px); left: 0; background: #1a2740; border: 1px solid #334155; border-radius: 12px; box-shadow: 0 16px 48px rgba(0,0,0,.8); z-index: 9999; width: 260px; overflow: hidden; display: none; flex-direction: column; }
  .period-dropdown.open { display: flex; }
  .period-dd-header { padding: 12px 14px 10px; border-bottom: 1px solid #2d3f56; flex-shrink: 0; }
  .period-dd-search input { width: 100%; background: #0f172a; border: 1px solid #2d3f56; color: #e2e8f0; padding: 7px 12px; border-radius: 7px; font-size: 12px; outline: none; transition: border-color .15s; }
  .period-dd-search input:focus { border-color: #3b82f6; }
  .period-dd-list { overflow-y: auto; max-height: 340px; padding: 6px 0; }
  .period-dd-list::-webkit-scrollbar { width: 4px; }
  .period-dd-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  .period-dd-year-label { font-size: 11px; font-weight: 700; color: #374151; letter-spacing: .06em; padding: 8px 14px 4px; display: flex; align-items: center; gap: 8px; }
  .period-dd-year-label::after { content: ''; flex: 1; height: 1px; background: #1e3050; }
  .period-dd-months { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; padding: 0 10px 8px; }
  .period-dd-mo { display: flex; flex-direction: column; align-items: center; padding: 8px 6px; border-radius: 8px; cursor: pointer; transition: all .12s; border: 1px solid transparent; }
  .period-dd-mo:hover { background: rgba(59,130,246,.1); border-color: rgba(59,130,246,.3); }
  .period-dd-mo.selected { background: rgba(59,130,246,.18); border-color: #3b82f6; }
  .period-dd-mo.current-month { border-color: rgba(16,185,129,.4); }
  .period-dd-mo.current-month:not(.selected) { background: rgba(16,185,129,.06); }
  .period-dd-mo .mo-num { font-size: 15px; font-weight: 800; color: #94a3b8; line-height: 1; }
  .period-dd-mo.selected .mo-num { color: #3b82f6; }
  .period-dd-mo.current-month:not(.selected) .mo-num { color: #10b981; }
  .period-dd-mo .mo-label { font-size: 10px; color: #475569; margin-top: 2px; }
  .period-dd-mo.selected .mo-label { color: #6aa3f8; }
  .period-dd-mo .mo-dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; margin-top: 3px; }
  .period-dd-mo.has-data .mo-dot { background: #10b981; }
  .period-dd-mo.selected .mo-dot { background: #3b82f6; }
  /* 工作天進度 */
  .wd-progress-wrap { display: flex; gap: 10px; align-items: stretch; flex-wrap: wrap; margin-bottom: 14px; }
  .wd-card { background: #1a2332; border: 1px solid #2d3f56; border-radius: 10px; padding: 14px 16px; flex: 1; min-width: 190px; display: flex; flex-direction: column; gap: 9px; }
  .wd-track { background: #0f172a; border-radius: 4px; height: 7px; position: relative; overflow: hidden; }
  .wd-fill  { height: 7px; border-radius: 4px; transition: width .5s; }
  .wd-rev-marker { position: absolute; top: -3px; width: 2px; height: 13px; background: rgba(255,255,255,.55); border-radius: 1px; transition: left .5s; pointer-events: none; }
  .wd-status { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .wd-legend { width: 100%; display: flex; gap: 14px; align-items: center; font-size: 11px; color: #475569; padding: 4px 2px 0; flex-wrap: wrap; }
</style>
</head>
<body>

<div class="sticky-header">
  <nav class="nav">
    <span class="nav-brand">🚗 Volvo DMS</span>
    <a href="/performance.html" class="nav-link active">🎯 業績指標與預估</a>
    <a href="/stats.html" class="nav-link">📊 各廠明細</a>
    <a href="/query.html" class="nav-link">🔍 資料查詢</a>
    <a href="/settings.html" class="nav-link">⚙️ 設定</a>
  </nav>
  <div class="header-body">
    <div class="filter-bar">
      <label>期間</label>
      <div id="periodSelectorWrap"></div>
      <label>據點</label>
      <select id="selBranch" class="branch-select">
        <option value="">全部</option>
        <option value="AMA">AMA</option>
        <option value="AMC">AMC</option>
        <option value="AMD">AMD</option>
      </select>
      <button class="btn btn-primary" onclick="doLoad()">查詢</button>
      <span id="lastUpdate" style="margin-left:auto;font-size:12px;color:#64748b"></span>
    </div>
    <div class="tab-bar-wrap">
      <button id="tab-btn-progress" class="tab-btn active" onclick="switchPerfTab('progress')">📊 業績進度</button>
      <button id="tab-btn-estimate" class="tab-btn" onclick="switchPerfTab('estimate')">✏️ 業績預估設定</button>
    </div>
  </div>
</div>

<div class="container">
  <div id="tab-progress">

    <!-- ══ 工作天進度 ══ -->
    <div id="workingDaysBar" style="display:none"></div>

    <div id="revenueKPISection" style="margin-bottom:20px;display:none">
      <div id="revKPI-group" style="margin-bottom:12px"></div>
      <div id="revKPI-paid" style="margin-bottom:12px"></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px" id="revKPI-sub"></div>
    </div>
    <div class="card">
      <div class="card-title">📊 收入明細分解<span id="perfBreakdownPeriod" class="card-title-note"></span></div>
      <div id="perfBreakdown"><div class="loading"><span class="spinner"></span>載入中</div></div>
    </div>
    <div class="card">
      <div class="card-title">
        🎯 各指標業績進度
        <span id="perfPeriodLabel" class="card-title-note"></span>
        <a href="/settings.html" style="font-size:12px;color:#64748b;text-decoration:none;padding:4px 8px;border:1px solid #2d3f56;border-radius:5px;background:#1e293b;margin-left:auto">⚙️ 設定指標</a>
      </div>
      <div id="branchAchieveBar" class="achieve-bar" style="display:none"></div>
      <div id="perfNoConfig" style="display:none;padding:48px;text-align:center;color:#64748b">
        尚未建立業績指標，請前往 <a href="/settings.html" style="color:#3b82f6">⚙️ 設定 → 業績目標</a> 新增追蹤項目
      </div>
      <div id="perfDetail"></div>
    </div>
  </div>

  <div id="tab-estimate" style="display:none">
    <div class="card">
      <div class="card-title">
        ✏️ 業績預估設定
        <span id="estPeriodLabel" class="card-title-note"></span>
        <button class="btn btn-primary" style="margin-left:auto;padding:5px 12px;font-size:12px" onclick="saveAllEstimates()">💾 儲存預估</button>
      </div>
      <div style="background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:11px 14px;font-size:12px;color:#94a3b8;line-height:1.8;margin-bottom:14px">
        輸入各據點本月各項營收預估值（千元 K）。💡 例如預估 AMA 有費營收約 25,000K，就填入 <strong>25000</strong>
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr>
            <th style="text-align:left;padding:10px 14px;background:#0f172a;color:#64748b;font-size:11px;font-weight:700;border-bottom:1px solid #2d3f56">據點</th>
            <th style="text-align:right;padding:10px 14px;background:#0f172a;color:#f97316;font-size:12px;font-weight:800;border-bottom:1px solid #2d3f56">🔶 有費營收 (K)</th>
            <th style="text-align:right;padding:10px 14px;background:#0f172a;color:#3b82f6;font-size:12px;font-weight:800;border-bottom:1px solid #2d3f56">💙 一般營收 (K)</th>
            <th style="text-align:right;padding:10px 14px;background:#0f172a;color:#8b5cf6;font-size:12px;font-weight:800;border-bottom:1px solid #2d3f56">🔨 鈑烤營收 (K)</th>
            <th style="text-align:right;padding:10px 14px;background:#0f172a;color:#10b981;font-size:12px;font-weight:800;border-bottom:1px solid #2d3f56">🛡️ 延保營收 (K)</th>
          </tr></thead>
          <tbody id="estTableBody"><tr><td colspan="5" style="padding:24px;text-align:center;color:#64748b"><span class="spinner"></span>載入中</td></tr></tbody>
        </table>
      </div>
      <div id="estSaveMsg" style="font-size:13px;min-height:20px;margin-top:12px;text-align:right"></div>
    </div>
  </div>
</div>

<script>
const n    = (v) => parseFloat(v || 0);
const fmt  = (v) => Math.round(n(v)).toLocaleString();
const fmtK = (v) => Math.round(n(v) / 1000).toLocaleString() + 'K';

let _currentPeriod = '';
let _allPeriods    = [];
let _wdSummary     = null;   // from /api/stats/daily summary
let _revRates      = null;   // { AMA: paidRate%, AMC: ..., AMD: ... }
let _revData       = null;   // { AMA: {actual, target, est}, ... }  for group total

function getPeriod() { return _currentPeriod; }

// ── Period selector ──
function initPeriodSelector(periods) {
  _allPeriods = periods;
  renderPeriodSelector('');
}

function renderPeriodSelector(filterQ) {
  const wrap = document.getElementById('periodSelectorWrap');
  if (!wrap) return;
  const now = new Date();
  const thisMonth = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}`;
  const groups = {};
  _allPeriods.forEach(p => { const yr=p.slice(0,4); if(!groups[yr])groups[yr]=[]; groups[yr].push(p); });
  const btnContent = _currentPeriod
    ? `<span class="pb-year">${_currentPeriod.slice(0,4)}</span><span class="pb-month">${parseInt(_currentPeriod.slice(4))}月</span>`
    : `<span class="pb-month" style="color:#64748b">全部期間</span>`;
  function fmtP(p){return`${p.slice(0,4)}年${p.slice(4)}月`;}
  let listHtml='';
  Object.keys(groups).sort((a,b)=>b-a).forEach(yr=>{
    const months=groups[yr];
    listHtml+=`<div class="period-dd-year-label">${yr}</div><div class="period-dd-months">`;
    for(let mo=12;mo>=1;mo--){
      const p=`${yr}${String(mo).padStart(2,'0')}`,exists=months.includes(p);
      if(!filterQ||fmtP(p).includes(filterQ)){
        const isSel=p===_currentPeriod,isCur=p===thisMonth;
        listHtml+=`<div class="period-dd-mo ${isSel?'selected':''} ${isCur?'current-month':''} ${exists?'has-data':''}" onclick="selectPeriod('${p}')">
          <span class="mo-num">${mo}</span><span class="mo-label">月</span><span class="mo-dot"></span></div>`;
      }
    }
    listHtml+=`</div>`;
  });
  wrap.innerHTML=`<div class="period-selector" id="ps-root">
    <button class="period-btn" id="ps-btn" type="button" onclick="togglePeriodDD(event)">${btnContent}<span class="pb-arrow">▼</span></button>
    <div class="period-dropdown" id="ps-dd">
      <div class="period-dd-header">
        <div class="period-dd-year-label" style="padding:0 0 6px;font-size:11px;color:#475569">選擇期間</div>
        <div class="period-dd-search"><input type="text" placeholder="🔍 搜尋 例：2026年03月" id="ps-search" oninput="filterPeriodDD(this.value)" onclick="event.stopPropagation()"></div>
      </div>
      <div class="period-dd-list" id="ps-list">${listHtml}</div>
    </div></div>`;
}

window.togglePeriodDD=function(e){e.stopPropagation();const btn=document.getElementById('ps-btn'),dd=document.getElementById('ps-dd');if(!btn||!dd)return;const isOpen=dd.classList.contains('open');closeAllPD();if(!isOpen){btn.classList.add('open');dd.classList.add('open');setTimeout(()=>document.getElementById('ps-search')?.focus(),50);}};
window.filterPeriodDD=function(q){const now=new Date(),thisMonth=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}`;function fmtP(p){return`${p.slice(0,4)}年${p.slice(4)}月`;}const groups={};_allPeriods.filter(p=>!q||fmtP(p).includes(q)||p.includes(q.replace(/[^0-9]/g,''))).forEach(p=>{const yr=p.slice(0,4);if(!groups[yr])groups[yr]=[];groups[yr].push(p);});let listHtml='';if(!Object.keys(groups).length){listHtml='<div style="padding:20px;text-align:center;color:#475569;font-size:12px">無符合期間</div>';}else{Object.keys(groups).sort((a,b)=>b-a).forEach(yr=>{const months=groups[yr];listHtml+=`<div class="period-dd-year-label">${yr}</div><div class="period-dd-months">`;for(let mo=12;mo>=1;mo--){const p=yr+String(mo).padStart(2,'0');if(!months.includes(p))continue;const isSel=p===_currentPeriod,isCur=p===thisMonth;listHtml+=`<div class="period-dd-mo ${isSel?'selected':''} ${isCur?'current-month':''} has-data" onclick="selectPeriod('${p}')"><span class="mo-num">${mo}</span><span class="mo-label">月</span><span class="mo-dot"></span></div>`;}listHtml+=`</div>`;});}const el=document.getElementById('ps-list');if(el)el.innerHTML=listHtml;};
window.selectPeriod=function(val){_currentPeriod=val;closeAllPD();renderPeriodSelector('');};
window.closeAllPD=function(){document.querySelectorAll('.period-btn.open').forEach(b=>b.classList.remove('open'));document.querySelectorAll('.period-dropdown.open').forEach(d=>d.classList.remove('open'));};
document.addEventListener('click',closeAllPD);

async function loadPeriods(){
  try{
    const periods=await(await fetch('/api/periods')).json();
    _allPeriods=periods;
    const now=new Date(),cur=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}`;
    _currentPeriod=periods.includes(cur)?cur:(periods[0]||'');
    initPeriodSelector(periods);
  }catch(e){}
}

function switchPerfTab(tab){
  ['progress','estimate'].forEach(t=>{
    document.getElementById(`tab-${t}`).style.display=t===tab?'':'none';
    document.getElementById(`tab-btn-${t}`).classList.toggle('active',t===tab);
  });
  if(tab==='estimate')renderEstTable();
}

// ══════════════════════════════════════════════
// 工作天進度
// ══════════════════════════════════════════════
async function loadWorkingDaysProgress(period, branch) {
  _wdSummary = null;
  const el = document.getElementById('workingDaysBar');
  if (!period) { el.style.display='none'; return; }
  try {
    const data = await fetch(`/api/stats/daily?period=${period}${branch?'&branch='+branch:''}`).then(r=>r.json());
    _wdSummary = data.summary || [];
    renderWorkingDaysBar();
  } catch(e) { el.style.display='none'; }
}

function renderWorkingDaysBar() {
  const el = document.getElementById('workingDaysBar');
  if (!_wdSummary || !_wdSummary.length) { el.style.display='none'; return; }

  const branch = document.getElementById('selBranch').value;
  const BRANCHES = branch ? [branch] : ['AMA','AMC','AMD'];
  const brColors = { AMA:'#3b82f6', AMC:'#10b981', AMD:'#f59e0b' };

  const cards = BRANCHES.map(br => {
    const s   = _wdSummary.find(r => r.branch === br);
    const col = brColors[br] || '#94a3b8';

    const elapsed  = s ? parseInt(s.auto_working_days || 0) : 0;
    const total    = s ? parseInt(s.working_days || 0) : 0;
    const isManual = s ? s.configured_working_days !== null : false;
    const wdPct    = total > 0 ? Math.min(100, elapsed / total * 100) : 0;

    // 進度條顏色：根據進度多寡
    const fillColor = wdPct >= 90 ? '#10b981' : wdPct >= 50 ? col : '#f59e0b';

    // 有費達成率（若已載入）
    const revRate = (_revRates && _revRates[br] != null) ? _revRates[br] : null;

    // 比較狀態
    let statusHtml = '';
    if (revRate !== null && wdPct > 0) {
      const gap = revRate - wdPct;
      if (gap >= 3) {
        statusHtml = `<span class="wd-status" style="background:rgba(16,185,129,.15);color:#10b981">🚀 超前 ${Math.abs(gap).toFixed(1)}%</span>`;
      } else if (gap <= -5) {
        statusHtml = `<span class="wd-status" style="background:rgba(239,68,68,.15);color:#ef4444">⚠️ 落後 ${Math.abs(gap).toFixed(1)}%</span>`;
      } else {
        statusHtml = `<span class="wd-status" style="background:rgba(245,158,11,.12);color:#f59e0b">〜 符合進度</span>`;
      }
    }

    // 有費達成率標記線位置（在進度條上）
    const markerHtml = revRate !== null
      ? `<div class="wd-rev-marker" style="left:${Math.min(100, revRate).toFixed(1)}%" title="有費達成率 ${revRate.toFixed(1)}%"></div>`
      : '';

    return `<div class="wd-card" style="border-color:${col}44">
      <!-- 標頭 -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        <span style="font-size:13px;font-weight:800;color:${col}">📅 ${br}</span>
        <div style="display:flex;align-items:center;gap:7px">
          ${isManual
            ? `<span style="font-size:10px;color:#10b981;background:rgba(16,185,129,.12);padding:1px 6px;border-radius:5px">✅ 手動</span>`
            : `<span style="font-size:10px;color:#f59e0b;background:rgba(245,158,11,.1);padding:1px 6px;border-radius:5px">⚠️ 自動</span>`}
          <span style="font-size:12px;color:#64748b">
            <strong style="font-size:15px;color:#e2e8f0">${elapsed}</strong>
            <span> / ${total > 0 ? total : '?'} 天</span>
          </span>
        </div>
      </div>
      <!-- 進度條 -->
      <div class="wd-track">
        <div class="wd-fill" style="width:${wdPct.toFixed(1)}%;background:${fillColor}"></div>
        ${markerHtml}
      </div>
      <!-- 數字 + 狀態 -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        <div style="display:flex;align-items:center;gap:12px">
          <!-- 工作天進度 -->
          <div style="text-align:center">
            <div style="font-size:20px;font-weight:900;color:${fillColor};line-height:1">${wdPct.toFixed(0)}%</div>
            <div style="font-size:10px;color:#475569;margin-top:1px">天數進度</div>
          </div>
          ${revRate !== null ? `
          <div style="width:1px;height:30px;background:#2d3f56"></div>
          <!-- 有費達成率 -->
          <div style="text-align:center">
            <div style="font-size:20px;font-weight:900;color:#f97316;line-height:1">${revRate.toFixed(0)}%</div>
            <div style="font-size:10px;color:#475569;margin-top:1px">有費達成</div>
          </div>` : ''}
        </div>
        ${statusHtml}
      </div>
    </div>`;
  }).join('');

  // ── 集團合計卡 (只在顯示全部三廠時出現) ──
  let groupCard = '';
  if (BRANCHES.length === 3 && _revData) {
    const ALL = ['AMA','AMC','AMD'];

    // 工作天：各廠平均進度%（加權：分子加總 / 分母加總）
    let gElapsed = 0, gTotal = 0;
    ALL.forEach(br => {
      const s = _wdSummary.find(r => r.branch === br);
      if (s) {
        gElapsed += parseInt(s.auto_working_days || 0);
        gTotal   += parseInt(s.working_days || 0);
      }
    });
    const gMonthPct = gTotal > 0 ? gElapsed / gTotal * 100 : null;
    const gMonthBarW = gMonthPct !== null ? Math.min(100, gMonthPct).toFixed(1) : 0;

    // 有費：三廠加總
    const gActual = ALL.reduce((s, br) => s + (_revData[br]?.actual || 0), 0);
    const gTarget = ALL.reduce((s, br) => s + (_revData[br]?.target || 0), 0);
    const gEst    = ALL.reduce((s, br) => s + (_revData[br]?.est || 0), 0);
    const gRevPct = gTarget > 0 ? gActual / gTarget * 100 : null;
    const gEstPct = gTarget > 0 && gEst > 0 ? gEst / gTarget * 100 : null;
    const gRevBarW = gRevPct !== null ? Math.min(100, gRevPct).toFixed(1) : 0;
    const gEstBarW = gEstPct !== null ? Math.min(100, gEstPct).toFixed(1) : 0;

    // 進度差
    const gDelta = (gRevPct !== null && gMonthPct !== null) ? gRevPct - gMonthPct : null;
    const gDeltaCol  = gDelta === null ? '#64748b' : gDelta >= 3 ? '#10b981' : gDelta <= -5 ? '#ef4444' : '#f59e0b';
    const gDeltaIcon = gDelta === null ? '—' : gDelta >= 3 ? '🚀 超前' : gDelta <= -5 ? '⚠️ 落後' : '〜 符合';
    const gDeltaText = gDelta !== null ? `${gDeltaIcon} ${gDelta >= 0 ? '+' : ''}${gDelta.toFixed(1)}%` : '—';

    const gRevCol  = gRevPct === null ? '#64748b' : gRevPct >= 100 ? '#10b981' : gRevPct >= 80 ? '#f59e0b' : '#ef4444';
    const gEstCol  = gEstPct === null ? '#64748b' : gEstPct >= 100 ? '#10b981' : gEstPct >= 80 ? '#f59e0b' : '#f97316';
    const gFillCol = gMonthPct === null ? '#64748b' : gMonthPct >= 90 ? '#10b981' : gMonthPct >= 50 ? '#94a3b8' : '#f59e0b';

    // 有費達成率標記線
    const gMarker = gRevPct !== null
      ? `<div class="wd-rev-marker" style="left:${Math.min(100, gRevPct).toFixed(1)}%" title="集團有費達成率 ${gRevPct.toFixed(1)}%"></div>`
      : '';

    groupCard = `<div class="wd-card" style="border:2px solid #f97316;background:linear-gradient(135deg,rgba(249,115,22,.06),rgba(249,115,22,.02))">
      <!-- 標頭 -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px">
        <span style="font-size:13px;font-weight:800;color:#f97316">🏢 集團合計</span>
        <span style="font-size:11px;padding:2px 8px;border-radius:6px;font-weight:700;background:${gDeltaCol}18;color:${gDeltaCol}">${gDeltaText}</span>
      </div>
      <div style="font-size:10px;color:#475569;margin-bottom:10px">AMA + AMC + AMD 加總</div>

      <!-- 工作天進度條 -->
      <div style="font-size:10px;color:#64748b;margin-bottom:3px;display:flex;justify-content:space-between">
        <span>📅 天數進度（加權平均）</span>
        <span style="color:#94a3b8;font-weight:700">${gMonthPct !== null ? gMonthPct.toFixed(1)+'%' : '—'}</span>
      </div>
      <div class="wd-track" style="margin-bottom:10px">
        <div class="wd-fill" style="width:${gMonthBarW}%;background:${gFillCol}"></div>
        ${gMarker}
      </div>

      <!-- 數字 -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <div style="text-align:center">
          <div style="font-size:22px;font-weight:900;color:${gFillCol};line-height:1">${gMonthPct !== null ? gMonthPct.toFixed(0)+'%' : '—'}</div>
          <div style="font-size:10px;color:#475569;margin-top:1px">天數進度</div>
        </div>
        ${gRevPct !== null ? `
        <div style="width:1px;height:30px;background:#2d3f56"></div>
        <div style="text-align:center">
          <div style="font-size:22px;font-weight:900;color:${gRevCol};line-height:1">${gRevPct.toFixed(0)}%</div>
          <div style="font-size:10px;color:#475569;margin-top:1px">有費達成</div>
        </div>` : ''}
        ${gEstPct !== null ? `
        <div style="width:1px;height:30px;background:#2d3f56"></div>
        <div style="text-align:center">
          <div style="font-size:22px;font-weight:900;color:${gEstCol};line-height:1">${gEstPct.toFixed(0)}%</div>
          <div style="font-size:10px;color:#475569;margin-top:1px">預估達成</div>
        </div>` : ''}
      </div>

      <!-- 金額明細 -->
      <div style="display:grid;grid-template-columns:auto 1fr;gap:2px 10px;font-size:11px;color:#64748b">
        <span>實際</span><span style="color:#f97316;font-weight:800">${fmtK(gActual)}</span>
        <span>目標</span><span style="color:#94a3b8;font-weight:600">${gTarget > 0 ? fmtK(gTarget) : '未設定'}</span>
        ${gEst > 0 ? `<span style="color:${gEstCol}">預估</span><span style="color:${gEstCol};font-weight:700">${fmtK(gEst)}</span>` : ''}
      </div>
    </div>`;
  }

  const legend = `<div class="wd-legend">
    <span>📅 天數進度 = 已有進廠資料天數 ÷ 本月工作天</span>
    <span style="display:inline-flex;align-items:center;gap:4px">
      <span style="display:inline-block;width:8px;height:8px;background:rgba(255,255,255,.4);border-radius:1px;flex-shrink:0"></span>
      條上白線 = 有費達成率位置
    </span>
    <span>超前 / 落後判斷：有費達成率 − 天數進度，差距 ≥3% 為超前，≤−5% 為落後</span>
  </div>`;

  el.innerHTML = `<div class="wd-progress-wrap">${cards}${groupCard}</div>${legend}`;
  el.style.display = '';
}

async function doLoad() {
  const period=getPeriod(), branch=document.getElementById('selBranch').value;
  document.getElementById('lastUpdate').textContent='更新中...';
  _wdSummary = null;
  _revRates  = null;
  _revData   = null;
  await Promise.all([
    loadWorkingDaysProgress(period, branch),
    loadRevenueKPI(period, branch),
    loadIncomeBreakdown(period, branch),
    loadPerformance(period, branch),
  ]);
  document.getElementById('lastUpdate').textContent=`更新於 ${new Date().toLocaleTimeString('zh-TW')}`;
}

async function renderEstTable() {
  const period=getPeriod(),branch=document.getElementById('selBranch').value;
  const tbody=document.getElementById('estTableBody');
  const lbl=document.getElementById('estPeriodLabel');
  if(lbl&&period)lbl.textContent=`${period.slice(0,4)}年${period.slice(4)}月`;
  if(!period){tbody.innerHTML='<tr><td colspan="5" style="padding:24px;text-align:center;color:#64748b">請先選擇期間後按查詢</td></tr>';return;}
  tbody.innerHTML='<tr><td colspan="5" style="padding:24px;text-align:center;color:#64748b"><span class="spinner"></span>載入中</td></tr>';
  try{
    const estRes=await fetch(`/api/revenue-estimates?period=${period}${branch?'&branch='+branch:''}`).then(r=>r.json());
    const eMap={};(Array.isArray(estRes)?estRes:[]).forEach(e=>{eMap[e.branch]=e;});
    const BRANCHES=branch?[branch]:['AMA','AMC','AMD'];
    const brColors={AMA:'#3b82f6',AMC:'#10b981',AMD:'#f59e0b'};
    const KEYS=[{key:'paid',col:'#f97316'},{key:'general',col:'#3b82f6'},{key:'bodywork',col:'#8b5cf6'},{key:'extended',col:'#10b981'}];
    tbody.innerHTML=BRANCHES.map(br=>{
      const e=eMap[br]||{},bCol=brColors[br]||'#64748b';
      return`<tr><td style="padding:12px 14px;border-bottom:1px solid rgba(45,63,86,.3)">
        <span style="display:inline-block;padding:4px 12px;border-radius:6px;font-size:13px;font-weight:800;background:${bCol}22;color:${bCol}">${br}</span></td>
        ${KEYS.map(m=>{const val=e[`${m.key}_estimate`]?Math.round(e[`${m.key}_estimate`]/1000):'';
          return`<td style="padding:8px 14px;border-bottom:1px solid rgba(45,63,86,.3)">
            <div style="display:flex;align-items:center;gap:6px;justify-content:flex-end">
              <input type="number" id="est-${m.key}-${br}" value="${val}" placeholder="—" min="0" step="1"
                style="background:#0f172a;border:1px solid #2d3f56;color:${m.col};padding:8px 12px;border-radius:6px;font-size:13px;font-weight:700;width:130px;text-align:right;outline:none"
                onfocus="this.style.borderColor='${m.col}'" onblur="this.style.borderColor='#2d3f56'">
              <span style="font-size:12px;color:#475569">K</span></div></td>`;
        }).join('')}</tr>`;
    }).join('');
  }catch(e){tbody.innerHTML=`<tr><td colspan="5" style="color:#ef4444;padding:16px">${e.message}</td></tr>`;}
}

async function saveAllEstimates(){
  const period=getPeriod(),branch=document.getElementById('selBranch').value;
  const msgEl=document.getElementById('estSaveMsg');
  if(!period){msgEl.textContent='請先選擇期間';msgEl.style.color='#ef4444';return;}
  const BRANCHES=branch?[branch]:['AMA','AMC','AMD'];
  const entries=BRANCHES.map(br=>{
    const e={branch:br,period};
    ['paid','general','bodywork','extended'].forEach(k=>{const v=parseFloat(document.getElementById(`est-${k}-${br}`)?.value);e[`${k}_estimate`]=(!isNaN(v)&&v>0)?Math.round(v*1000):null;});
    return e;
  });
  const btn=document.querySelector('[onclick="saveAllEstimates()"]');
  if(btn){btn.disabled=true;btn.textContent='儲存中...';}
  try{
    const data=await(await fetch('/api/revenue-estimates/batch',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({entries})})).json();
    if(data.error)throw new Error(data.error);
    msgEl.textContent=`✅ 預估已儲存（${period.slice(0,4)}年${period.slice(4)}月）`;
    msgEl.style.color='#10b981';
    switchPerfTab('progress');await loadRevenueKPI(period,branch);
  }catch(e){msgEl.textContent='❌ '+e.message;msgEl.style.color='#ef4444';}
  finally{if(btn){btn.disabled=false;btn.textContent='💾 儲存預估';}}
}

// ══════════════════════════════════════════════
// 有費 KPI
// ══════════════════════════════════════════════
async function loadRevenueKPI(period,branch){
  const section=document.getElementById('revenueKPISection');
  if(!period){section.style.display='none';return;}
  try{
    const [bkRes,tgtRes,estRes]=await Promise.all([
      fetch(`/api/stats/income-breakdown?period=${period}${branch?'&branch='+branch:''}`).then(r=>r.json()),
      fetch(`/api/revenue-targets?period=${period}${branch?'&branch='+branch:''}`).then(r=>r.json()),
      fetch(`/api/revenue-estimates?period=${period}${branch?'&branch='+branch:''}`).then(r=>r.json()),
    ]);
    if(bkRes.error)throw new Error(bkRes.error);
    const BRANCHES=branch?[branch]:['AMA','AMC','AMD'];
    const brColors={AMA:'#3b82f6',AMC:'#10b981',AMD:'#f59e0b'};
    const tMap={};(Array.isArray(tgtRes)?tgtRes:[]).forEach(t=>{tMap[t.branch]=t;});
    const eMap={};(Array.isArray(estRes)?estRes:[]).forEach(e=>{eMap[e.branch]=e;});
    const bdata=bkRes.branches||{};

    // ── 儲存有費達成率，供工作天進度條比較 ──
    _revRates={}; _revData={};
    BRANCHES.forEach(br=>{
      const actual=bdata[br]?.paid_total||0;
      const target=parseFloat(tMap[br]?.paid_target||0);
      const est=parseFloat(eMap[br]?.paid_estimate||0);
      _revRates[br]=target>0?(actual/target*100):null;
      _revData[br]={actual, target, est};
    });
    if(_wdSummary)renderWorkingDaysBar(); // 若工作天已載入，立刻更新狀態

    // ── 集團合計卡片 ──
    const buildGroupCard=(metricKey,actualKey,label,color)=>{
      const ALL=['AMA','AMC','AMD'];
      const gActual=ALL.reduce((s,br)=>s+(bdata[br]?.[actualKey]||0),0);
      const gTarget=ALL.reduce((s,br)=>s+parseFloat(tMap[br]?.[`${metricKey}_target`]||0),0);
      const gLY=ALL.reduce((s,br)=>s+parseFloat(tMap[br]?.[`${metricKey}_last_year`]||0),0);
      const gEst=ALL.reduce((s,br)=>s+parseFloat(eMap[br]?.[`${metricKey}_estimate`]||0),0);
      const rate=gTarget>0?gActual/gTarget*100:null;
      const estRate=gTarget>0&&gEst>0?gEst/gTarget*100:null;
      const yoy=gLY>0?(gActual-gLY)/gLY*100:null;
      const rCol=rate===null?'#64748b':rate>=100?'#10b981':rate>=80?'#f59e0b':'#ef4444';
      const eCol=estRate===null?'#64748b':estRate>=100?'#10b981':estRate>=80?'#f59e0b':'#f97316';
      const barW=rate!==null?Math.min(100,rate).toFixed(0):0;
      const estBarW=estRate!==null?Math.min(100,estRate).toFixed(0):0;
      const SUB=[
        {key:'general',actualKey:'general_total',label:'💙 一般總營收',color:'#3b82f6'},
        {key:'bodywork',actualKey:'bodywork_total',label:'🔨 鈑烤總營收',color:'#8b5cf6'},
        {key:'extended',actualKey:'extended',label:'🛡️ 延保總營收',color:'#10b981'},
      ];
      const branchCells=SUB.map((sm,si)=>{
        const sAct=ALL.reduce((s,br)=>s+(bdata[br]?.[sm.actualKey]||0),0);
        const sTgt=ALL.reduce((s,br)=>s+parseFloat(tMap[br]?.[`${sm.key}_target`]||0),0);
        const sLY=ALL.reduce((s,br)=>s+parseFloat(tMap[br]?.[`${sm.key}_last_year`]||0),0);
        const sEst=ALL.reduce((s,br)=>s+parseFloat(eMap[br]?.[`${sm.key}_estimate`]||0),0);
        const r=sTgt>0?sAct/sTgt*100:null,er=sTgt>0&&sEst>0?sEst/sTgt*100:null,yoy=sLY>0?(sAct-sLY)/sLY*100:null;
        const rc=r===null?'#64748b':r>=100?'#10b981':r>=80?'#f59e0b':'#ef4444';
        const ec=er===null?'#64748b':er>=100?'#10b981':er>=80?'#f59e0b':'#f97316';
        const bw=r!==null?Math.min(100,r).toFixed(0):0,ebw=er!==null?Math.min(100,er).toFixed(0):0;
        const borderR=si<SUB.length-1?'border-right:1px solid #2d3f56;':'';
        return`<div style="padding:16px 20px;${borderR}">
          <div style="font-size:12px;font-weight:800;color:${sm.color};margin-bottom:10px">${sm.label}</div>
          <div style="font-size:22px;font-weight:800;color:#e2e8f0;margin-bottom:6px">${fmtK(sAct)}</div>
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:${sEst>0?'6px':'12px'}">
            <div style="flex:1;background:#0f172a;border-radius:3px;height:5px"><div style="width:${bw}%;height:5px;background:${rc};border-radius:3px;transition:width .4s"></div></div>
            <span style="font-size:12px;font-weight:800;color:${rc};white-space:nowrap">${r!==null?r.toFixed(1)+'%':'—'}</span>
          </div>
          ${sEst>0?`<div style="display:flex;align-items:center;gap:5px;margin-bottom:12px">
            <div style="flex:1;background:#0f172a;border-radius:3px;height:3px"><div style="width:${ebw}%;height:3px;border-radius:3px;background:repeating-linear-gradient(90deg,${ec} 0,${ec} 4px,transparent 4px,transparent 7px)"></div></div>
            <span style="font-size:11px;font-weight:700;color:${ec};white-space:nowrap">預 ${er!==null?er.toFixed(1)+'%':'—'}</span>
          </div>`:''}
          <div style="display:grid;grid-template-columns:auto 1fr;gap:3px 12px;font-size:12px;color:#64748b;align-items:center">
            <span>目標</span><span style="text-align:right;color:#94a3b8;font-weight:700">${sTgt>0?fmtK(sTgt):'未設定'}</span>
            ${sEst>0?`<span style="color:${ec}">預估</span><span style="text-align:right;color:${ec};font-weight:700">${fmtK(sEst)}</span>`:''}
            <span>去年同期</span><span style="text-align:right"><span style="color:#94a3b8;font-weight:600">${sLY>0?fmtK(sLY):'—'}</span>${yoy!==null?`<span style="color:${yoy>=0?'#10b981':'#ef4444'};margin-left:5px">${yoy>=0?'▲':'▼'}${Math.abs(yoy).toFixed(1)}%</span>`:''}</span>
          </div></div>`;
      }).join('');
      return`<div style="background:#1a2332;border:2px solid ${color}44;border-radius:12px;overflow:hidden">
        <div style="background:linear-gradient(135deg,${color}18,${color}08);border-bottom:1px solid ${color}33;padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:13px;font-weight:800;color:${color}">集團有費合計</span>
            <span style="font-size:11px;color:#475569">一般(含自費鈑烤)＋保險鈑烤＋延保 ｜ AMA＋AMC＋AMD</span>
          </div>
          <div style="display:flex;align-items:center;gap:16px;margin-left:auto;flex-wrap:wrap">
            <div><div style="font-size:11px;color:#64748b;margin-bottom:2px">集團總計</div><div style="font-size:28px;font-weight:900;color:#fff;line-height:1">${fmtK(gActual)}</div></div>
            <div style="display:flex;flex-direction:column;gap:4px;min-width:160px">
              <div style="display:flex;align-items:center;gap:6px">
                <div style="flex:1;background:#0f172a;border-radius:3px;height:6px"><div style="width:${barW}%;height:6px;background:${rCol};border-radius:3px;transition:width .5s"></div></div>
                <span style="font-size:13px;font-weight:900;color:${rCol};white-space:nowrap;min-width:52px;text-align:right">${rate!==null?rate.toFixed(1)+'%':'—'}</span>
              </div>
              ${gEst>0?`<div style="display:flex;align-items:center;gap:6px">
                <div style="flex:1;background:#0f172a;border-radius:3px;height:4px"><div style="width:${estBarW}%;height:4px;border-radius:3px;background:repeating-linear-gradient(90deg,${eCol} 0,${eCol} 4px,transparent 4px,transparent 8px)"></div></div>
                <span style="font-size:11px;font-weight:700;color:${eCol};white-space:nowrap;min-width:52px;text-align:right">預 ${estRate!==null?estRate.toFixed(1)+'%':'—'}</span>
              </div>`:''}
            </div>
            <div style="display:grid;grid-template-columns:auto 1fr;gap:2px 10px;font-size:12px;color:#64748b">
              <span>目標</span><span style="color:#94a3b8;font-weight:700">${gTarget>0?fmtK(gTarget):'未設定'}</span>
              ${gEst>0?`<span style="color:${eCol}">預估</span><span style="color:${eCol};font-weight:700">${fmtK(gEst)}</span>`:''}
              <span>去年同期</span><span><span style="color:#94a3b8;font-weight:600">${gLY>0?fmtK(gLY):'—'}</span>${yoy!==null?`<span style="color:${yoy>=0?'#10b981':'#ef4444'};margin-left:4px">${yoy>=0?'▲':'▼'}${Math.abs(yoy).toFixed(1)}%</span>`:''}</span>
            </div>
          </div>
        </div>
        <div style="padding:10px 16px 8px;border-bottom:1px solid #2d3f56"><span style="font-size:11px;color:#374151;font-weight:700;letter-spacing:.05em">集團各類營收合計</span></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr)">${branchCells}</div>
      </div>`;
    };

    const buildCard=(m,fullWidth)=>{
      let card=`<div style="background:#1a2332;border:1px solid #2d3f56;border-radius:12px;overflow:hidden">
        <div style="padding:12px 18px 10px;border-bottom:1px solid #2d3f56;display:flex;align-items:center;gap:8px">
          <span style="font-size:14px;font-weight:800;color:${m.color}">${m.label}</span>
          ${fullWidth?`<span style="font-size:11px;color:#475569;margin-left:4px">一般(含自費鈑烤)＋保險鈑烤＋延保</span>`:''}
        </div>
        <div style="display:grid;grid-template-columns:repeat(${BRANCHES.length},1fr)">`;
      BRANCHES.forEach((br,bi)=>{
        const col=brColors[br]||'#64748b',t=tMap[br]||{},e=eMap[br]||{},bd=bdata[br]||{};
        const actual=bd[m.actualKey]||0,target=parseFloat(t[`${m.key}_target`]||0),ly=parseFloat(t[`${m.key}_last_year`]||0),est=parseFloat(e[`${m.key}_estimate`]||0);
        const rate=target>0?actual/target*100:null,estRate=target>0&&est>0?est/target*100:null,yoy=ly>0?(actual-ly)/ly*100:null;
        const rCol=rate===null?'#64748b':rate>=100?'#10b981':rate>=80?'#f59e0b':'#ef4444';
        const eCol=estRate===null?'#64748b':estRate>=100?'#10b981':estRate>=80?'#f59e0b':'#f97316';
        const barW=rate!==null?Math.min(100,rate).toFixed(0):0,estBarW=estRate!==null?Math.min(100,estRate).toFixed(0):0;
        const borderR=bi<BRANCHES.length-1?'border-right:1px solid #2d3f56;':'';
        card+=`<div style="padding:${fullWidth?'16px 20px':'14px 16px'};${borderR}">
          <div style="font-size:11px;font-weight:800;color:${col};margin-bottom:8px">${br}</div>
          <div style="font-size:${fullWidth?'24px':'20px'};font-weight:800;color:#e2e8f0;margin-bottom:4px">${fmtK(actual)}</div>
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:${est>0?'6px':'10px'}">
            <div style="flex:1;background:#0f172a;border-radius:3px;height:5px"><div style="width:${barW}%;height:5px;background:${rCol};border-radius:3px;transition:width .4s"></div></div>
            <span style="font-size:12px;font-weight:800;color:${rCol};white-space:nowrap">${rate!==null?rate.toFixed(1)+'%':'—'}</span>
          </div>
          ${est>0?`<div style="display:flex;align-items:center;gap:5px;margin-bottom:10px">
            <div style="flex:1;background:#0f172a;border-radius:3px;height:3px"><div style="width:${estBarW}%;height:3px;background:${eCol};border-radius:3px;opacity:.7;background:repeating-linear-gradient(90deg,${eCol} 0,${eCol} 4px,transparent 4px,transparent 7px)"></div></div>
            <span style="font-size:11px;font-weight:700;color:${eCol};white-space:nowrap">預 ${estRate!==null?estRate.toFixed(1)+'%':'—'}</span>
          </div>`:''}
          <div style="display:grid;grid-template-columns:auto 1fr;gap:2px 8px;font-size:11px;color:#64748b;align-items:center">
            <span>目標</span><span style="text-align:right;color:#94a3b8;font-weight:600">${target>0?fmtK(target):'未設定'}</span>
            ${est>0?`<span style="color:${eCol}">預估</span><span style="text-align:right;color:${eCol};font-weight:700">${fmtK(est)}</span>`:''}
            <span>去年同期</span><span style="text-align:right">
              <span style="color:#94a3b8;font-weight:600">${ly>0?fmtK(ly):'—'}</span>
              ${yoy!==null?`<span style="color:${yoy>=0?'#10b981':'#ef4444'};margin-left:4px">${yoy>=0?'▲':'▼'}${Math.abs(yoy).toFixed(1)}%</span>`:''}
            </span>
          </div></div>`;
      });
      card+=`</div></div>`;return card;
    };

    const groupEl=document.getElementById('revKPI-group');
    if(!branch){groupEl.innerHTML=buildGroupCard('paid','paid_total','集團有費合計','#f97316');groupEl.style.display='';}
    else{groupEl.style.display='none';}
    document.getElementById('revKPI-paid').innerHTML=buildCard({key:'paid',label:'🔶 有費營收',color:'#f97316',actualKey:'paid_total'},true);
    document.getElementById('revKPI-sub').innerHTML=[
      {key:'general',label:'💙 一般營收',color:'#3b82f6',actualKey:'general_total'},
      {key:'bodywork',label:'🔨 鈑烤營收',color:'#8b5cf6',actualKey:'bodywork_total'},
      {key:'extended',label:'🛡️ 延保營收',color:'#10b981',actualKey:'extended'},
    ].map(m=>buildCard(m,false)).join('');
    section.style.display='';
  }catch(e){document.getElementById('revKPI-paid').innerHTML=`<div style="color:#ef4444;padding:12px">${e.message}</div>`;section.style.display='';}
}

// ══════════════════════════════════════════════
// 收入明細分解
// ══════════════════════════════════════════════
async function loadIncomeBreakdown(period,branch){
  const el=document.getElementById('perfBreakdown'),lblEl=document.getElementById('perfBreakdownPeriod');
  if(!period){el.innerHTML='<div style="color:#64748b;font-size:13px">請選擇期間後按查詢</div>';return;}
  el.innerHTML='<div class="loading"><span class="spinner"></span>載入中</div>';
  try{
    const params=new URLSearchParams({period});if(branch)params.set('branch',branch);
    const data=await(await fetch(`/api/stats/income-breakdown?${params}`)).json();
    if(data.error)throw new Error(data.error);
    if(lblEl)lblEl.textContent=`${period.slice(0,4)}年${period.slice(4)}月`;
    const{branches:bdata}=data;
    const BRANCHES=branch?[branch]:['AMA','AMC','AMD'];
    const brColors={AMA:'#3b82f6',AMC:'#10b981',AMD:'#f59e0b'};
    const tot=k=>BRANCHES.reduce((s,br)=>s+(bdata[br]?.[k]||0),0);
    const ROWS=[
      {key:'general_no_bw',label:'一般收入（非鈑烤）',indent:1,color:'#60a5fa',note:'帳類=一般，不含鈑金/烤漆工單'},
      {key:'voucher',label:'票劵收入',indent:1,color:'#60a5fa',note:'帳類=票劵'},
      {key:'external',label:'外賣收入',indent:1,color:'#2dd4bf',note:'來自零件銷售'},
      {key:'general_total',label:'💙 一般營收',indent:0,color:'#3b82f6',bold:true,note:'一般(非鈑烤)＋票劵＋外賣'},
      {key:'bodywork_self',label:'自費鈑烤',indent:1,color:'#a78bfa',note:'帳類=一般，含鈑金/烤漆工單'},
      {key:'bodywork_insurance',label:'保險鈑烤',indent:1,color:'#a78bfa',note:'帳類=保險'},
      {key:'bodywork_total',label:'🔨 鈑烤營收',indent:0,color:'#8b5cf6',bold:true},
      {key:'extended',label:'🛡️ 延保營收',indent:0,color:'#10b981',bold:true},
      {key:'paid_total',label:'🔶 有費營收',indent:0,color:'#f97316',bold:true,border:true,note:'一般(含自費鈑烤)＋保險鈑烤＋延保'},
      {key:'other_total',label:'無費成本（內結/保固/VSA/善意）',indent:0,color:'#64748b'},
      {key:'all_total',label:'📌 全部營收',indent:0,color:'#e2e8f0',bold:true,border:true,note:'有費＋無費'},
    ];
    let html=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr>
      <th style="text-align:left;padding:10px 16px;background:#0f172a;color:#64748b;font-size:11px;font-weight:700;border-bottom:1px solid #2d3f56;min-width:220px">收入項目</th>`;
    BRANCHES.forEach(br=>{html+=`<th style="text-align:right;padding:10px 16px;background:#0f172a;color:${brColors[br]||'#94a3b8'};font-size:13px;font-weight:800;border-bottom:1px solid #2d3f56;min-width:140px">${br}</th>`;});
    if(BRANCHES.length>1)html+=`<th style="text-align:right;padding:10px 16px;background:#0f172a;color:#94a3b8;font-size:11px;font-weight:700;border-bottom:1px solid #2d3f56;min-width:120px;border-left:1px solid #374151">三站合計</th>`;
    html+=`</tr></thead><tbody>`;
    const allOD=[];BRANCHES.forEach(br=>(bdata[br]?.other_detail||[]).forEach(od=>{if(!allOD.find(x=>x.account_type===od.account_type))allOD.push(od);}));
    const odHtml=allOD.map(od=>{let r=`<tr><td style="padding:6px 16px 6px 36px;border-bottom:1px solid rgba(45,63,86,.2)"><div style="display:flex;align-items:center;gap:6px"><div style="width:3px;height:12px;background:#1e293b;border-radius:2px;flex-shrink:0"></div><span style="font-size:12px;color:#475569">${od.account_type}</span></div></td>`;BRANCHES.forEach(br=>{const m=(bdata[br]?.other_detail||[]).find(x=>x.account_type===od.account_type);r+=`<td style="text-align:right;padding:6px 16px;border-bottom:1px solid rgba(45,63,86,.2);font-size:12px;color:#475569">${m?.total>0?fmtK(m.total):'—'}</td>`;});if(BRANCHES.length>1)r+=`<td style="border-bottom:1px solid rgba(45,63,86,.2);border-left:1px solid #374151"></td>`;return r+`</tr>`;}).join('');
    ROWS.forEach(row=>{
      const bg=row.bold?'rgba(255,255,255,.03)':'transparent',bt=row.border?'border-top:2px solid #374151;':'';
      if(row.key==='other_total')html+=odHtml;
      html+=`<tr style="background:${bg}"><td style="padding:10px 16px;border-bottom:1px solid rgba(45,63,86,.3);${bt}">
        <div style="display:flex;align-items:center;gap:8px;padding-left:${row.indent?20:0}px">
          ${row.indent?'<div style="width:3px;height:14px;background:#2d3f56;border-radius:2px;flex-shrink:0"></div>':''}
          <span style="font-size:${row.bold?14:13}px;font-weight:${row.bold?800:600};color:${row.color||'#e2e8f0'}">${row.label}</span>
          ${row.note?`<span style="font-size:11px;color:#475569">${row.note}</span>`:''}
        </div></td>`;
      BRANCHES.forEach(br=>{const v=bdata[br]?.[row.key]||0;html+=`<td style="text-align:right;padding:10px 16px;border-bottom:1px solid rgba(45,63,86,.3);${bt}font-variant-numeric:tabular-nums"><span style="font-size:${row.bold?15:13}px;font-weight:${row.bold?800:600};color:${row.color||'#e2e8f0'}">${fmtK(v)}</span></td>`;});
      if(BRANCHES.length>1){const total=tot(row.key);html+=`<td style="text-align:right;padding:10px 16px;border-bottom:1px solid rgba(45,63,86,.3);${bt}font-variant-numeric:tabular-nums;background:rgba(255,255,255,.02);border-left:1px solid #374151"><span style="font-size:${row.bold?15:13}px;font-weight:${row.bold?800:600};color:${row.color||'#94a3b8'}">${fmtK(total)}</span></td>`;}
      html+=`</tr>`;
    });
    html+=`</tbody></table></div><div style="font-size:11px;color:#475569;margin-top:10px;line-height:2">💡 金額單位：千元（K）｜未稅</div>`;
    el.innerHTML=html;
  }catch(e){el.innerHTML=`<div style="color:#ef4444;padding:16px">${e.message}</div>`;}
}

// ══════════════════════════════════════════════
// 各指標業績進度
// ══════════════════════════════════════════════
async function loadPerformance(period,branch){
  const detailEl=document.getElementById('perfDetail'),noConfEl=document.getElementById('perfNoConfig'),achBar=document.getElementById('branchAchieveBar');
  if(!period){detailEl.innerHTML='';achBar.style.display='none';return;}
  detailEl.innerHTML='<div class="loading"><span class="spinner"></span>載入中</div>';
  achBar.style.display='none';
  try{
    const params=new URLSearchParams({period});if(branch)params.set('branch',branch);
    const data=await(await fetch(`/api/stats/performance?${params}`)).json();
    if(data.error)throw new Error(data.error);
    const{metrics,results}=data;
    if(!metrics.length){noConfEl.style.display='';detailEl.innerHTML='';return;}
    noConfEl.style.display='none';
    const BRANCHES=branch?[branch]:['AMA','AMC','AMD'];
    const brColors={AMA:'#3b82f6',AMC:'#10b981',AMD:'#f59e0b'};
    const TYPE_LABEL={repair_income:'🔧 維修收入(合計)',repair_subfield:'🔨 維修收入(子欄位)',parts:'🔩 零件銷售',boutique:'💎 精品配件',tech_wage:'🚗 工資代碼'};
    const FIELD_UNIT={amount:'元',qty:'件',count:'筆'};
    const metricMap={};metrics.forEach(m=>{metricMap[m.id]=m;});
    const brStats={};BRANCHES.forEach(br=>{brStats[br]={achieved:0,total:metrics.length};});
    results.forEach(r=>{BRANCHES.forEach(br=>{const d=r.branches[br]||{};if(d.achieve_rate!==null&&d.achieve_rate>=100)brStats[br].achieved++;});});
    achBar.innerHTML=`<span class="achieve-bar-label">各據點達標情況</span>`+BRANCHES.map(br=>{
      const s=brStats[br],col=brColors[br]||'#64748b',isAll=s.achieved===s.total&&s.total>0;
      const pct=s.total>0?Math.round(s.achieved/s.total*100):0;
      const aCol=isAll?'#10b981':s.achieved>0?'#f59e0b':'#ef4444';
      return`<div class="achieve-chip" style="border-color:${aCol}33">
        <span style="font-size:12px;font-weight:800;color:${col}">${br}</span>
        <span style="font-size:22px;font-weight:800;color:${aCol};line-height:1">${s.achieved}</span>
        <span style="font-size:12px;color:#475569">/ ${s.total} 項</span>
        <div style="display:flex;flex-direction:column;gap:3px">
          <div style="width:48px;background:#0f172a;border-radius:3px;height:4px"><div style="width:${pct}%;height:4px;border-radius:3px;background:${aCol};transition:width .4s"></div></div>
          <span style="font-size:10px;font-weight:700;color:${aCol}">${pct}%</span>
        </div>
        ${isAll?'<span class="full-badge">全達標 🎉</span>':''}
      </div>`;
    }).join('');
    achBar.style.display='flex';
    let html='';
    results.forEach(r=>{
      const metric=metricMap[r.metric_id];if(!metric)return;
      const isAmt=metric.stat_field!=='qty'&&metric.stat_field!=='count';
      const unit=metric.unit||FIELD_UNIT[metric.stat_field]||'元';
      const fmtV=v=>{if(v===null||v===undefined)return'—';if(isAmt&&!metric.unit)return fmtK(v);return metric.stat_field==='qty'?n(v).toFixed(1):fmt(v);};
      html+=`<div class="perf-block">
        <div class="perf-block-header">
          <span style="font-size:14px;font-weight:800;color:#e2e8f0">${metric.metric_name}</span>
          <span class="badge badge-blue" style="font-size:11px">${TYPE_LABEL[metric.metric_type]||metric.metric_type}</span>
          ${metric.description?`<span style="font-size:12px;color:#64748b">${metric.description}</span>`:''}
          <span style="font-size:11px;color:#475569;margin-left:auto">單位：${unit}</span>
        </div>
        <div class="perf-block-body" style="grid-template-columns:repeat(${BRANCHES.length},1fr)">`;
      BRANCHES.forEach((br,bi)=>{
        const d=r.branches[br]||{},col=brColors[br]||'#64748b',rate=d.achieve_rate;
        const rCol=rate===null?'#64748b':rate>=100?'#10b981':rate>=80?'#f59e0b':'#ef4444';
        const barW=rate!==null?Math.min(100,rate).toFixed(0):0,yoy=d.yoy_growth;
        const borderR=bi<BRANCHES.length-1?'border-right:1px solid #2d3f56':'';
        html+=`<div class="perf-cell" style="${borderR}">
          <div style="font-size:11px;font-weight:800;color:${col};margin-bottom:10px;letter-spacing:.04em">${br}</div>
          <div style="font-size:22px;font-weight:800;color:#e2e8f0;margin-bottom:6px">${fmtV(d.actual)}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
            <div style="flex:1;background:#0f172a;border-radius:3px;height:5px;min-width:40px"><div style="width:${barW}%;height:5px;background:${rCol};border-radius:3px"></div></div>
            <span style="font-size:13px;font-weight:800;color:${rCol};white-space:nowrap">${rate!==null?rate.toFixed(1)+'%':'無目標'}</span>
          </div>
          <div style="font-size:11px;color:#64748b;line-height:2">
            <div style="display:flex;justify-content:space-between"><span>目標</span><span style="color:#94a3b8;font-weight:600">${fmtV(d.target)}</span></div>
            <div style="display:flex;justify-content:space-between;align-items:center"><span>去年同期</span>
              <span><span style="color:#94a3b8;font-weight:600">${fmtV(d.last_year)}</span>
              ${yoy!==null?`<span style="color:${yoy>=0?'#10b981':'#ef4444'};margin-left:5px;font-size:11px">${yoy>=0?'▲':'▼'}${Math.abs(yoy).toFixed(1)}%</span>`:''}</span>
            </div>
          </div>
        </div>`;
      });
      html+=`</div></div>`;
    });
    detailEl.innerHTML=html||'<div style="padding:48px;text-align:center;color:#64748b">此期間無業績資料</div>';
    const lbl=document.getElementById('perfPeriodLabel');
    if(lbl&&period)lbl.textContent=`${period.slice(0,4)}年${period.slice(4)}月`;
  }catch(e){detailEl.innerHTML=`<div style="color:#ef4444;padding:16px">${e.message}</div>`;}
}

(async()=>{ await loadPeriods(); await doLoad(); })();
</script>
