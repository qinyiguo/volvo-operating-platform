<!DOCTYPE html>
<html lang="zh-TW">
<head>
<link rel="stylesheet" href="/theme.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volvo 業績指標與預估</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Microsoft JhengHei', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .sticky-header { position: sticky; top: 0; z-index: 200; background: #0f172a; box-shadow: 0 4px 24px rgba(0,0,0,.6); }
  .nav { background: #1e293b; border-bottom: 1px solid #2d3f56; padding: 0 24px; display: flex; align-items: center; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nav-brand { font-size: 15px; font-weight: 700; color: #fff; padding: 16px 0; margin-right: 24px; white-space: nowrap; flex-shrink: 0; }
  .nav-link { padding: 16px 16px; color: #64748b; font-size: 13px; font-weight: 600; text-decoration: none; border-bottom: 2px solid transparent; white-space: nowrap; flex-shrink: 0; }
  .nav-link:hover { color: #e2e8f0; }
  .nav-link.active { color: #3b82f6; border-bottom-color: #3b82f6; }
  .header-body { padding: 10px 24px 8px; }
  .filter-bar { display: flex; gap: 10px; align-items: center; background: #1e293b; border: 1px solid #2d3f56; border-radius: 10px; padding: 10px 16px; margin-bottom: 10px; flex-wrap: wrap; }
  .filter-bar label { font-size: 12px; color: #64748b; font-weight: 600; }
  .branch-select { background: #0f172a; border: 1px solid #2d3f56; color: #e2e8f0; padding: 7px 10px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; outline: none; transition: border-color .15s; }
  .branch-select:hover, .branch-select:focus { border-color: #3b82f6; }
  .tab-bar-wrap { display: flex; gap: 0; background: #0f172a; border: 1px solid #2d3f56; border-radius: 10px; padding: 4px; width: fit-content; }
  .tab-btn { padding: 8px 20px; border: none; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; background: transparent; color: #64748b; transition: all .15s; white-space: nowrap; }
  .tab-btn.active { background: #3b82f6; color: #fff; }
  .tab-btn:hover:not(.active) { color: #e2e8f0; }
  .container { padding: 16px 24px 24px; max-width: 1400px; margin: 0 auto; }
  .btn { padding: 7px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .card { background: #1a2332; border: 1px solid #2d3f56; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card-title-note { font-size: 11px; font-weight: 400; color: #64748b; margin-left: auto; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-blue { background: rgba(59,130,246,.15); color: #3b82f6; }
  .loading { text-align: center; padding: 48px; color: #64748b; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #2d3f56; border-top-color: #3b82f6; border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .perf-block { border: 1px solid #2d3f56; border-radius: 10px; margin-bottom: 14px; overflow: hidden; }
  .perf-block-header { background: #0f172a; padding: 12px 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .perf-block-body { display: grid; }
  .perf-cell { padding: 16px 20px; }
  .achieve-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: rgba(15,23,42,.9); border: 1px solid #2d3f56; border-radius: 10px; padding: 12px 16px; margin-bottom: 14px; }
  .achieve-bar-label { font-size: 11px; color: #475569; font-weight: 700; letter-spacing: .05em; white-space: nowrap; }
  .achieve-chip { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,.03); border: 1px solid #2d3f56; border-radius: 8px; padding: 8px 14px; }
  .full-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: rgba(16,185,129,.15); color: #10b981; white-space: nowrap; }
  /* Period selector */
  .period-selector { position: relative; }
  .period-btn { display: flex; align-items: center; gap: 8px; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 7px 12px 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; user-select: none; min-width: 148px; justify-content: space-between; outline: none; }
  .period-btn:hover { border-color: #3b82f6; background: #141f33; }
  .period-btn.open { border-color: #3b82f6; background: #141f33; }
  .period-btn .pb-year { font-size: 11px; font-weight: 600; color: #64748b; margin-right: 2px; }
  .period-btn .pb-month { font-size: 15px; font-weight: 800; color: #e2e8f0; }
  .period-btn .pb-arrow { font-size: 9px; color: #475569; transition: transform .2s; line-height: 1; margin-left: 4px; }
  .period-btn.open .pb-arrow { transform: rotate(180deg); color: #3b82f6; }
  .period-dropdown { position: absolute; top: calc(100% + 6px); left: 0; background: #1a2740; border: 1px solid #334155; border-radius: 12px; box-shadow: 0 16px 48px rgba(0,0,0,.8); z-index: 9999; width: 260px; overflow: hidden; display: none; flex-direction: column; }
  .period-dropdown.open { display: flex; }
  .period-dd-header { padding: 12px 14px 10px; border-bottom: 1px solid #2d3f56; flex-shrink: 0; }
  .period-dd-search input { width: 100%; background: #0f172a; border: 1px solid #2d3f56; color: #e2e8f0; padding: 7px 12px; border-radius: 7px; font-size: 12px; outline: none; transition: border-color .15s; }
  .period-dd-search input:focus { border-color: #3b82f6; }
  .period-dd-list { overflow-y: auto; max-height: 340px; padding: 6px 0; }
  .period-dd-list::-webkit-scrollbar { width: 4px; }
  .period-dd-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  .period-dd-year-label { font-size: 11px; font-weight: 700; color: #374151; letter-spacing: .06em; padding: 8px 14px 4px; display: flex; align-items: center; gap: 8px; }
  .period-dd-year-label::after { content: ''; flex: 1; height: 1px; background: #1e3050; }
  .period-dd-months { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; padding: 0 10px 8px; }
  .period-dd-mo { display: flex; flex-direction: column; align-items: center; padding: 8px 6px; border-radius: 8px; cursor: pointer; transition: all .12s; border: 1px solid transparent; }
  .period-dd-mo:hover { background: rgba(59,130,246,.1); border-color: rgba(59,130,246,.3); }
  .period-dd-mo.selected { background: rgba(59,130,246,.18); border-color: #3b82f6; }
  .period-dd-mo.current-month { border-color: rgba(16,185,129,.4); }
  .period-dd-mo.current-month:not(.selected) { background: rgba(16,185,129,.06); }
  .period-dd-mo .mo-num { font-size: 15px; font-weight: 800; color: #94a3b8; line-height: 1; }
  .period-dd-mo.selected .mo-num { color: #3b82f6; }
  .period-dd-mo.current-month:not(.selected) .mo-num { color: #10b981; }
  .period-dd-mo .mo-label { font-size: 10px; color: #475569; margin-top: 2px; }
  .period-dd-mo.selected .mo-label { color: #6aa3f8; }
  .period-dd-mo .mo-dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; margin-top: 3px; }
  .period-dd-mo.has-data .mo-dot { background: #10b981; }
  .period-dd-mo.selected .mo-dot { background: #3b82f6; }
  /* 工作天進度 */
  .wd-progress-wrap { display: flex; gap: 10px; align-items: stretch; flex-wrap: wrap; margin-bottom: 14px; }
  .wd-card { background: #1a2332; border: 1px solid #2d3f56; border-radius: 10px; padding: 14px 16px; flex: 1; min-width: 190px; display: flex; flex-direction: column; gap: 9px; }
  .wd-track { background: #0f172a; border-radius: 4px; height: 7px; position: relative; overflow: hidden; }
  .wd-fill  { height: 7px; border-radius: 4px; transition: width .5s; }
  .wd-rev-marker { position: absolute; top: -3px; width: 2px; height: 13px; background: rgba(255,255,255,.55); border-radius: 1px; transition: left .5s; pointer-events: none; }
  .wd-status { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .wd-legend { width: 100%; display: flex; gap: 14px; align-items: center; font-size: 11px; color: #475569; padding: 4px 2px 0; flex-wrap: wrap; }

  /* ══════════════ MOBILE RESPONSIVE ══════════════ */
  @media (max-width: 768px) {
    /* Nav */
    .nav { padding: 0 16px; }
    .nav-brand { font-size: 13px; padding: 12px 0; margin-right: 16px; }
    .nav-link { padding: 12px 10px; font-size: 12px; }

    /* Header body */
    .header-body { padding: 8px 12px 6px; }

    /* Filter bar */
    .filter-bar { padding: 8px 12px; gap: 6px; border-radius: 8px; }
    .filter-bar label { font-size: 11px; }
    .branch-select { font-size: 12px; padding: 6px 8px; }

    /* Period btn */
    .period-btn { min-width: 120px; padding: 6px 10px; font-size: 12px; }
    .period-btn .pb-month { font-size: 13px; }

    /* Period dropdown — make it wider / right-aligned on small screens */
    .period-dropdown { width: calc(100vw - 32px); max-width: 320px; }

    /* Tab bar */
    .tab-bar-wrap { width: 100%; border-radius: 8px; }
    .tab-btn { flex: 1; padding: 9px 8px; font-size: 12px; text-align: center; }

    /* Container */
    .container { padding: 10px 12px 24px; }

    /* Card */
    .card { padding: 14px 12px; border-radius: 10px; }
    .card-title { font-size: 13px; margin-bottom: 10px; }

    /* Btn primary in card title */
    .card-title a[href="/settings.html"] { font-size: 11px; padding: 3px 7px; }

    /* ── Revenue KPI sub-grid → single column ── */
    #revKPI-sub { grid-template-columns: 1fr !important; }

    /* ── Revenue KPI card inner branch grid → stack ── */
    .rev-branch-grid { grid-template-columns: 1fr !important; }
    .rev-branch-cell { border-right: none !important; border-bottom: 1px solid #2d3f56; }

    /* ── Group card sub-metrics → stack ── */
    .group-sub-grid { grid-template-columns: 1fr !important; }
    .group-sub-cell { border-right: none !important; border-bottom: 1px solid #2d3f56; }

    /* ── Working days branch mini cards → stack ── */
    .wd-branch-grid { grid-template-columns: 1fr !important; }
    .wd-branch-cell { border-right: none !important; border-bottom: 1px solid #2d3f56; }
    .wd-branch-cell:last-child { border-bottom: none; }

    /* ── Perf block → single column ── */
    .perf-block-body { grid-template-columns: 1fr !important; }
    .perf-cell { border-right: none !important; border-bottom: 1px solid #2d3f56; padding: 14px 14px; }
    .perf-cell:last-child { border-bottom: none; }

    /* Achieve chips → wrap nicely */
    .achieve-bar { gap: 8px; }
    .achieve-chip { flex: 1; min-width: 120px; }

    /* WD legend → smaller */
    .wd-legend { font-size: 10px; gap: 8px; }

    /* Estimate table → scrollable */
    #tab-estimate .card > div:last-of-type { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    #tab-estimate table { min-width: 500px; }
    #tab-estimate input[type="number"] { width: 90px !important; font-size: 12px !important; padding: 6px 8px !important; }

    /* Income breakdown table */
    #perfBreakdown { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    #perfBreakdown table { min-width: 480px; }

    /* Group card header → stack */
    .group-card-header { flex-direction: column !important; gap: 10px !important; }
    .group-card-stats { margin-left: 0 !important; flex-wrap: wrap; gap: 10px !important; }

    /* KPI numbers */
    .group-total-num { font-size: 22px !important; }
  }

  @media (max-width: 480px) {
    .nav-brand { font-size: 12px; }
    .nav-link { font-size: 11px; padding: 12px 8px; }
    .container { padding: 8px 10px 20px; }
    .card { padding: 12px 10px; }
    .tab-btn { font-size: 11px; padding: 8px 6px; }
    .period-btn { min-width: 105px; font-size: 11px; }
    .branch-select { font-size: 11px; }
    .btn { padding: 6px 12px; font-size: 12px; }
    .perf-cell { padding: 12px 12px; }
    .achieve-chip { padding: 6px 10px; gap: 6px; }
  }

</style>
</head>
<body>

<div class="sticky-header">
  <nav class="nav">
    <span class="nav-brand">🚗 Volvo DMS</span>
    <a href="/performance.html" class="nav-link active">🎯 業績指標</a>
    <a href="/stats.html" class="nav-link">📊 各廠明細</a>
    <a href="/query.html" class="nav-link">🔍 資料查詢</a>
    <a href="/bonus.html" class="nav-link">💰 獎金表</a>
    <a href="/settings.html" class="nav-link">⚙️ 設定</a>
   <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()" title="切換主題">☀️</button>
  </nav>
  <div class="header-body">
    <div class="filter-bar">
      <label>期間</label>
      <div id="periodSelectorWrap"></div>
      <label>據點</label>
      <select id="selBranch" class="branch-select">
        <option value="">全部</option>
        <option value="AMA">AMA</option>
        <option value="AMC">AMC</option>
        <option value="AMD">AMD</option>
      </select>
      <button class="btn btn-primary" onclick="doLoad()">查詢</button>
      <span id="lastUpdate" style="margin-left:auto;font-size:11px;color:#64748b;white-space:nowrap"></span>
      <button class="btn btn-secondary" onclick="openEstimateModal()" style="font-size:12px;padding:7px 14px;white-space:nowrap">✏️ 業績預估</button>
    </div>
    <div class="tab-bar-wrap">
      <button id="tab-btn-progress" class="tab-btn active" onclick="switchPerfTab('progress')">📊 業績進度</button>
      <button id="tab-btn-vctl" class="tab-btn" onclick="switchPerfTab('vctl')">📐 VCTL指標</button>
    </div>
     
    </div>
  </div>
</div>

<div class="container">
  <div id="tab-progress">
    <div id="workingDaysBar" style="display:none"></div>
    <div id="revenueKPISection" style="margin-bottom:20px;display:none">
      <div id="revKPI-group" style="margin-bottom:12px"></div>
      <div id="revKPI-paid" style="margin-bottom:12px"></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px" id="revKPI-sub"></div>
    </div>
    <div class="card">
      <div class="card-title">📊 收入明細分解<span id="perfBreakdownPeriod" class="card-title-note"></span></div>
      <div id="perfBreakdown" style="overflow-x:auto;-webkit-overflow-scrolling:touch"><div class="loading"><span class="spinner"></span>載入中</div></div>
    </div>
    <div class="card">
      <div class="card-title">
        🎯 各指標業績進度
        <span id="perfPeriodLabel" class="card-title-note"></span>
        <a href="/settings.html" style="font-size:12px;color:#64748b;text-decoration:none;padding:4px 8px;border:1px solid #2d3f56;border-radius:5px;background:#1e293b;margin-left:auto">⚙️ 設定指標</a>
      </div>
      <div id="branchAchieveBar" class="achieve-bar" style="display:none"></div>
      <div id="perfNoConfig" style="display:none;padding:48px;text-align:center;color:#64748b">
        尚未建立業績指標，請前往 <a href="/settings.html" style="color:#3b82f6">⚙️ 設定 → 業績目標</a> 新增追蹤項目
      </div>
      <div id="perfDetail"></div>
    </div>
  </div>
</div>

 <!-- ════ VCTL 商務政策指標 Tab ════ -->
  <div id="tab-vctl" style="display:none">
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">
        📐 VCTL 商務政策指標
        <span id="vctlPeriodLabel" class="card-title-note"></span>
      </div>
      <div id="vctlResults">
        <div class="empty" style="padding:32px;color:#64748b">尚未設定任何指標，請在下方「指標設定」中新增</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title" style="cursor:pointer;user-select:none" onclick="toggleVCTLConfig()">
        ⚙️ 指標設定管理
        <span id="vctlConfigArrow" style="font-size:11px;color:#64748b;margin-left:6px;transition:transform .2s;display:inline-block">▶</span>
        <button onclick="event.stopPropagation();openVCTLModal(null)"
          style="margin-left:auto;padding:5px 14px;background:#3b82f6;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer">
          ＋ 新增指標
        </button>
      </div>
      <div id="vctlConfigBody" style="display:none;margin-top:4px">
        <div id="vctlMetricList">
          <div style="color:#64748b;font-size:13px;padding:8px 0"><span class="spinner"></span>載入中</div>
        </div>
      </div>
    </div>
  </div>

<script>
const n    = (v) => parseFloat(v || 0);
const fmt  = (v) => Math.round(n(v)).toLocaleString();
const fmtK = (v) => Math.round(n(v) / 1000).toLocaleString() + 'K';

let _currentPeriod = '';
let _allPeriods    = [];
let _wdSummary     = null;
let _revRates      = null;
let _revData       = null;

function getPeriod() { return _currentPeriod; }
function isMobile() { return window.innerWidth <= 768; }

// ── Period selector ──
function initPeriodSelector(periods) {
  _allPeriods = periods;
  renderPeriodSelector('');
}

function renderPeriodSelector(filterQ) {
  const wrap = document.getElementById('periodSelectorWrap');
  if (!wrap) return;
  const now = new Date();
  const thisMonth = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}`;
  const groups = {};
  _allPeriods.forEach(p => { const yr=p.slice(0,4); if(!groups[yr])groups[yr]=[]; groups[yr].push(p); });
  const btnContent = _currentPeriod
    ? `<span class="pb-year">${_currentPeriod.slice(0,4)}</span><span class="pb-month">${parseInt(_currentPeriod.slice(4))}月</span>`
    : `<span class="pb-month" style="color:#64748b">全部期間</span>`;
  function fmtP(p){return`${p.slice(0,4)}年${p.slice(4)}月`;}
  let listHtml='';
  Object.keys(groups).sort((a,b)=>b-a).forEach(yr=>{
    const months=groups[yr];
    listHtml+=`<div class="period-dd-year-label">${yr}</div><div class="period-dd-months">`;
    for(let mo=12;mo>=1;mo--){
      const p=`${yr}${String(mo).padStart(2,'0')}`,exists=months.includes(p);
      if(!filterQ||fmtP(p).includes(filterQ)){
        const isSel=p===_currentPeriod,isCur=p===thisMonth;
        listHtml+=`<div class="period-dd-mo ${isSel?'selected':''} ${isCur?'current-month':''} ${exists?'has-data':''}" onclick="selectPeriod('${p}')">
          <span class="mo-num">${mo}</span><span class="mo-label">月</span><span class="mo-dot"></span></div>`;
      }
    }
    listHtml+=`</div>`;
  });
  wrap.innerHTML=`<div class="period-selector" id="ps-root">
    <button class="period-btn" id="ps-btn" type="button" onclick="togglePeriodDD(event)">${btnContent}<span class="pb-arrow">▼</span></button>
    <div class="period-dropdown" id="ps-dd">
      <div class="period-dd-header">
        <div class="period-dd-year-label" style="padding:0 0 6px;font-size:11px;color:#475569">選擇期間</div>
        <div class="period-dd-search"><input type="text" placeholder="🔍 搜尋 例：2026年03月" id="ps-search" oninput="filterPeriodDD(this.value)" onclick="event.stopPropagation()"></div>
      </div>
      <div class="period-dd-list" id="ps-list">${listHtml}</div>
    </div></div>`;
}

window.togglePeriodDD=function(e){e.stopPropagation();const btn=document.getElementById('ps-btn'),dd=document.getElementById('ps-dd');if(!btn||!dd)return;const isOpen=dd.classList.contains('open');closeAllPD();if(!isOpen){btn.classList.add('open');dd.classList.add('open');setTimeout(()=>document.getElementById('ps-search')?.focus(),50);}};
window.filterPeriodDD=function(q){const now=new Date(),thisMonth=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}`;function fmtP(p){return`${p.slice(0,4)}年${p.slice(4)}月`;}const groups={};_allPeriods.filter(p=>!q||fmtP(p).includes(q)||p.includes(q.replace(/[^0-9]/g,''))).forEach(p=>{const yr=p.slice(0,4);if(!groups[yr])groups[yr]=[];groups[yr].push(p);});let listHtml='';if(!Object.keys(groups).length){listHtml='<div style="padding:20px;text-align:center;color:#475569;font-size:12px">無符合期間</div>';}else{Object.keys(groups).sort((a,b)=>b-a).forEach(yr=>{const months=groups[yr];listHtml+=`<div class="period-dd-year-label">${yr}</div><div class="period-dd-months">`;for(let mo=12;mo>=1;mo--){const p=yr+String(mo).padStart(2,'0');if(!months.includes(p))continue;const isSel=p===_currentPeriod,isCur=p===thisMonth;listHtml+=`<div class="period-dd-mo ${isSel?'selected':''} ${isCur?'current-month':''} has-data" onclick="selectPeriod('${p}')"><span class="mo-num">${mo}</span><span class="mo-label">月</span><span class="mo-dot"></span></div>`;}listHtml+=`</div>`;});}const el=document.getElementById('ps-list');if(el)el.innerHTML=listHtml;};
window.selectPeriod=function(val){_currentPeriod=val;closeAllPD();renderPeriodSelector('');};
window.closeAllPD=function(){document.querySelectorAll('.period-btn.open').forEach(b=>b.classList.remove('open'));document.querySelectorAll('.period-dropdown.open').forEach(d=>d.classList.remove('open'));};
document.addEventListener('click',closeAllPD);

async function loadPeriods(){
  try{
    const periods=await(await fetch('/api/periods')).json();
    _allPeriods=periods;
    const now=new Date(),cur=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}`;
    _currentPeriod=periods.includes(cur)?cur:(periods[0]||'');
    initPeriodSelector(periods);
  }catch(e){}
}

function switchPerfTab(tab){
  ['progress','vctl'].forEach(function(t){
    var el=document.getElementById('tab-'+t);
    var btn=document.getElementById('tab-btn-'+t);
    if(el)  el.style.display  = t===tab ? '' : 'none';
    if(btn) btn.classList.toggle('active', t===tab);
  });
  if(tab==='vctl'){
    var p=getPeriod(), b=document.getElementById('selBranch').value;
    loadVCTL(p,b);
  }
}

async function loadWorkingDaysProgress(period, branch) {
  _wdSummary = null;
  const el = document.getElementById('workingDaysBar');
  if (!period) { el.style.display='none'; return; }
  try {
    const data = await fetch(`/api/stats/daily?period=${period}${branch?'&branch='+branch:''}`).then(r=>r.json());
    _wdSummary = data.summary || [];
    renderWorkingDaysBar();
  } catch(e) { el.style.display='none'; }
}

function renderWorkingDaysBar() {
  const el = document.getElementById('workingDaysBar');
  if (!_wdSummary || !_wdSummary.length) { el.style.display='none'; return; }

  const branch   = document.getElementById('selBranch').value;
  const BRANCHES = branch ? [branch] : ['AMA','AMC','AMD'];
  const brColors = { AMA:'#3b82f6', AMC:'#10b981', AMD:'#f59e0b' };
  const ALL      = ['AMA','AMC','AMD'];
  const mobile   = isMobile();

  let gElapsed = 0, gTotal = 0;
  ALL.forEach(br => {
    const s = _wdSummary.find(r => r.branch === br);
    if (s) { gElapsed += parseInt(s.auto_working_days||0); gTotal += parseInt(s.working_days||0); }
  });
  const gMonthPct  = gTotal > 0 ? gElapsed / gTotal * 100 : null;
  const gMonthBarW = gMonthPct !== null ? Math.min(100, gMonthPct).toFixed(1) : 0;
  const gActual    = _revData ? ALL.reduce((s,br)=>s+(_revData[br]?.actual||0),0) : 0;
  const gTarget    = _revData ? ALL.reduce((s,br)=>s+(_revData[br]?.target||0),0) : 0;
  const gEst       = _revData ? ALL.reduce((s,br)=>s+(_revData[br]?.est||0),0) : 0;
  const gRevPct    = gTarget > 0 ? gActual / gTarget * 100 : null;
  const gEstPct    = gTarget > 0 && gEst > 0 ? gEst / gTarget * 100 : null;
  const gDelta     = (gRevPct !== null && gMonthPct !== null) ? gRevPct - gMonthPct : null;
  const gDeltaCol  = gDelta === null ? '#64748b' : gDelta >= 3 ? '#10b981' : gDelta <= -5 ? '#ef4444' : '#f59e0b';
  const gDeltaText = gDelta !== null ? `${gDelta >= 3 ? '🚀 超前' : gDelta <= -5 ? '⚠️ 落後' : '〜 符合'} ${gDelta >= 0 ? '+' : ''}${gDelta.toFixed(1)}%` : '—';
  const gRevCol    = gRevPct === null ? '#64748b' : gRevPct >= 100 ? '#10b981' : gRevPct >= 80 ? '#f59e0b' : '#ef4444';
  const gEstCol    = gEstPct === null ? '#64748b' : gEstPct >= 100 ? '#10b981' : gEstPct >= 80 ? '#f59e0b' : '#f97316';
  const gFillCol   = gMonthPct === null ? '#64748b' : gMonthPct >= 90 ? '#10b981' : gMonthPct >= 50 ? '#94a3b8' : '#f59e0b';
  const gMarker    = gRevPct !== null ? `<div class="wd-rev-marker" style="left:${Math.min(100,gRevPct).toFixed(1)}%" title="集團有費達成率 ${gRevPct.toFixed(1)}%"></div>` : '';

  // Branch mini cards — add class for CSS override on mobile
  const branchMiniCards = BRANCHES.map((br, bi) => {
    const s        = _wdSummary.find(r => r.branch === br);
    const col      = brColors[br] || '#94a3b8';
    const elapsed  = s ? parseInt(s.auto_working_days||0) : 0;
    const total    = s ? parseInt(s.working_days||0) : 0;
    const isManual = s ? s.configured_working_days !== null : false;
    const wdPct    = total > 0 ? Math.min(100, elapsed / total * 100) : 0;
    const fillColor = wdPct >= 90 ? '#10b981' : wdPct >= 50 ? col : '#f59e0b';
    const revRate  = (_revRates && _revRates[br] != null) ? _revRates[br] : null;
    const revBarW  = revRate !== null ? Math.min(100, revRate).toFixed(1) : 0;
    const revCol   = revRate === null ? '#64748b' : revRate >= 100 ? '#10b981' : revRate >= 80 ? '#f59e0b' : '#ef4444';
    const gap      = (revRate !== null && wdPct > 0) ? revRate - wdPct : null;
    const gapCol   = gap === null ? '#64748b' : gap >= 3 ? '#10b981' : gap <= -5 ? '#ef4444' : '#f59e0b';
    const gapText  = gap !== null ? `${gap >= 3 ? '🚀' : gap <= -5 ? '⚠️' : '〜'} ${gap >= 0 ? '+' : ''}${gap.toFixed(1)}%` : '—';
    const markerHtml = revRate !== null ? `<div class="wd-rev-marker" style="left:${Math.min(100,revRate).toFixed(1)}%" title="有費達成率 ${revRate.toFixed(1)}%"></div>` : '';
    const borderR  = bi < BRANCHES.length - 1 ? 'border-right:1px solid #2d3f56;' : '';

    return `<div class="wd-branch-cell" style="padding:14px 16px;${borderR}display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
        <div style="display:flex;align-items:center;gap:6px">

            : `<span style="font-size:10px;color:#f59e0b;background:rgba(245,158,11,.1);padding:1px 5px;border-radius:4px">⚠️ 自動</span>`}
        </div>
        <span style="font-size:11px;font-weight:700;padding:1px 7px;border-radius:6px;background:${gapCol}18;color:${gapCol}">${gapText}</span>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <span style="font-size:10px;color:#64748b">📅 天數進度</span>
          <span style="font-size:11px;font-weight:800;color:${fillColor}">${wdPct.toFixed(0)}% <span style="font-size:10px;color:#475569;font-weight:400">${elapsed}/${total>0?total:'?'}天</span></span>
        </div>
        <div class="wd-track">
          <div class="wd-fill" style="width:${wdPct.toFixed(1)}%;background:${fillColor}"></div>
          ${markerHtml}
        </div>
      </div>
      ${revRate !== null ? `<div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <span style="font-size:10px;color:#64748b">🔶 有費達成</span>
          <span style="font-size:11px;font-weight:800;color:${revCol}">${revRate.toFixed(0)}%</span>
        </div>
        <div class="wd-track">
          <div class="wd-fill" style="width:${revBarW}%;background:${revCol}"></div>
        </div>
      </div>` : '<div style="font-size:10px;color:#475569">有費達成：未設目標</div>'}
    </div>`;
  }).join('');

  const legend = `<div class="wd-legend">
    <span>📅 天數進度 = 已有資料天數 ÷ 本月工作天</span>
    <span>進度差 = 有費達成率 − 天數進度 ｜ 🚀≥3% ／ 〜 符合 ／ ⚠️≤-5%</span>
  </div>`;

  if (branch) {
    el.innerHTML = `<div class="wd-progress-wrap">${branchMiniCards}</div>${legend}`;
    el.style.display = '';
    return;
  }

  // 全廠模式 — 集團大卡使用 wd-branch-grid class for mobile override
  el.innerHTML = `
  <div style="background:#1a2332;border:2px solid #f97316;border-radius:12px;overflow:hidden;margin-bottom:0">
    <div class="group-card-header" style="background:linear-gradient(135deg,rgba(249,115,22,.1),rgba(249,115,22,.04));border-bottom:1px solid rgba(249,115,22,.3);padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <div>
        <div style="font-size:13px;font-weight:800;color:#f97316;margin-bottom:2px">🏢 集團進度總覽</div>
        <div style="font-size:11px;color:#475569">AMA + AMC + AMD 加權合計</div>
      </div>
      <div style="flex:1;min-width:160px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:11px;color:#64748b">📅 天數進度（加權）</span>
          <span style="font-size:12px;font-weight:800;color:${gFillCol}">${gMonthPct !== null ? gMonthPct.toFixed(1)+'%' : '—'}</span>
        </div>
        <div class="wd-track" style="height:8px">
          <div class="wd-fill" style="width:${gMonthBarW}%;background:${gFillCol};height:8px"></div>
          ${gMarker}
        </div>
      </div>
      <div class="group-card-stats" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        ${gMonthPct !== null ? `<div style="text-align:center"><div class="group-total-num" style="font-size:24px;font-weight:900;color:${gFillCol};line-height:1">${gMonthPct.toFixed(0)}%</div><div style="font-size:10px;color:#475569">天數進度</div></div>` : ''}
        ${gRevPct !== null ? `<div style="text-align:center"><div class="group-total-num" style="font-size:24px;font-weight:900;color:${gRevCol};line-height:1">${gRevPct.toFixed(0)}%</div><div style="font-size:10px;color:#475569">有費達成</div></div>` : ''}
        ${gEstPct !== null ? `<div style="text-align:center"><div class="group-total-num" style="font-size:24px;font-weight:900;color:${gEstCol};line-height:1">${gEstPct.toFixed(0)}%</div><div style="font-size:10px;color:#475569">預估達成</div></div>` : ''}
        <div>
          <div style="font-size:10px;color:#64748b;margin-bottom:2px">有費實際 / 目標</div>
          <div style="font-size:14px;font-weight:800;color:#f97316">${fmtK(gActual)} <span style="font-size:11px;color:#64748b;font-weight:400">/ ${gTarget > 0 ? fmtK(gTarget) : '未設定'}</span></div>
          ${gEst > 0 ? `<div style="font-size:11px;color:${gEstCol};margin-top:1px">預估 ${fmtK(gEst)}</div>` : ''}
        </div>
        <span style="padding:4px 10px;border-radius:8px;font-size:12px;font-weight:800;background:${gDeltaCol}18;color:${gDeltaCol};border:1px solid ${gDeltaCol}33">${gDeltaText}</span>

    <div class="wd-branch-grid" style="display:grid;grid-template-columns:repeat(3,1fr)">

async function doLoad() {
  const period=getPeriod(), branch=document.getElementById('selBranch').value;
  document.getElementById('lastUpdate').textContent='更新中...';
  _wdSummary = null;
  _revRates  = null;
  _revData   = null;
  await loadWorkingDaysProgress(period, branch);
  await Promise.all([
    loadRevenueKPI(period, branch),
    loadIncomeBreakdown(period, branch),
    loadPerformance(period, branch),
  ]);
  document.getElementById('lastUpdate').textContent=`${new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})} 更新`;
}

async function saveAllEstimates(){
  const period=getPeriod(),branch=document.getElementById('selBranch').value;
  const msgEl=document.getElementById('estSaveMsg');
  if(!period){msgEl.textContent='請先選擇期間';msgEl.style.color='#ef4444';return;}
  const BRANCHES=branch?[branch]:['AMA','AMC','AMD'];
  const entries=BRANCHES.map(br=>{
    const e={branch:br,period};
    ['paid','general','bodywork','extended'].forEach(k=>{const v=parseFloat(document.getElementById(`est-${k}-${br}`)?.value);e[`${k}_estimate`]=(!isNaN(v)&&v>0)?Math.round(v*1000):null;});
    return e;
  });
  const btn=document.querySelector('[onclick="saveAllEstimates()"]');
  if(btn){btn.disabled=true;btn.textContent='儲存中...';}
  try{
    const data=await(await fetch('/api/revenue-estimates/batch',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({entries})})).json();
    if(data.error)throw new Error(data.error);
    msgEl.textContent=`✅ 預估已儲存（${period.slice(0,4)}年${period.slice(4)}月）`;
    msgEl.style.color='#10b981';
    switchPerfTab('progress');await loadRevenueKPI(period,branch);
  }catch(e){msgEl.textContent='❌ '+e.message;msgEl.style.color='#ef4444';}
  finally{if(btn){btn.disabled=false;btn.textContent='💾 儲存預估';}}
}

async function loadRevenueKPI(period,branch){
  const section=document.getElementById('revenueKPISection');
  if(!period){section.style.display='none';return;}
  try{
    const [bkRes,tgtRes,estRes]=await Promise.all([
      fetch(`/api/stats/income-breakdown?period=${period}${branch?'&branch='+branch:''}`).then(r=>r.json()),
      fetch(`/api/revenue-targets?period=${period}${branch?'&branch='+branch:''}`).then(r=>r.json()),
      fetch(`/api/revenue-estimates?period=${period}${branch?'&branch='+branch:''}`).then(r=>r.json()),
    ]);
    if(bkRes.error)throw new Error(bkRes.error);
    const BRANCHES=branch?[branch]:['AMA','AMC','AMD'];
    const brColors={AMA:'#3b82f6',AMC:'#10b981',AMD:'#f59e0b'};
    const tMap={};(Array.isArray(tgtRes)?tgtRes:[]).forEach(t=>{tMap[t.branch]=t;});
    const eMap={};(Array.isArray(estRes)?estRes:[]).forEach(e=>{eMap[e.branch]=e;});
    const bdata=bkRes.branches||{};

    _revRates={}; _revData={};
    BRANCHES.forEach(br=>{
      const actual=bdata[br]?.paid_total||0;
      const target=parseFloat(tMap[br]?.paid_target||0);
      const est=parseFloat(eMap[br]?.paid_estimate||0);
      _revRates[br]=target>0?(actual/target*100):null;
      _revData[br]={actual, target, est};
    });
    if(_wdSummary)renderWorkingDaysBar();

    // ── 集團合計卡片 ── (uses group-sub-grid class for mobile CSS override)
    const buildGroupCard=(metricKey,actualKey,label,color)=>{
      const ALL=['AMA','AMC','AMD'];
      const gActual=ALL.reduce((s,br)=>s+(bdata[br]?.[actualKey]||0),0);
      const gTarget=ALL.reduce((s,br)=>s+parseFloat(tMap[br]?.[`${metricKey}_target`]||0),0);
      const gLY=ALL.reduce((s,br)=>s+parseFloat(tMap[br]?.[`${metricKey}_last_year`]||0),0);
      const gEst=ALL.reduce((s,br)=>s+parseFloat(eMap[br]?.[`${metricKey}_estimate`]||0),0);

      const rCol=rate===null?'#64748b':rate>=100?'#10b981':rate>=80?'#f59e0b':'#ef4444';

    const buildCard=(m,fullWidth)=>{
      let card=`<div style="background:#1a2332;border:1px solid #2d3f56;border-radius:12px;overflow:hidden">

        const actual=bd[m.actualKey]||0,target=parseFloat(t[`${m.key}_target`]||0),ly=parseFloat(t[`${m.key}_last_year`]||0),est=parseFloat(e[`${m.key}_estimate`]||0);

        const barW=rate!==null?Math.min(100,rate).toFixed(0):0,estBarW=estRate!==null?Math.min(100,estRate).toFixed(0):0;
        const borderR=bi<BRANCHES.length-1?'border-right:1px solid #2d3f56;':'';

   ${(()=>{
  if(!fullWidth)return`

  const _delta=(_pct!==null&&rate!==null)?rate-_pct:null;
  const _dCol=_delta===null?'#64748b':_delta>=3?'#10b981':_delta<=-5?'#ef4444':'#f59e0b';
  const _dText=_delta===null?'':`${_delta>=3?'🚀':_delta<=-5?'⚠️':'〜'} ${_delta>=0?'+':''}${_delta.toFixed(1)}%`;
  const _mk=_pct!==null?`
    <div style="position:absolute;top:-3px;left:${_pct.toFixed(1)}%;transform:translateX(-50%)">

  return`
    <div style="flex:1;background:#0f172a;border-radius:3px;height:5px;position:relative">
      <div style="width:${barW}%;height:5px;background:${rCol};border-radius:3px;transition:width .4s"></div>
      ${_mk}
    </div>
  <span style="font-size:12px;font-weight:800;color:${rCol};white-space:nowrap">${rate!==null?rate.toFixed(1)+'%':'—'}</span>`;
})()}
          </div>
          ${est>0?`<div style="display:flex;align-items:center;gap:5px;margin-bottom:10px">
            <div style="flex:1;background:#0f172a;border-radius:3px;height:3px"><div style="width:${estBarW}%;height:3px;background:${eCol};border-radius:3px;opacity:.7;background:repeating-linear-gradient(90deg,${eCol} 0,${eCol} 4px,transparent 4px,transparent 7px)"></div></div>
            <span style="font-size:11px;font-weight:700;color:${eCol};white-space:nowrap">預 ${estRate!==null?estRate.toFixed(1)+'%':'—'}</span>
          </div>`:''}
          <div style="display:grid;grid-template-columns:auto 1fr;gap:2px 8px;font-size:11px;color:#64748b;align-items:center">
            <span>目標</span><span style="text-align:right;color:#94a3b8;font-weight:600">${target>0?fmtK(target):'未設定'}</span>
            ${est>0?`<span style="color:${eCol}">預估</span><span style="text-align:right;color:${eCol};font-weight:700">${fmtK(est)}</span>`:''}
            <span>去年同期</span><span style="text-align:right">
              <span style="color:#94a3b8;font-weight:600">${ly>0?fmtK(ly):'—'}</span>
              ${yoy!==null?`<span style="color:${yoy>=0?'#10b981':'#ef4444'};margin-left:4px">${yoy>=0?'▲':'▼'}${Math.abs(yoy).toFixed(1)}%</span>`:''}

      });
      card+=`</div></div>`;return card;
    };

    const groupEl=document.getElementById('revKPI-group');
    if(!branch){groupEl.innerHTML=buildGroupCard('paid','paid_total','集團有費合計','#f97316');groupEl.style.display='';}
    else{groupEl.style.display='none';}
    document.getElementById('revKPI-paid').innerHTML=buildCard({key:'paid',label:'🔶 有費營收',color:'#f97316',actualKey:'paid_total'},true);

      {key:'bodywork',label:'🔨 鈑烤營收',color:'#8b5cf6',actualKey:'bodywork_total'},
      {key:'extended',label:'🛡️ 延保營收',color:'#10b981',actualKey:'extended'},
    ].map(m=>buildCard(m,false)).join('');
    section.style.display='';
  }catch(e){document.getElementById('revKPI-paid').innerHTML=`<div style="color:#ef4444;padding:12px">${e.message}</div>`;section.style.display='';}
}

    if(BRANCHES.length>1)html+=`<th style="text-align:right;padding:10px 12px;background:#0f172a;color:#94a3b8;font-size:11px;font-weight:700;border-bottom:1px solid #2d3f56;min-width:100px;border-left:1px solid #374151">合計</th>`;

    const odHtml=allOD.map(od=>{let r=`<tr><td style="padding:6px 12px 6px 28px;border-bottom:1px solid rgba(45,63,86,.2)"><span style="font-size:12px;color:#475569">${od.account_type}</span></td>`;BRANCHES.forEach(br=>{const m=(bdata[br]?.other_detail||[]).find(x=>x.account_type===od.account_type);r+=`<td style="text-align:right;padding:6px 12px;border-bottom:1px solid rgba(45,63,86,.2);font-size:12px;color:#475569">${m?.total>0?fmtK(m.total):'—'}</td>`;});if(BRANCHES.length>1)r+=`<td style="border-bottom:1px solid rgba(45,63,86,.2);border-left:1px solid #374151"></td>`;return r+`</tr>`;}).join('');

async function loadPerformance(period,branch){
  const detailEl=document.getElementById('perfDetail'),noConfEl=document.getElementById('perfNoConfig'),achBar=document.getElementById('branchAchieveBar');
  if(!period){detailEl.innerHTML='';achBar.style.display='none';return;}
  detailEl.innerHTML='<div class="loading"><span class="spinner"></span>載入中</div>';
  achBar.style.display='none';
  try{
    const params=new URLSearchParams({period});if(branch)params.set('branch',branch);
    const data=await(await fetch(`/api/stats/performance?${params}`)).json();
    if(data.error)throw new Error(data.error);
    const{metrics,results}=data;
    if(!metrics.length){noConfEl.style.display='';detailEl.innerHTML='';return;}
    noConfEl.style.display='none';
    const BRANCHES=branch?[branch]:['AMA','AMC','AMD'];
    const brColors={AMA:'#3b82f6',AMC:'#10b981',AMD:'#f59e0b'};
    const TYPE_LABEL={repair_income:'🔧 維修收入(合計)',repair_subfield:'🔨 維修收入(子欄位)',parts:'🔩 零件銷售',boutique:'💎 精品配件',tech_wage:'🚗 工資代碼'};
    const FIELD_UNIT={amount:'元',qty:'件',count:'筆'};
    const metricMap={};metrics.forEach(m=>{metricMap[m.id]=m;});
    const brStats={};BRANCHES.forEach(br=>{brStats[br]={achieved:0,total:metrics.length};});
    results.forEach(r=>{BRANCHES.forEach(br=>{const d=r.branches[br]||{};if(d.achieve_rate!==null&&d.achieve_rate>=100)brStats[br].achieved++;});});

    // Achieve bar — on mobile show compact version
    achBar.innerHTML=`<span class="achieve-bar-label">各據點達標</span>`+BRANCHES.map(br=>{
      const s=brStats[br],col=brColors[br]||'#64748b',isAll=s.achieved===s.total&&s.total>0;
      const pct=s.total>0?Math.round(s.achieved/s.total*100):0;
      const aCol=isAll?'#10b981':s.achieved>0?'#f59e0b':'#ef4444';
      return`<div class="achieve-chip" style="border-color:${aCol}33">
        <span style="font-size:12px;font-weight:800;color:${col}">${br}</span>
        <span style="font-size:20px;font-weight:800;color:${aCol};line-height:1">${s.achieved}</span>
        <span style="font-size:12px;color:#475569">/ ${s.total}</span>
        <div style="display:flex;flex-direction:column;gap:3px">
          <div style="width:40px;background:#0f172a;border-radius:3px;height:4px"><div style="width:${pct}%;height:4px;border-radius:3px;background:${aCol};transition:width .4s"></div></div>
          <span style="font-size:10px;font-weight:700;color:${aCol}">${pct}%</span>
        </div>
        ${isAll?'<span class="full-badge">🎉</span>':''}
      </div>`;
    }).join('');
    achBar.style.display='flex';

    let html='';
    results.forEach(r=>{
      const metric=metricMap[r.metric_id];if(!metric)return;
      const isAmt=metric.stat_field!=='qty'&&metric.stat_field!=='count';
      const unit=metric.unit||FIELD_UNIT[metric.stat_field]||'元';
      const fmtV=v=>{if(v===null||v===undefined)return'—';if(isAmt&&!metric.unit)return fmtK(v);return metric.stat_field==='qty'?n(v).toFixed(1):fmt(v);};
      html+=`<div class="perf-block">
        <div class="perf-block-header">
          <span style="font-size:14px;font-weight:800;color:#e2e8f0">${metric.metric_name}</span>
          <span class="badge badge-blue" style="font-size:11px">${TYPE_LABEL[metric.metric_type]||metric.metric_type}</span>
          ${metric.description?`<span style="font-size:12px;color:#64748b">${metric.description}</span>`:''}
          <span style="font-size:11px;color:#475569;margin-left:auto">單位：${unit}</span>
        </div>
        <div class="perf-block-body" style="grid-template-columns:repeat(${BRANCHES.length},1fr)">`;
      BRANCHES.forEach((br,bi)=>{
        const d=r.branches[br]||{},col=brColors[br]||'#64748b',rate=d.achieve_rate;
        const rCol=rate===null?'#64748b':rate>=100?'#10b981':rate>=80?'#f59e0b':'#ef4444';
        const barW=rate!==null?Math.min(100,rate).toFixed(0):0,yoy=d.yoy_growth;
        const borderR=bi<BRANCHES.length-1?'border-right:1px solid #2d3f56':'';
        html+=`<div class="perf-cell" style="${borderR}">
          <div style="font-size:11px;font-weight:800;color:${col};margin-bottom:10px;letter-spacing:.04em">${br}</div>
          <div style="font-size:22px;font-weight:800;color:#e2e8f0;margin-bottom:6px">${fmtV(d.actual)}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
            <div style="flex:1;background:#0f172a;border-radius:3px;height:5px;min-width:40px"><div style="width:${barW}%;height:5px;background:${rCol};border-radius:3px"></div></div>
            <span style="font-size:13px;font-weight:800;color:${rCol};white-space:nowrap">${rate!==null?rate.toFixed(1)+'%':'無目標'}</span>
          </div>
          <div style="font-size:11px;color:#64748b;line-height:2">
            <div style="display:flex;justify-content:space-between"><span>目標</span><span style="color:#94a3b8;font-weight:600">${fmtV(d.target)}</span></div>
            <div style="display:flex;justify-content:space-between;align-items:center"><span>去年同期</span>
              <span><span style="color:#94a3b8;font-weight:600">${fmtV(d.last_year)}</span>
              ${yoy!==null?`<span style="color:${yoy>=0?'#10b981':'#ef4444'};margin-left:5px;font-size:11px">${yoy>=0?'▲':'▼'}${Math.abs(yoy).toFixed(1)}%</span>`:''}</span>
            </div>
          </div>
        </div>`;
      });
      html+=`</div></div>`;
    });
    detailEl.innerHTML=html||'<div style="padding:48px;text-align:center;color:#64748b">此期間無業績資料</div>';
    const lbl=document.getElementById('perfPeriodLabel');
    if(lbl&&period)lbl.textContent=`${period.slice(0,4)}年${period.slice(4)}月`;
  }catch(e){detailEl.innerHTML=`<div style="color:#ef4444;padding:16px">${e.message}</div>`;}
}

let _estModalData = {};

function openEstimateModal() {
  const period = getPeriod();
  if (!period) { alert('請先選擇期間'); return; }
  document.getElementById('estimateModal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
  document.getElementById('estModalPeriod').textContent =
    period.slice(0,4)+'年'+parseInt(period.slice(4))+'月';
  switchEstTab('input');
  loadEstimateModalData(period);
}

function closeEstimateModal() {
  document.getElementById('estimateModal').style.display = 'none';
  document.body.style.overflow = '';
}

function switchEstTab(tab) {
  ['input','history'].forEach(function(t) {
    var content = document.getElementById('estTabContent-'+t);
    var btn     = document.getElementById('estTab-'+t);
    if (content) content.style.display = t === tab ? '' : 'none';
    if (btn) {
      btn.style.background        = t === tab ? '#3b82f6' : 'transparent';
      btn.style.color             = t === tab ? '#fff'    : '#64748b';
      btn.style.borderBottomColor = t === tab ? '#3b82f6' : 'transparent';
      btn.style.fontWeight        = t === tab ? '700'     : '600';
    }
  });
  var footer = document.getElementById('estModalFooter');
  if (footer) footer.style.display = tab === 'input' ? 'flex' : 'none';
}

  document.getElementById('estTabContent-input').innerHTML =
    '<div style="padding:32px;text-align:center;color:#64748b"><span class="spinner"></span>載入中</div>';
  document.getElementById('estTabContent-history').innerHTML =
    '<div style="padding:32px;text-align:center;color:#64748b"><span class="spinner"></span>載入中</div>';
  try {
    const [weekStatus, history] = await Promise.all([
      fetch('/api/revenue-estimates/week-status?period='+period).then(r=>r.json()),
      fetch('/api/revenue-estimates/history?period='+period).then(r=>r.json()),
    ]);
    _estModalData = { period, weekStatus, history };
    renderEstInputTab(weekStatus);
    renderEstHistoryTab(history);
  } catch(e) {

}

function renderEstInputTab(ws) {

    +'📅 本週：<strong style="color:#e2e8f0">'+ws.week_label+'</strong>（週一 '+ws.week_key+'）<br>'

    +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px;min-width:560px">'
    +'<thead><tr>'
    +'<th style="padding:9px 12px;background:#0f172a;color:#64748b;font-size:11px;border-bottom:1px solid #2d3f56;text-align:left">據點</th>'
    +KEYS.map(function(k){
      const isAuto = k.key==='paid';
      return '<th style="padding:9px 12px;background:#0f172a;color:'+k.col+';font-size:11px;font-weight:800;border-bottom:1px solid #2d3f56;text-align:right">'
        +k.label+' (K)'
        +(isAuto?'<div style="font-size:9px;color:#475569;font-weight:400;margin-top:2px">一般+鈑烤+延保</div>':'')
        +'</th>';
    }).join('')
    +'<th style="padding:9px 12px;background:#0f172a;color:#64748b;font-size:11px;border-bottom:1px solid #2d3f56;text-align:center;min-width:90px">狀態</th>'
    +'</tr></thead><tbody>';

  BRANCHES.forEach(function(br) {
    const sub    = ws.submissions[br];
    const locked = !!sub;
    const col    = brColors[br];
    html += '<tr style="background:'+(locked?'rgba(16,185,129,.03)':'transparent')+'">'
      +'<td style="padding:12px;border-bottom:1px solid rgba(45,63,86,.3)">'
      +'<span style="background:'+col+'22;color:'+col+';padding:4px 12px;border-radius:6px;font-size:12px;font-weight:800">'+br+'</span></td>';

    KEYS.forEach(function(k) {
      const raw = sub ? Math.round((sub[k.key+'_estimate']||0)/1000) : '';
      if (locked) {
        html += '<td style="padding:10px 12px;border-bottom:1px solid rgba(45,63,86,.3);text-align:right">'
          +'<span style="color:'+k.col+';font-weight:700;font-size:14px">'+(raw||'—')+'</span></td>';
      } else {
        const isPaid = k.key==='paid';
        // 有費欄位：底色稍深，加上自動標籤
        const inputBg = isPaid ? '#1a1200' : '#0f172a';
        const inputBorder = isPaid ? '#f97316' : '#2d3f56';
        const autoTag = isPaid
          ? '<div id="paidAutoTag-'+br+'" style="font-size:9px;color:#f97316;margin-top:2px;text-align:right;min-height:12px">自動加總</div>'
          : '';
        html += '<td style="padding:7px 8px;border-bottom:1px solid rgba(45,63,86,.3)'+(isPaid?';background:rgba(249,115,22,.04)':'')+'">'
          +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:0">'
          +'<div style="display:flex;align-items:center;gap:4px">'
          +'<input type="number" id="weekEst-'+k.key+'-'+br+'" value="'+(raw||'')+'" placeholder="—" min="0" step="1" '
          +'style="background:'+inputBg+';border:1.5px solid '+inputBorder+';color:'+k.col+';padding:7px 8px;border-radius:5px;font-size:13px;font-weight:700;width:96px;text-align:right;outline:none" '
          +(isPaid
            ? 'oninput="_estPaidManual[\''+br+'\']=true;_estUpdatePaidTag(\''+br+'\')" '
            : 'oninput="_estAutoCalcPaid(\''+br+'\')" '
          )
          +'onfocus="this.style.borderColor=\''+k.col+'\'" onblur="this.style.borderColor=\''+inputBorder+'\'">'
          +'<span style="font-size:10px;color:#475569">K</span></div>'

  document.getElementById('estTabContent-input').innerHTML = html;

  // 初始化「是否手動覆蓋有費」旗標
  window._estPaidManual = {};

  // 初始化後對已有數值的列觸發一次自動加總
  ['AMA','AMC','AMD'].forEach(function(br) {
    if (!ws.submissions[br]) _estAutoCalcPaid(br);
  });

  const btn = document.getElementById('btnSubmitEst');
  if (btn) btn.style.display = allLocked ? 'none' : '';
}

// 自動計算有費 = 一般 + 鈑烤 + 延保
function _estAutoCalcPaid(br) {
  if (window._estPaidManual && window._estPaidManual[br]) return; // 使用者手動輸入，不覆蓋
  const g = parseFloat((document.getElementById('weekEst-general-'+br)||{}).value)||0;
  const b = parseFloat((document.getElementById('weekEst-bodywork-'+br)||{}).value)||0;
  const e = parseFloat((document.getElementById('weekEst-extended-'+br)||{}).value)||0;
  const paidEl = document.getElementById('weekEst-paid-'+br);
  if (!paidEl) return;
  const sum = g + b + e;
  paidEl.value = sum > 0 ? sum : '';
  _estUpdatePaidTag(br);
}

// 更新有費欄標籤（自動加總 or 手動）
function _estUpdatePaidTag(br) {
  const tag = document.getElementById('paidAutoTag-'+br);
  if (!tag) return;
  const isManual = window._estPaidManual && window._estPaidManual[br];
  tag.textContent = isManual ? '✏️ 手動輸入' : '自動加總';
  tag.style.color  = isManual ? '#f59e0b' : '#f97316';
}

function renderEstHistoryTab(history) {
  const el = document.getElementById('estTabContent-history');
  if (!history || !history.length) {
    el.innerHTML = '<div style="padding:40px;text-align:center;color:#64748b">📭 此期間尚無歷史預估紀錄</div>';
    return;
  }
  const weeks = {};
  history.forEach(function(h) {
    if (!weeks[h.week_key]) weeks[h.week_key] = { week_key: h.week_key, week_label: h.week_label, branches: {} };
    weeks[h.week_key].branches[h.branch] = h;
  });
  const BRANCHES = ['AMA', 'AMC', 'AMD'];
  const brColors = { AMA:'#3b82f6', AMC:'#10b981', AMD:'#f59e0b' };
  const fmtK = function(v) { return v ? Math.round(parseFloat(v) / 1000).toLocaleString() : '—'; };
  const fmtTs = function(v) {
    return new Date(v).toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  };
  const sorted = Object.values(weeks).sort(function(a, b) { return b.week_key.localeCompare(a.week_key); });

  const TH = 'padding:8px 12px;background:#0c1524;color:#475569;font-size:11px;font-weight:700;border-bottom:1px solid #2d3f56;white-space:nowrap;';
  const THR = TH + 'text-align:right;';

  let html = '';
  sorted.forEach(function(week, wi) {
    const allSubmitted = BRANCHES.every(function(br) { return !!week.branches[br]; });
    html += '<div style="margin-bottom:14px;border:1px solid ' + (allSubmitted ? 'rgba(16,185,129,.3)' : '#2d3f56') + ';border-radius:10px;overflow:hidden">'
      + '<div style="padding:10px 16px;background:' + (allSubmitted ? 'rgba(16,185,129,.07)' : 'rgba(255,255,255,.02)') + ';display:flex;align-items:center;gap:10px;border-bottom:1px solid #2d3f56">'
        + '<div>'
          + '<span style="font-size:13px;font-weight:800;color:#e2e8f0">' + week.week_label + '</span>'
          + '<span style="font-size:11px;color:#475569;margin-left:8px">' + week.week_key + '</span>'
        + '</div>'
        + (allSubmitted ? '<span style="margin-left:auto;font-size:11px;background:rgba(16,185,129,.15);color:#10b981;padding:2px 8px;border-radius:5px;font-weight:700">✅ 三站已提交</span>' : '<span style="margin-left:auto;font-size:11px;background:rgba(245,158,11,.1);color:#f59e0b;padding:2px 8px;border-radius:5px;font-weight:700">⚠️ 部分未提交</span>')
      + '</div>'
      + '<table style="width:100%;border-collapse:collapse;font-size:12px">'
      + '<thead><tr>'
        + '<th style="' + TH + 'width:60px">據點</th>'
        + '<th style="' + THR + 'color:#f97316">有費 K</th>'
        + '<th style="' + THR + 'color:#3b82f6">一般 K</th>'
        + '<th style="' + THR + 'color:#8b5cf6">鈑烤 K</th>'
        + '<th style="' + THR + 'color:#10b981">延保 K</th>'
        + '<th style="' + TH + 'text-align:center;color:#64748b">提交時間</th>'
      + '</tr></thead><tbody>';

    BRANCHES.forEach(function(br, bi) {
      const sub = week.branches[br];
      const col = brColors[br];
      const bg = bi % 2 === 0 ? 'transparent' : 'rgba(255,255,255,.02)';
      const TD = 'padding:10px 12px;border-bottom:1px solid rgba(45,63,86,.2);';
      const TDR = TD + 'text-align:right;font-variant-numeric:tabular-nums;font-weight:700;';
      html += '<tr style="background:' + bg + '">'
        + '<td style="' + TD + '">'
          + '<span style="background:' + col + '22;color:' + col + ';padding:3px 10px;border-radius:5px;font-size:12px;font-weight:800">' + br + '</span>'
        + '</td>';
      if (sub) {
        html += '<td style="' + TDR + 'color:#f97316">' + fmtK(sub.paid_estimate) + '</td>'
          + '<td style="' + TDR + 'color:#3b82f6">' + fmtK(sub.general_estimate) + '</td>'
          + '<td style="' + TDR + 'color:#8b5cf6">' + fmtK(sub.bodywork_estimate) + '</td>'
          + '<td style="' + TDR + 'color:#10b981">' + fmtK(sub.extended_estimate) + '</td>'
          + '<td style="' + TD + 'text-align:center;color:#475569;font-size:11px">' + fmtTs(sub.submitted_at) + '</td>';
      } else {
        html += '<td colspan="5" style="' + TD + 'text-align:center;color:#334155;font-size:11px">— 未提交 —</td>';
      }
      html += '</tr>';
    });

    html += '</tbody></table></div>';
  });

  el.innerHTML = html;
}

async function submitWeeklyEstimate() {
  const period = getPeriod();
  if (!period) return;
  const ws = _estModalData.weekStatus;
  if (!ws) return;
  const BRANCHES = ['AMA','AMC','AMD'];
  const entries = [];
  let hasAny = false;
  BRANCHES.forEach(function(br) {
    if (ws.submissions[br]) return;
    const get = function(k) {
      const v = parseFloat((document.getElementById('weekEst-'+k+'-'+br)||{}).value);
      return (!isNaN(v) && v >= 0) ? Math.round(v*1000) : null;
    };
    const e = {branch:br, paid:get('paid'), general:get('general'), bodywork:get('bodywork'), extended:get('extended')};
    if ([e.paid,e.general,e.bodywork,e.extended].some(function(v){return v!==null;})) hasAny=true;
    entries.push(e);
  });
  if (!entries.length) { alert('所有據點本週均已提交'); return; }
  if (!hasAny) { alert('請至少填入一個預估值（0 以上）'); return; }
  const btn = document.getElementById('btnSubmitEst');
  if (btn) { btn.disabled=true; btn.textContent='提交中...'; }
  try {
    const res = await fetch('/api/revenue-estimates/weekly-submit', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({period,entries}),
    }).then(function(r){return r.json();});
    if (res.error) throw new Error(res.error);
    await loadEstimateModalData(period);
    await loadRevenueKPI(period, document.getElementById('selBranch').value);
  } catch(e) {
    alert('提交失敗：'+e.message);
  } finally {
    if (btn) { btn.disabled=false; btn.textContent='🚀 提交本週預估'; }
  }
}

});

<script>
let _vctlMetrics=[], _vctlResults=[], _vctlEditingId=null, _vctlEditingFilters=[];
const VCTL_PAYCODES=['一般','保險','延保','票劵','保固','內結','善意維修','VSA'];

function toggleVCTLConfig(){
  var body=document.getElementById('vctlConfigBody'),arrow=document.getElementById('vctlConfigArrow');
  if(!body)return;
  var open=body.style.display!=='none';
  body.style.display=open?'none':'';
  arrow.style.transform=open?'rotate(0deg)':'rotate(90deg)';
}
async function loadVCTL(period,branch){
  if(!period)return;
  var resultsEl=document.getElementById('vctlResults'),labelEl=document.getElementById('vctlPeriodLabel');
  if(!resultsEl)return;
  resultsEl.innerHTML='<div class="loading"><span class="spinner"></span>載入中</div>';
  try{
    var [metrics,statsData]=await Promise.all([
      fetch('/api/vctl/metrics').then(r=>r.json()),
      fetch('/api/stats/vctl?period='+period+(branch?'&branch='+branch:'')).then(r=>r.json()),
    ]);
    _vctlMetrics=Array.isArray(metrics)?metrics:[];
    _vctlResults=(statsData&&statsData.results)?statsData.results:[];

  }catch(e){resultsEl.innerHTML='<div style="color:#ef4444;padding:16px">❌ '+e.message+'</div>';}
}
function _renderVCTLMetricList(){
  var el=document.getElementById('vctlMetricList');if(!el)return;
  if(!_vctlMetrics.length){el.innerHTML='<div style="color:#475569;font-size:13px;padding:8px 0">尚無指標設定</div>';return;}
  var SL={parts:'🔩 零件',accessories:'📦 配件',boutique:'💎 精品',wage:'🔧 工資'};
  var CL={amount:'實際售價',cost:'成本',qty:'數量',count:'筆數',hours:'標準工時'};

      +((m.filters||[]).filter(function(f){return f.type==='catalog_type';}).length?'<span style="font-size:10px;background:rgba(16,185,129,.12);color:#10b981;padding:1px 7px;border-radius:4px">📦 '+(m.filters||[]).filter(function(f){return f.type==='catalog_type';}).map(function(f){return f.value;}).join('/')+'</span>':'')

function _renderVCTLResults(branch){
  var el=document.getElementById('vctlResults');if(!el)return;
  if(!_vctlMetrics.length){el.innerHTML='<div class="empty" style="padding:32px">尚未設定任何指標，請在下方新增</div>';return;}
  var BRANCHES=branch?[branch]:['AMA','AMC','AMD'];
  var BC={AMA:'#3b82f6',AMC:'#10b981',AMD:'#f59e0b'};
  var SL={parts:'零件',accessories:'配件',boutique:'精品',wage:'工資'};
  var CL={amount:'售價',cost:'成本',qty:'數量',count:'筆數',hours:'工時H'};
  var fmtK=function(v){var n=parseFloat(v||0);if(!n)return'—';return n>=1000?Math.round(n/1000).toLocaleString()+'K':Math.round(n).toLocaleString();};
  var fmtV=function(v,c){var n=parseFloat(v||0);if(!n)return'—';if(c==='qty'||c==='count')return n.toLocaleString(undefined,{maximumFractionDigits:1});if(c==='hours')return n.toFixed(1)+'H';return n>=1000?Math.round(n/1000).toLocaleString()+'K':Math.round(n).toLocaleString();};
  var metricMap={};_vctlResults.forEach(function(r){metricMap[r.metric_id]=r;});
  var TH='padding:10px 12px;background:#0f172a;font-size:11px;font-weight:700;color:#64748b;border-bottom:1px solid #2d3f56;white-space:nowrap;';
  var hasMulti=BRANCHES.length>1;
  var html='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px;min-width:500px"><thead><tr>'
    +'<th style="'+TH+'text-align:left;min-width:160px">指標名稱</th>';
  BRANCHES.forEach(function(br){html+='<th style="'+TH+'text-align:center;color:'+BC[br]+'">'+br+'<div style="font-size:9px;font-weight:400;color:#475569;margin-top:1px">售價 / 成本</div></th>';});
  if(hasMulti)html+='<th style="'+TH+'text-align:right;border-left:1px solid #374151;min-width:90px">集團合計</th>';
  html+='</tr></thead><tbody>';
  _vctlMetrics.forEach(function(m,mi){
    var r=metricMap[m.id]||{branches:{}};
    var bg=mi%2===0?'transparent':'rgba(255,255,255,.015)';
    var TD='padding:10px 12px;border-bottom:1px solid rgba(45,63,86,.3);background:'+bg+';';
    var isWage=m.source_type==='wage';
    var showCost=!isWage&&m.calc_method!=='qty'&&m.calc_method!=='count';
    var groupTotal=0;
    var cells=BRANCHES.map(function(br){
      var d=r.branches[br]||{amount:0,cost:0,qty:0,cnt:0};
      var pRaw=m.calc_method==='cost'?d.cost:m.calc_method==='qty'?d.qty:m.calc_method==='count'?d.cnt:m.calc_method==='hours'?d.cost:d.amount;
      groupTotal+=parseFloat(pRaw||0);
      var col=BC[br];var hasV=parseFloat(pRaw||0)>0;
      var cell='<td style="'+TD+'text-align:center"><div style="font-size:16px;font-weight:900;color:'+(hasV?col:'#334155')+'">'+(hasV?fmtV(pRaw,m.calc_method):'—')+'</div>';
      if(showCost&&(d.amount>0||d.cost>0)){
        cell+='<div style="font-size:10px;color:#475569;margin-top:3px">售 '+fmtV(d.amount,'amount')+' / 成 '+fmtK(d.cost)+'</div>';
        var margin=d.amount>0?((d.amount-d.cost)/d.amount*100):null;
        if(margin!==null)cell+='<div style="font-size:10px;color:'+(margin>=30?'#10b981':margin>=15?'#f59e0b':'#ef4444')+';font-weight:700">毛利 '+margin.toFixed(1)+'%</div>';
      }
      if(isWage&&d.cost>0)cell+='<div style="font-size:10px;color:#8b5cf6;margin-top:2px">'+d.cost.toFixed(1)+'H</div>';
      return cell+'</td>';
    }).join('');
    html+='<tr><td style="'+TD+'"><div style="font-weight:700;color:#e2e8f0;font-size:13px">'+m.metric_name+'</div>'
      +'<div style="font-size:10px;color:#475569;margin-top:2px">'+(SL[m.source_type]||m.source_type)+' → '+(CL[m.calc_method]||m.calc_method)+((m.account_types||[]).length?' | '+(m.account_types||[]).join('/'):'')+'</div></td>'
      +cells+(hasMulti?'<td style="'+TD+'text-align:right;border-left:1px solid #374151;font-weight:900;font-size:15px;color:'+(groupTotal>0?'#10b981':'#334155')+'">'+fmtV(groupTotal,m.calc_method)+'</td>':'')+'</tr>';
  });
  html+='</tbody></table></div><div style="font-size:11px;color:#475569;margin-top:8px;padding:0 2px">💡 售價 / 成本均為未稅；工資來源顯示工資金額(K) 與標準工時(H)</div>';
  el.innerHTML=html;
}
function openVCTLModal(id){
  _vctlEditingId=id||null;
  var m=id?_vctlMetrics.find(function(x){return x.id===id;}):null;
  document.getElementById('vctlModalTitle').textContent=id?'編輯 VCTL 指標':'新增 VCTL 指標';
  document.getElementById('vctlMName').value=m?m.metric_name:'';
  document.getElementById('vctlMDesc').value=m?(m.description||''):'';
  document.getElementById('vctlMOrder').value=m?(m.sort_order||0):0;
  document.getElementById('vctlMSource').value=m?(m.source_type||'parts'):'parts';
  onVCTLSourceChange(m?(m.calc_method||'amount'):null);
_buildVCTLAccountChips(m?m.source_type:'parts',m?(m.account_types||[]):[]);
  _buildVCTLCatalogChips(m?(m.filters||[]).filter(function(f){return f.type==='catalog_type';}).map(function(f){return f.value;}):[]);
  // 編輯 filters 排除 catalog_type（catalog_type 由 chips 單獨管理）
  _vctlEditingFilters=m?[...(m.filters||[]).filter(function(f){return f.type!=='catalog_type';})]:[];
  _renderVCTLFilterList();
  document.getElementById('vctlModal').style.display='flex';
  document.body.style.overflow='hidden';
  setTimeout(function(){document.getElementById('vctlMName').focus();},80);
}
function closeVCTLModal(){
  document.getElementById('vctlModal').style.display='none';
  document.body.style.overflow='';
  _vctlEditingFilters=[];
}
function onVCTLSourceChange(restoreCalc){
  var src=document.getElementById('vctlMSource').value;
  var isWage=src==='wage';
  var calcSel=document.getElementById('vctlMCalc');
  var curCalc=restoreCalc||calcSel.value;
  if(isWage){
    calcSel.innerHTML='<option value="amount">💰 工資金額（元）</option><option value="hours">⏱️ 標準工時（H）</option><option value="count">🚗 台數</option>';
  }else{
    calcSel.innerHTML='<option value="amount">💰 實際售價（元）</option><option value="cost">📉 成本（元）</option><option value="qty">📦 數量（件）</option><option value="count">🧾 筆數</option>';
  }
  if(curCalc&&[...calcSel.options].some(function(o){return o.value===curCalc;}))calcSel.value=curCalc;
  var fw=document.getElementById('vctlFTypeWrap');if(fw)fw.style.display=isWage?'none':'';
  var hint=document.getElementById('vctlFilterHint');if(hint)hint.textContent=isWage?'工資代碼（精確如 17300，或範圍如 00030-00033）':'類別碼/功能碼/零件編號 篩選條件（AND 邏輯）';
  var atl=document.getElementById('vctlATLabel');if(atl)atl.textContent=isWage?'帳類篩選（account_type，留空=全部）':'Paycode 篩選（part_type，留空=全部）';
var ctw=document.getElementById('vctlCatalogTypeWrap');
  if(ctw)ctw.style.display=(src==='parts')?'':'none';
  _buildVCTLAccountChips(src,[]);
  if(src==='parts')_buildVCTLCatalogChips([]);
}
function _buildVCTLAccountChips(src,selectedVals){
  var el=document.getElementById('vctlAccountChips');if(!el)return;
  var isWage=src==='wage';var chipCol=isWage?'#3b82f6':'#f97316';
  el.innerHTML=['一般','保險','延保','票劵','保固','內結','善意維修','VSA'].map(function(t){
    var on=selectedVals.indexOf(t)!==-1;
    return '<label style="display:inline-flex;align-items:center;gap:4px;cursor:pointer;padding:5px 11px;border-radius:6px;margin:2px;border:1.5px solid '+(on?chipCol:'#2d3f56')+';background:'+(on?chipCol+'22':'transparent')+';font-size:12px;font-weight:700;color:'+(on?chipCol:'#64748b')+'" onclick="toggleVCTLChip(this,\''+chipCol+'\')">'
      +'<input type="checkbox" value="'+t+'" '+(on?'checked':'')+' style="display:none">'+t+'</label>';
  }).join('');
}
function toggleVCTLChip(el,col){
  var cb=el.querySelector('input');cb.checked=!cb.checked;
  el.style.borderColor=cb.checked?col:'#2d3f56';el.style.background=cb.checked?col+'22':'transparent';el.style.color=cb.checked?col:'#64748b';
}
 function _buildVCTLCatalogChips(selectedVals){
  var el=document.getElementById('vctlCatalogChips');if(!el)return;
  var chipCol='#10b981';
  el.innerHTML=['零件','精品','配件'].map(function(t){
    var on=selectedVals.indexOf(t)!==-1;
    return '<label style="display:inline-flex;align-items:center;gap:4px;cursor:pointer;padding:5px 11px;border-radius:6px;margin:2px;border:1.5px solid '+(on?chipCol:'#2d3f56')+';background:'+(on?chipCol+'22':'transparent')+';font-size:12px;font-weight:700;color:'+(on?chipCol:'#64748b')+'" onclick="toggleVCTLCatalogChip(this,\''+chipCol+'\')">'
      +'<input type="checkbox" value="'+t+'" '+(on?'checked':'')+' style="display:none">'+t+'</label>';
  }).join('');
}
function toggleVCTLCatalogChip(el,col){
  var cb=el.querySelector('input');cb.checked=!cb.checked;
  el.style.borderColor=cb.checked?col:'#2d3f56';el.style.background=cb.checked?col+'22':'transparent';el.style.color=cb.checked?col:'#64748b';
}
function _renderVCTLFilterList(){
  var el=document.getElementById('vctlFilterList');if(!el)return;
  if(!_vctlEditingFilters.length){el.innerHTML='<div style="color:#64748b;font-size:12px;padding:3px 0">尚未新增篩選條件</div>';return;}
  var TL={category_code:'類別碼',function_code:'功能碼',part_number:'零件編號',work_code:'工資代碼',part_type:'Paycode'};
  var TC={category_code:'#3b82f6',function_code:'#8b5cf6',part_number:'#10b981',work_code:'#f59e0b',part_type:'#f97316'};
  el.innerHTML=_vctlEditingFilters.map(function(f,i){
    var col=TC[f.type]||'#64748b';
    return '<div style="display:flex;align-items:center;gap:8px;background:#1e293b;border:1px solid #2d3f56;border-radius:7px;padding:6px 12px;margin-bottom:5px">'
      +'<span style="font-size:11px;background:'+col+'22;color:'+col+';padding:1px 7px;border-radius:4px;white-space:nowrap">'+(TL[f.type]||f.type)+'</span>'
      +'<span style="flex:1;font-size:12px;font-weight:600;color:#e2e8f0">'+f.value+'</span>'
      +'<button onclick="_vctlRemoveFilter('+i+')" style="background:none;border:none;color:#475569;cursor:pointer;font-size:18px;padding:0;line-height:1">×</button></div>';
  }).join('');
}
function _vctlRemoveFilter(i){_vctlEditingFilters.splice(i,1);_renderVCTLFilterList();}
function addVCTLFilter(){
  var src=document.getElementById('vctlMSource').value;
  var isWage=src==='wage';
  var type=isWage?'work_code':(document.getElementById('vctlFType')?.value||'category_code');
  var value=(document.getElementById('vctlFValue')?.value||'').trim();
  if(!value)return;
  if(_vctlEditingFilters.some(function(f){return f.type===type&&f.value===value;}))return;
  _vctlEditingFilters.push({type,value});
  if(document.getElementById('vctlFValue'))document.getElementById('vctlFValue').value='';
  _renderVCTLFilterList();
}
async function saveVCTLMetric(){
  var metric_name=document.getElementById('vctlMName').value.trim();
  if(!metric_name){alert('請輸入指標名稱');return;}
  var source_type=document.getElementById('vctlMSource').value;
  var calc_method=document.getElementById('vctlMCalc').value;
  var sort_order=parseInt(document.getElementById('vctlMOrder').value)||0;
  var description=document.getElementById('vctlMDesc').value.trim();
  var account_types=[...document.querySelectorAll('#vctlAccountChips input:checked')].map(function(cb){return cb.value;});
  var filters=_vctlEditingFilters.map(function(f){return{type:f.type,value:f.value};});
 // 收集零件類別（catalog_type）chips
  var catalogChecked=[...document.querySelectorAll('#vctlCatalogChips input:checked')].map(function(cb){return cb.value;});
  catalogChecked.forEach(function(v){filters.push({type:'catalog_type',value:v});});
  var btn=document.getElementById('vctlBtnSave');btn.disabled=true;btn.textContent='儲存中...';
  try{
    var url=_vctlEditingId?'/api/vctl/metrics/'+_vctlEditingId:'/api/vctl/metrics';
    var method=_vctlEditingId?'PUT':'POST';
    var data=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify({metric_name,description,source_type,calc_method,account_types,filters,sort_order})}).then(r=>r.json());
    if(data.error)throw new Error(data.error);
    closeVCTLModal();
    await loadVCTL(getPeriod(),document.getElementById('selBranch').value);
  }catch(e){alert('儲存失敗：'+e.message);}
  finally{btn.disabled=false;btn.textContent='儲存指標';}
}
async function deleteVCTLMetric(id,name){
  if(!confirm('確定刪除「'+name+'」？'))return;
  await fetch('/api/vctl/metrics/'+id,{method:'DELETE'});
  await loadVCTL(getPeriod(),document.getElementById('selBranch').value);
}
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){var m=document.getElementById('vctlModal');if(m&&m.style.display!=='none')closeVCTLModal();}
});
</script>

<!-- ════ VCTL 指標設定 Modal ════ -->
<div id="vctlModal"
  style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:800;
         align-items:center;justify-content:center;padding:16px;overflow-y:auto"
  onclick="if(event.target===this)closeVCTLModal()">
  <div style="background:#1a2740;border:1px solid #2d4060;border-radius:14px;
              width:100%;max-width:700px;box-shadow:0 24px 64px rgba(0,0,0,.88);margin:auto">
    <div style="display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid #2d3f56">
      <div id="vctlModalTitle" style="font-size:15px;font-weight:800;color:#fff;flex:1">新增 VCTL 指標</div>
      <button onclick="closeVCTLModal()" style="width:30px;height:30px;border-radius:7px;border:1px solid #2d3f56;background:#0f172a;color:#64748b;font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
    </div>
    <div style="padding:18px 20px;overflow-y:auto;max-height:72vh">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div>
          <label style="display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:5px">指標名稱 <span style="color:#ef4444">*</span></label>
          <input type="text" id="vctlMName" placeholder="例：精品銷售額" style="width:100%;background:#0f172a;border:1px solid #2d3f56;color:#e2e8f0;padding:8px 12px;border-radius:6px;font-size:13px;outline:none">
        </div>
        <div>
          <label style="display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:5px">說明（選填）</label>
          <input type="text" id="vctlMDesc" placeholder="例：含型錄零件精品" style="width:100%;background:#0f172a;border:1px solid #2d3f56;color:#e2e8f0;padding:8px 12px;border-radius:6px;font-size:13px;outline:none">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 80px;gap:10px;margin-bottom:16px">
        <div>
          <label style="display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:5px">資料來源</label>
          <select id="vctlMSource" onchange="onVCTLSourceChange()" style="width:100%;background:#0f172a;border:1px solid #2d3f56;color:#e2e8f0;padding:8px 10px;border-radius:6px;font-size:13px;outline:none">
            <option value="parts">🔩 零件（parts_sales）</option>
            <option value="accessories">📦 配件（parts_catalog 配件）</option>
            <option value="boutique">💎 精品（parts_catalog 精品）</option>
            <option value="wage">🔧 工資（tech_performance）</option>
          </select>
        </div>
        <div>
          <label style="display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:5px">計算方式</label>
          <select id="vctlMCalc" style="width:100%;background:#0f172a;border:1px solid #2d3f56;color:#e2e8f0;padding:8px 10px;border-radius:6px;font-size:13px;outline:none">
            <option value="amount">💰 實際售價（元）</option>
            <option value="cost">📉 成本（元）</option>
            <option value="qty">📦 數量（件）</option>
            <option value="count">🧾 筆數</option>
          </select>
        </div>
        <div>
          <label style="display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:5px">排序</label>
          <input type="number" id="vctlMOrder" value="0" min="0" style="width:100%;background:#0f172a;border:1px solid #2d3f56;color:#e2e8f0;padding:8px;border-radius:6px;font-size:13px;outline:none;text-align:center">
        </div>
      </div>
      <div style="margin-bottom:16px">
        <label id="vctlATLabel" style="display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:7px">Paycode 篩選（part_type，留空=全部）</label>
        <div id="vctlAccountChips" style="display:flex;flex-wrap:wrap;gap:3px;background:#0f172a;border:1px solid #2d3f56;border-radius:8px;padding:10px 12px;min-height:44px"></div>
      </div>
     <div id="vctlCatalogTypeWrap" style="margin-bottom:16px;display:none">
        <label style="display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:7px">
          零件類別篩選（parts_catalog.part_type）
          <span style="font-size:10px;color:#475569;font-weight:400;margin-left:6px">與型錄比對後依類別過濾，留空=全部</span>
        </label>
        <div id="vctlCatalogChips" style="display:flex;flex-wrap:wrap;gap:3px;background:#0f172a;border:1px solid #2d3f56;border-radius:8px;padding:10px 12px;min-height:44px"></div>
      </div>
      <div style="margin-bottom:6px">
        <label style="display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:3px">篩選條件</label>
        <div id="vctlFilterHint" style="font-size:11px;color:#475569;margin-bottom:8px">類別碼/功能碼/零件編號 篩選條件（AND 邏輯）</div>
        <div id="vctlFilterList" style="margin-bottom:8px"></div>
        <div style="display:flex;gap:8px;align-items:stretch;flex-wrap:wrap">
          <div id="vctlFTypeWrap">
            <select id="vctlFType" style="background:#0f172a;border:1px solid #2d3f56;color:#e2e8f0;padding:8px 10px;border-radius:6px;font-size:12px;outline:none;height:100%">
              <option value="category_code">零件類別碼</option>
              <option value="function_code">功能碼</option>
              <option value="part_number">零件編號</option>
              <option value="part_type">Paycode</option>
            </select>
          </div>
          <input type="text" id="vctlFValue" placeholder="輸入值（工資: 17300 或 00030-00033）"
            style="flex:1;min-width:160px;background:#0f172a;border:1px solid #2d3f56;color:#e2e8f0;padding:8px 10px;border-radius:6px;font-size:12px;outline:none"
            onkeydown="if(event.key==='Enter'){event.preventDefault();addVCTLFilter();}">
          <button onclick="addVCTLFilter()" style="padding:8px 16px;background:#253347;color:#cbd5e1;border:1px solid #2d3f56;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">＋ 加入</button>
        </div>
      </div>
    </div>
    <div style="padding:12px 20px 16px;border-top:1px solid #2d3f56;display:flex;gap:8px;justify-content:flex-end">
      <button onclick="closeVCTLModal()" style="padding:7px 16px;background:#253347;color:#cbd5e1;border:1px solid #2d3f56;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">取消</button>
      <button id="vctlBtnSave" onclick="saveVCTLMetric()" style="padding:7px 18px;background:#3b82f6;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer">儲存指標</button>
    </div>
  </div>
</div>
 
</body>
</html>
